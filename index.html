'dc-split-testing':{en:'Split Testing',ar:'اختبار التقسيم',book:'DotCom Secrets',chapter:'Chapter 7',source:'dotcom',xp:75,content:{en:`<div class="lesson-section"><div class="section-title">Let Data Decide</div><div class="lesson-content"><p>Split testing (A/B testing) replaces opinion with evidence. You run two versions of a page that differ in one element — headline, image, button, price — and let real visitors reveal which converts better. The discipline is changing one thing at a time so you know what caused the difference.</p><p>Test the highest-leverage elements first. The headline and the offer usually move conversion far more than button colors. Run each test until you have enough visitors for a trustworthy result, then keep the winner and test the next element — improvement compounds over time.</p></div><div class="highlight-box">You are not your customer. The only reliable opinion about what converts is the data from real visitors choosing with their clicks.</div></div><div class="lesson-section"><div class="section-title">Testing Discipline</div><div class="framework-grid"><div class="framework-card"><div class="ficon">🔬</div><div class="ftitle">One Variable</div><div class="fdesc">Change a single element so the cause is clear.</div></div><div class="framework-card"><div class="ficon">📊</div><div class="ftitle">Enough Data</div><div class="fdesc">Wait for a meaningful sample before deciding.</div></div><div class="framework-card"><div class="ficon">🏆</div><div class="ftitle">Keep & Repeat</div><div class="fdesc">Lock the winner, test the next element.</div></div></div><div class="lesson-content" style="margin-top:16px"><p>Start by testing your headline against one alternative on the same traffic. Once a winner emerges, test the offer, then the call to action. Each compounding win permanently raises the floor of your funnel's performance.</p></div></div>`,ar:`<div class="lesson-section"><div class="section-title">دع البيانات تقرّر</div><div class="lesson-content"><p>اختبار التقسيم (A/B) يستبدل الرأي بالدليل. تشغّل نسختين من صفحة تختلفان في عنصر واحد — العنوان، الصورة، الزر، السعر — وتدع الزوار الحقيقيين يكشفون أيهما يحوّل أفضل. الانضباط هو تغيير شيء واحد في كل مرة لتعرف ما سبّب الفرق.</p><p>اختبر العناصر الأعلى تأثيراً أولاً. العنوان والعرض عادةً يحرّكان التحويل أكثر بكثير من ألوان الأزرار. شغّل كل اختبار حتى تحصل على زوار كافين لنتيجة موثوقة، ثم احتفظ بالفائز واختبر العنصر التالي — التحسّن يتراكم مع الوقت.</p></div><div class="highlight-box">أنت لست عميلك. الرأي الموثوق الوحيد حول ما يحوّل هو بيانات الزوار الحقيقيين الذين يختارون بنقراتهم.</div></div>`}},
'dc-upsell-downsell':{en:'Upsells & Downsells',ar:'العروض الإضافية والبديلة',book:'DotCom Secrets',chapter:'Chapter 7',source:'dotcom',xp:75,content:{en:`<div class="lesson-section"><div class="section-title">Maximizing Each Buyer</div><div class="lesson-content"><p>Upsells and downsells multiply the value of every sale at the moment of highest buying momentum — right after someone says yes. An upsell offers something better or complementary; a downsell offers a lighter, cheaper alternative if they decline the upsell.</p><p>These are typically one-time offers (OTOs) presented with a single click, no re-entering payment details. The logic: a buyer in motion stays in motion. Declining an upsell isn't a dead end — a downsell recovers many of those who said no to the pricier option.</p></div><div class="highlight-box">The most likely person to buy from you is someone who just bought. Upsells and downsells capture that momentum before it fades.</div></div><div class="lesson-section"><div class="section-title">The Post-Purchase Path</div><div class="framework-grid"><div class="framework-card"><div class="ficon">⬆️</div><div class="ftitle">Upsell</div><div class="fdesc">A better or complementary one-click add-on.</div></div><div class="framework-card"><div class="ficon">⬇️</div><div class="ftitle">Downsell</div><div class="fdesc">A lighter, cheaper option if they decline.</div></div><div class="framework-card"><div class="ficon">🖱️</div><div class="ftitle">One-Click</div><div class="fdesc">No re-entering payment keeps momentum.</div></div></div><div class="lesson-content" style="margin-top:16px"><p>After your $47 offer, present a $197 upsell with one click; if declined, offer a $27 downsell. Even modest take rates on each step can double or triple your average order value without any new traffic.</p></div></div>`,ar:`<div class="lesson-section"><div class="section-title">تعظيم كل مشترٍ</div><div class="lesson-content"><p>العروض الإضافية والبديلة تضاعف قيمة كل بيعة في لحظة أعلى زخم شراء — مباشرة بعد قول أحدهم نعم. العرض الإضافي يقدّم شيئاً أفضل أو مكمّلاً؛ والبديل يقدّم بديلاً أخف وأرخص إن رفضوا الإضافي.</p><p>هذه عادةً عروض لمرة واحدة (OTO) تُقدَّم بنقرة واحدة، دون إعادة إدخال بيانات الدفع. المنطق: المشتري المتحرّك يبقى متحركاً. رفض العرض الإضافي ليس طريقاً مسدوداً — العرض البديل يستعيد كثيراً ممن قالوا لا للخيار الأغلى.</p></div><div class="highlight-box">أكثر شخص محتمل أن يشتري منك هو من اشترى للتو. العروض الإضافية والبديلة تلتقط ذلك الزخم قبل أن يخبو.</div></div>`}},
'ex-find-niche':{en:'Finding Your Niche',ar:'إيجاد تخصصك',book:'Expert Secrets',chapter:'Chapter 1',source:'expert',xp:75,content:{en:`<div class="lesson-section"><div class="section-title">The Attractive Character Begins with Niche Clarity</div><div class="lesson-content"><p>Russell Brunson teaches that every expert must pick a niche before they can build an audience. Your niche is the intersection of a market (health, wealth, relationships), a sub-market (weight loss, investing, dating), and a niche (fat loss for busy moms, crypto for beginners, dating after divorce). Going narrow doesn't shrink your audience — it focuses your message until the right people feel you are speaking directly to them.</p><p>The mistake most beginners make is trying to serve everyone. A marketing coach who specializes in funnels for fitness professionals will always out-convert one who says 'I help small businesses.' Specificity is credibility.</p></div><div class="highlight-box">Rule: go one level deeper than you think you need to. The riches are in the niches.</div></div><div class="lesson-section"><div class="section-title">The Three-Level Niche Map</div><div class="framework-grid"><div class="framework-card"><div class="ficon">🌍</div><div class="ftitle">Market</div><div class="fdesc">The broad category: Health, Wealth, or Relationships.</div></div><div class="framework-card"><div class="ficon">🎯</div><div class="ftitle">Sub-Market</div><div class="fdesc">A narrower segment: weight loss, stock trading, marriage.</div></div><div class="framework-card"><div class="ficon">💎</div><div class="ftitle">Niche</div><div class="fdesc">Your specific focus: keto for diabetics, crypto for retirees, etc.</div></div></div><div class="lesson-content" style="margin-top:16px"><p>Exercise: write your niche using this formula — 'I help [specific group] achieve [specific result] without [specific frustration].' Paste that sentence into every headline until you feel the resonance.</p></div></div>`,ar:`<div class="lesson-section"><div class="section-title">الشخصية الجذابة تبدأ بوضوح التخصص</div><div class="lesson-content"><p>يعلّم راسل برانسون أن كل خبير يجب أن يختار تخصصه قبل بناء جمهور. تخصصك هو تقاطع سوق (صحة، ثروة، علاقات)، سوق فرعي (خسارة وزن، استثمار، مواعدة)، وتخصص (خسارة دهون للأمهات المشغولات، عملات رقمية للمبتدئين، مواعدة بعد الطلاق). الضيق لا يقلص جمهورك — بل يركّز رسالتك حتى يشعر الأشخاص المناسبون أنك تخاطبهم مباشرة.</p><p>الخطأ الذي يرتكبه معظم المبتدئين هو محاولة خدمة الجميع. مدرب تسويق يتخصص في القمع للمحترفين في اللياقة سيتفوق دائماً على من يقول 'أساعد الأعمال الصغيرة.' التحديد هو المصداقية.</p></div><div class="highlight-box">القاعدة: اذهب أعمق بمستوى واحد مما تعتقد أنك بحاجة إليه. الثروات في التخصصات.</div></div>`}},
'ex-expert-identity':{en:'Building Expert Identity',ar:'بناء هوية الخبير',book:'Expert Secrets',chapter:'Chapter 1',source:'expert',xp:75,content:{en:`<div class="lesson-section"><div class="section-title">You Are Already Qualified</div><div class="lesson-content"><p>One of the biggest barriers experts face is impostor syndrome — the feeling that they are not qualified enough to teach. Brunson's antidote is the concept of being 'one step ahead.' You don't need to be the world's leading authority; you need to know one thing more than the person you are serving and be able to guide them through the step you just took.</p><p>Your expert identity is built on three pillars: your story (the journey that qualifies you), your unique mechanism (the process or framework only you teach), and your results (proof that the mechanism works). None of these requires a degree or 20 years of experience — they require honest storytelling and a documented result.</p></div><div class="highlight-box">You don't need to be the best in the world. You need to be one step ahead of the person you serve and willing to document the journey.</div></div><div class="lesson-section"><div class="section-title">Three Pillars of Expert Identity</div><div class="framework-grid"><div class="framework-card"><div class="ficon">📖</div><div class="ftitle">Your Story</div><div class="fdesc">The journey that created your insight. Struggle + discovery = credibility.</div></div><div class="framework-card"><div class="ficon">⚙️</div><div class="ftitle">Unique Mechanism</div><div class="fdesc">The named process or framework only you teach.</div></div><div class="framework-card"><div class="ficon">🏆</div><div class="ftitle">Results</div><div class="fdesc">Documented proof — your own or your clients'.</div></div></div><div class="lesson-content" style="margin-top:16px"><p>Name your unique mechanism today. Instead of 'I help with marketing,' say 'I use the Revenue Funnel Method to help coaches get clients.' The name makes it ownable and memorable.</p></div></div>`,ar:`<div class="lesson-section"><div class="section-title">أنت مؤهل بالفعل</div><div class="lesson-content"><p>أحد أكبر العوائق التي يواجهها الخبراء هو متلازمة المحتال — الشعور بأنهم غير مؤهلين بما يكفي للتعليم. ترياق برانسون هو مفهوم كونك 'خطوة واحدة إلى الأمام.' لا تحتاج أن تكون السلطة الأولى في العالم؛ تحتاج أن تعرف شيئاً واحداً أكثر من الشخص الذي تخدمه وأن تكون قادراً على إرشاده عبر الخطوة التي اتخذتها للتو.</p><p>هويتك كخبير مبنية على ثلاثة أعمدة: قصتك (الرحلة التي تؤهلك)، آليتك الفريدة (العملية أو الإطار الذي تعلمه أنت وحدك)، ونتائجك (الدليل على أن الآلية تعمل). لا يتطلب أي من هذه درجة علمية أو 20 عاماً من الخبرة — يتطلبون رواية قصة صادقة ونتيجة موثّقة.</p></div><div class="highlight-box">لا تحتاج أن تكون الأفضل في العالم. تحتاج أن تكون خطوة واحدة أمام الشخص الذي تخدمه وراغباً في توثيق الرحلة.</div></div>`}},
'ex-charisma':{en:'Charisma & Presence',ar:'الكاريزما والحضور',book:'Expert Secrets',chapter:'Chapter 1',source:'expert',xp:75,content:{en:`<div class="lesson-section"><div class="section-title">Charisma is a Skill, Not a Gift</div><div class="lesson-content"><p>Brunson teaches that charisma — the magnetic pull that makes people want to follow and buy from you — is not something you are born with. It is built through four practices: certainty, congruence, caring, and storytelling. The most charismatic people on stage or camera are not the most naturally extroverted — they are the most certain about their beliefs and the most genuinely invested in their audience's outcome.</p><p>Presence amplifies whatever message you carry. A weak message delivered with certainty will outperform a great message delivered with doubt. This is why scripted webinars outperform unscripted ones — the speaker has rehearsed until their certainty becomes infectious.</p></div><div class="highlight-box">Certainty is the most contagious communication tool. People don't follow messengers who seem unsure. Rehearse until you believe it completely.</div></div><div class="lesson-section"><div class="section-title">Four Pillars of Charisma</div><div class="framework-grid"><div class="framework-card"><div class="ficon">💪</div><div class="ftitle">Certainty</div><div class="fdesc">Unshakeable belief in your message and method.</div></div><div class="framework-card"><div class="ficon">🎯</div><div class="ftitle">Congruence</div><div class="fdesc">Your words, energy, and body align completely.</div></div><div class="framework-card"><div class="ficon">❤️</div><div class="ftitle">Caring</div><div class="fdesc">Genuine investment in your audience's result.</div></div><div class="framework-card"><div class="ficon">📖</div><div class="ftitle">Storytelling</div><div class="fdesc">Emotion through narrative, not information alone.</div></div></div><div class="lesson-content" style="margin-top:16px"><p>Record a 60-second video about your main offer. Watch it back and ask: do I look and sound certain? Is there energy behind my words? If not, rehearse that same 60 seconds until it flows from belief.</p></div></div>`,ar:`<div class="lesson-section"><div class="section-title">الكاريزما مهارة لا موهبة</div><div class="lesson-content"><p>يعلّم برانسون أن الكاريزما — الجاذبية المغناطيسية التي تجعل الناس يريدون اتباعك والشراء منك — ليست شيئاً تُولد به. تُبنى من خلال أربع ممارسات: اليقين، والتوافق، والاهتمام، ورواية القصص. أكثر الناس كاريزما على المسرح أو الكاميرا ليسوا أكثرهم انبساطاً بشكل طبيعي — بل أكثرهم يقيناً بمعتقداتهم وأكثرهم اهتماماً حقيقياً بنتيجة جمهورهم.</p><p>الحضور يضخّم أي رسالة تحملها. رسالة ضعيفة مُقدَّمة بيقين ستتفوق على رسالة رائعة مقدمة بشك. لهذا السبب تتفوق الندوات المكتوبة على غير المكتوبة — المتحدث تدرّب حتى أصبح يقينه معدياً.</p></div><div class="highlight-box">اليقين هو أكثر أداة تواصل معدية. لا يتبع الناس رسلاً يبدون غير متأكدين. تدرّب حتى تؤمن به تماماً.</div></div>`}},
'ex-false-beliefs':{en:'Identifying False Beliefs',ar:'تحديد المعتقدات الخاطئة',book:'Expert Secrets',chapter:'Chapter 2',source:'expert',xp:75,content:{en:`<div class="lesson-section"><div class="section-title">False Beliefs Block Every Sale</div><div class="lesson-content"><p>Before you can install the three buying beliefs, you must first identify and dismantle the false beliefs that block them. A false belief is any story a prospect tells themselves about why your solution won't work for them specifically. These false beliefs are the real objections — not the ones they voice, but the ones they silently hold.</p><p>Brunson maps false beliefs in three categories: false beliefs about the vehicle (funnels don't work), about themselves (I'm not tech-savvy enough), and about external factors (I don't have enough time/money). Each category requires its own cure — a story or demonstration that collapses the false belief and replaces it with a new one.</p></div><div class="highlight-box">Your prospect has a reason they haven't solved this problem yet. That reason is a false belief. Name it, empathize with it, then collapse it with a story.</div></div><div class="lesson-section"><div class="section-title">Three Categories of False Beliefs</div><div class="framework-grid"><div class="framework-card"><div class="ficon">🚗</div><div class="ftitle">Vehicle False Belief</div><div class="fdesc">"Funnels/courses/coaching don't work." Cure: vehicle story.</div></div><div class="framework-card"><div class="ficon">😰</div><div class="ftitle">Internal False Belief</div><div class="fdesc">"I'm not smart/tech/good enough." Cure: identity story.</div></div><div class="framework-card"><div class="ficon">🌍</div><div class="ftitle">External False Belief</div><div class="fdesc">"I don't have time/money/right market." Cure: external story.</div></div></div><div class="lesson-content" style="margin-top:16px"><p>List the top 3 reasons people don't buy your offer. Those are almost certainly false beliefs. For each, write a one-paragraph story from your life or a client's life that shows that belief collapsing.</p></div></div>`,ar:`<div class="lesson-section"><div class="section-title">المعتقدات الخاطئة تحجب كل بيعة</div><div class="lesson-content"><p>قبل أن تستطيع تثبيت معتقدات الشراء الثلاثة، يجب أولاً تحديد وتفكيك المعتقدات الخاطئة التي تحجبها. المعتقد الخاطئ هو أي قصة يحكيها العميل المحتمل لنفسه عن سبب عدم نجاح حلك لحالته تحديداً. هذه المعتقدات الخاطئة هي الاعتراضات الحقيقية — ليس تلك التي يصوّتون عليها، بل تلك التي يحملونها بصمت.</p><p>يصنّف برانسون المعتقدات الخاطئة في ثلاثة فئات: معتقدات خاطئة عن الوسيلة (القمع لا يعمل)، وعن أنفسهم (لست خبيراً تقنياً كافياً)، وعن العوامل الخارجية (ليس لدي وقت/مال كافٍ). كل فئة تتطلب علاجها الخاص — قصة أو عرضاً يُسقط المعتقد الخاطئ ويستبدله بجديد.</p></div><div class="highlight-box">عميلك المحتمل لديه سبب لعدم حله هذه المشكلة بعد. ذلك السبب هو معتقد خاطئ. سمّه وتعاطف معه ثم أسقطه بقصة.</div></div>`}},
'ex-breaking-beliefs':{en:'Breaking False Beliefs',ar:'كسر المعتقدات الخاطئة',book:'Expert Secrets',chapter:'Chapter 2',source:'expert',xp:75,content:{en:`<div class="lesson-section"><div class="section-title">Collapsing False Beliefs</div><div class="lesson-content"><p>Breaking false beliefs requires replacing each old story with a new one that serves the buyer. The pattern is Recognize → Empathize → Story → New Belief. You name their false belief, validate that it's understandable, then tell a story where that belief crumbled for someone just like them.</p><p>Each false belief needs its own story. No amount of logic dismantles an emotional story — only a better emotional story can.</p></div><div class="highlight-box">The method is: name the false belief, share a story that collapses it, then plant the new belief that makes buying feel right.</div></div><div class="lesson-section"><div class="section-title">The Process</div><div class="framework-grid"><div class="framework-card"><div class="ficon">🎯</div><div class="ftitle">Recognize It</div><div class="fdesc">Name the exact false belief out loud.</div></div><div class="framework-card"><div class="ficon">❤️</div><div class="ftitle">Empathize</div><div class="fdesc">Validate why they feel this way.</div></div><div class="framework-card"><div class="ficon">📖</div><div class="ftitle">Story It Away</div><div class="fdesc">Tell the story where this belief falls apart.</div></div></div><div class="lesson-content" style="margin-top:16px"><p>For each false belief on your list, write a story that names it, empathizes with it, and shows it crumbling. This is how you earn the right to sell.</p></div></div>`,ar:`<div class="lesson-section"><div class="section-title">كسر المعتقدات الخاطئة</div><div class="lesson-content"><p>كسر المعتقدات الخاطئة يتطلب استبدال كل قصة قديمة بأخرى جديدة تخدم المشتري. النمط هو التعرف → التعاطف → القصة → المعتقد الجديد. أنت تسمّي معتقدهم الخاطئ وتؤكد أنه مفهوم ثم تروي قصة تنهار فيها تلك المعتقد لشخص مثلهم تماماً.</p><p>كل معتقد خاطئ يحتاج قصته الخاصة. لا قدر من المنطق يفكك قصة عاطفية — فقط قصة عاطفية أفضل تستطيع ذلك.</p></div><div class="highlight-box">الطريقة هي: سمّ المعتقد الخاطئ، شارك قصة تُسقطه، ثم ازرع المعتقد الجديد الذي يجعل الشراء يبدو صحيحاً.</div></div>`}},
'ex-reframing':{en:'Reframing & New Beliefs',ar:'إعادة الإطار والمعتقدات الجديدة',book:'Expert Secrets',chapter:'Chapter 2',source:'expert',xp:75,content:{en:`<div class="lesson-section"><div class="section-title">Reframing the Objection</div><div class="lesson-content"><p>Reframing is the art of presenting the same fact in a context that produces a different belief. When a prospect says 'this is too expensive,' the reframe isn't 'no it isn't' — it's 'what would it cost you not to solve this for another year?' Price reframes turn cost into investment.</p><p>Every objection is a question in disguise. A price objection is 'I haven't yet seen enough value.' A time objection is 'I don't yet believe this will work for me.' Reframing addresses the question beneath the objection.</p></div><div class="highlight-box">The fastest reframe is a question: 'What would it cost you to stay where you are for another 12 months?'</div></div><div class="lesson-section"><div class="section-title">Reframing Tools</div><div class="framework-grid"><div class="framework-card"><div class="ficon">🔄</div><div class="ftitle">Cost vs Investment</div><div class="fdesc">Change 'too expensive' into ROI math.</div></div><div class="framework-card"><div class="ficon">❓</div><div class="ftitle">Objection as Question</div><div class="fdesc">Every objection masks a question about value.</div></div><div class="framework-card"><div class="ficon">📖</div><div class="ftitle">Story Reframes</div><div class="fdesc">A story is the most elegant frame-change tool.</div></div></div><div class="lesson-content" style="margin-top:16px"><p>Write down the top 5 objections you hear. For each, draft a reframe question that turns the objection into a conversation about value rather than price.</p></div></div>`,ar:`<div class="lesson-section"><div class="section-title">إعادة إطار الاعتراض</div><div class="lesson-content"><p>إعادة الإطار هي فن تقديم نفس الحقيقة في سياق ينتج معتقداً مختلفاً. عندما يقول العميل 'هذا غالٍ جداً'، إعادة الإطار ليست 'لا ليس كذلك' — بل 'ماذا سيكلفك عدم حل هذا لمدة عام آخر؟' إعادة إطار السعر تحوّل التكلفة إلى استثمار.</p><p>كل اعتراض هو سؤال متنكر. اعتراض السعر هو 'لم أرَ بعد قيمة كافية.' اعتراض الوقت هو 'لا أؤمن بعد أن هذا سينجح معي.' إعادة الإطار تعالج السؤال تحت الاعتراض.</p></div><div class="highlight-box">أسرع إعادة إطار هي سؤال: 'ماذا سيكلفك البقاء حيث أنت لـ12 شهراً أخرى؟'</div></div>`}},
'ex-epiphany-bridge':{en:'The Epiphany Bridge — Selling Through Stories',ar:'جسر الإلهام — البيع من خلال القصص',book:'Expert Secrets',chapter:'Section 2: Creating Belief',source:'expert',xp:100,content:{en:`<div class="lesson-section"><div class="section-title">The Science of Story-Based Selling</div><div class="lesson-content"><p>The Epiphany Bridge is Russell Brunson's framework for using stories to help people <strong>experience the same "aha" moment</strong> you had when you discovered your product, service, or idea. Instead of using logic to convince, you use story to create <em>the same emotional feeling</em>.</p><p>Here's the insight: <strong>people buy emotionally and justify rationally.</strong> The Epiphany Bridge creates the emotion. Logic supports the decision after it's already made.</p></div><div class="highlight-box"><strong>Key Insight from Expert Secrets:</strong> "The goal of the Epiphany Bridge script is to create an 'aha' moment in your prospects' minds that gets them excited and ready to buy, without feeling like they are being sold."</div></div><div class="lesson-section"><div class="section-title">The 8-Step Epiphany Bridge Script</div><ul class="step-list"><li class="step-item"><strong>The Backstory:</strong> Set up your character (you, pre-epiphany). Where were you? What was your struggle? The audience must see themselves in you.</li><li class="step-item"><strong>The Desire:</strong> What did you want? What was the dream? State the external goal AND the internal desire beneath it.</li><li class="step-item"><strong>The Wall:</strong> What blocked you? The obstacle that seemed impossible. This creates the dramatic tension.</li><li class="step-item"><strong>The Epiphany:</strong> The moment of realization. "Then I discovered..." "Then someone showed me..." This is the pivot point of the story.</li><li class="step-item"><strong>The Plan:</strong> What steps did you take after the epiphany? Shows them the path forward.</li><li class="step-item"><strong>The Conflict:</strong> What problems did you face implementing the plan? Shows you're real and the path is realistic.</li><li class="step-item"><strong>The Achievement:</strong> The result. What did you achieve? Must be specific and credible.</li><li class="step-item"><strong>The Transformation:</strong> Who are you NOW? The transformation that happened beyond the external result. This is the deepest emotional resonance.</li></ul></div><div class="lesson-section"><div class="section-title">Case Study: Tony Robbins' Epiphany Bridge</div><div class="info-box"><strong>Backstory:</strong> Grew up poor, family didn't have enough food for Thanksgiving dinner.<br><br><strong>Wall:</strong> Believed success was for "other people" — not someone like him.<br><br><strong>Epiphany:</strong> Attended a seminar where someone said: "The quality of your life is the quality of your communication." Realized his internal dialogue was the problem.<br><br><strong>Achievement:</strong> Built a multi-million dollar empire helping others achieve what he achieved.<br><br><strong>Transformation:</strong> From boy ashamed of his family to man who feeds millions through charity. The product (personal development) becomes the bridge between before and after.</div></div>`,ar:`<div class="lesson-section"><div class="section-title">علم البيع القائم على القصص</div><div class="lesson-content"><p>جسر الإلهام هو إطار راسل برانسون لاستخدام القصص لمساعدة الناس على <strong>تجربة نفس لحظة "آها"</strong> التي مررت بها عند اكتشاف منتجك.</p></div></div>`}},
'ex-heros-journey':{en:"The Hero's Two Journeys",ar:'رحلتا البطل',book:'Expert Secrets',chapter:'Chapter 3',source:'expert',xp:75,content:{en:`<div class="lesson-section"><div class="section-title">The Two Journeys</div><div class="lesson-content"><p>In Expert Secrets, Brunson teaches that every great story has two journeys: the external journey (what happens in the world) and the internal journey (what happens inside the character). The external journey is the plot — the events, the action, the visible results. The internal journey is the transformation — the change in belief, identity, and self-understanding.</p><p>Your prospects don't just want the external result — they want the internal transformation that comes with it. A weight loss product sells the external result (losing 20 pounds) but the internal journey is the feeling of confidence, self-worth, and control over one's life.</p></div><div class="highlight-box">People buy the external result for the internal transformation it promises. Sell both journeys.</div></div><div class="lesson-section"><div class="section-title">Mapping the Journeys</div><div class="framework-grid"><div class="framework-card"><div class="ficon">🌍</div><div class="ftitle">External Journey</div><div class="fdesc">The visible events, actions, and results.</div></div><div class="framework-card"><div class="ficon">🧠</div><div class="ftitle">Internal Journey</div><div class="fdesc">The shift in belief, identity, and self-perception.</div></div><div class="framework-card"><div class="ficon">💡</div><div class="ftitle">The Bridge</div><div class="fdesc">The product/service connects external action to internal transformation.</div></div></div><div class="lesson-content" style="margin-top:16px"><p>For your main offer, write out both journeys. What external result does the customer get? What internal transformation happens as a result? Your copy should speak to both.</p></div></div>`,ar:`<div class="lesson-section"><div class="section-title">الرحلتان</div><div class="lesson-content"><p>في Expert Secrets، يعلّم برانسون أن كل قصة عظيمة لها رحلتان: الرحلة الخارجية (ما يحدث في العالم) والرحلة الداخلية (ما يحدث داخل الشخصية). الرحلة الخارجية هي الحبكة — الأحداث، العمل، النتائج المرئية. الرحلة الداخلية هي التحوّل — التغيير في المعتقد والهوية وفهم الذات.</p><p>عملاؤك المحتملون لا يريدون النتيجة الخارجية فقط — بل يريدون التحوّل الداخلي الذي يأتي معها. منتج خسارة الوزن يبيع النتيجة الخارجية (خسارة 20 رطلاً) لكن الرحلة الداخلية هي الشعور بالثقة وقيمة الذات والسيطرة على الحياة.</p></div><div class="highlight-box">الناس يشترون النتيجة الخارجية للتحوّل الداخلي الذي تعد به. بع كلا الرحلتين.</div></div>`}},
'ex-story-selling':{en:'Story Selling',ar:'البيع بالقصة',book:'Expert Secrets',chapter:'Chapter 3',source:'expert',xp:75,content:{en:`<div class="lesson-section"><div class="section-title">Stories Are the Shortcut to Trust</div><div class="lesson-content"><p>Story selling is the practice of embedding your sales message inside a narrative structure. The prospect doesn't feel sold to — they feel understood, entertained, and then naturally drawn to the conclusion that your offer is the solution they've been looking for.</p><p>The secret to story selling is that stories bypass the logical brain's defense mechanisms. When someone hears a story, their brain releases oxytocin — the trust hormone. Logic triggers skepticism; story triggers connection.</p></div><div class="highlight-box">Facts tell; stories sell. A well-told story makes the price disappear and the value appear.</div></div><div class="lesson-section"><div class="section-title">The Story Selling Framework</div><div class="framework-grid"><div class="framework-card"><div class="ficon">🎭</div><div class="ftitle">Character</div><div class="fdesc">The protagonist the audience identifies with.</div></div><div class="framework-card"><div class="ficon">⚔️</div><div class="ftitle">Conflict</div><div class="fdesc">The struggle that creates dramatic tension.</div></div><div class="framework-card"><div class="ficon">🏁</div><div class="ftitle">Resolution</div><div class="fdesc">The transformation your offer makes possible.</div></div></div><div class="lesson-content" style="margin-top:16px"><p>For your next sales page, start with the story. Don't write features — write the journey. The features are just the tools used along the way.</p></div></div>`,ar:`<div class="lesson-section"><div class="section-title">القصص هي اختصار للثقة</div><div class="lesson-content"><p>البيع بالقصة هو ممارسة تضمين رسالة المبيعات داخل بنية سردية. لا يشعر العميل بأنه مباع له — بل يشعر بالفهم والتسلية ثم يُسحب بشكل طبيعي إلى استنتاج أن عرضك هو الحل الذي كان يبحث عنه.</p><p>سر البيع بالقصة هو أن القصص تتجاوز آليات الدفاع في الدماغ المنطقي. عندما يسمع شخص قصة، يطلق دماغه الأوكسيتوسين — هرمون الثقة. المنطق يثير الشك؛ القصة تثير الاتصال.</p></div><div class="highlight-box">الحقائق تخبر؛ القصص تبيع. القصة المروية جيداً تجعل السعر يختفي والقيمة تظهر.</div></div>`}},
'ex-movement-framework':{en:'Creating a Mass Movement',ar:'إنشاء حركة جماهيرية',book:'Expert Secrets',chapter:'Section 1: Creating Your Mass Movement',source:'expert',xp:125,content:{en:`<div class="lesson-section"><div class="section-title">Beyond Products — Building a Movement</div><div class="lesson-content"><p>Russell Brunson's Expert Secrets reveals that the most successful businesses don't sell products — they <strong>lead movements.</strong> Apple didn't sell computers, they led a revolution against conformity. Nike doesn't sell shoes, they sell the belief that everyone is an athlete.</p><p>A mass movement has three components that separate it from a simple business.</p></div></div><div class="lesson-section"><div class="section-title">The 3 Components of a Mass Movement</div><div class="framework-grid"><div class="framework-card"><div class="ficon">👤</div><div class="ftitle">Charismatic Leader</div><div class="fdesc">The Attractive Character. Someone the audience can project their hopes onto and follow through uncertainty.</div></div><div class="framework-card"><div class="ficon">🌅</div><div class="ftitle">Future-Based Cause</div><div class="fdesc">A vision of the world as it SHOULD be. What will existence look like when your followers adopt your ideas?</div></div><div class="framework-card"><div class="ficon">🚗</div><div class="ftitle">New Opportunity</div><div class="fdesc">NOT an improvement on an existing solution. A completely NEW vehicle — a new mechanism that creates new hope.</div></div></div><div class="lesson-content" style="margin-top:16px"><div class="highlight-box"><strong>The Most Critical Decision in Expert Secrets:</strong><br><br><strong>Improvement Offer (WEAK):</strong> "Better SEO strategies to grow your business"<br>↳ People feel shame (they should have done this already), resistance (they've tried before), and comparison shopping<br><br><strong>New Opportunity (STRONG):</strong> "The Content Funnel System — a new way to turn social media posts into clients without ads"<br>↳ People feel hope, excitement, and belief that THIS time will be different because the vehicle is different</div></div></div>`,ar:`<div class="lesson-section"><div class="section-title">ما وراء المنتجات — بناء حركة</div><div class="lesson-content"><p>يكشف كتاب "أسرار الخبير" لراسل برانسون أن أنجح الأعمال لا تبيع منتجات — بل <strong>تقود الحركات.</strong></p></div></div>`}},
'ex-future-cause':{en:'Future-Based Cause',ar:'القضية المستقبلية',book:'Expert Secrets',chapter:'Chapter 4',source:'expert',xp:75,content:{en:`<div class="lesson-section"><div class="section-title">The Cause That Unites</div><div class="lesson-content"><p>A future-based cause is a vision of the world as it should be. It's not about your product — it's about the change you want to see in the world. Your cause gives people a reason to join your movement beyond just buying a product. It gives them identity, purpose, and belonging.</p><p>Brunson teaches that a powerful cause is never about 'me.' It's about 'us' and 'the world we want to build.' When people believe in your cause, they become missionaries for your brand, not just customers.</p></div><div class="highlight-box">If you want to build a movement, give people something bigger than themselves to believe in.</div></div><div class="lesson-section"><div class="section-title">Crafting Your Cause</div><div class="framework-grid"><div class="framework-card"><div class="ficon">🌍</div><div class="ftitle">The Problem</div><div class="fdesc">What's wrong with the world today that you want to fix?</div></div><div class="framework-card"><div class="ficon">🌟</div><div class="ftitle">The Vision</div><div class="fdesc">What does the world look like when your cause succeeds?</div></div><div class="framework-card"><div class="ficon">🚀</div><div class="ftitle">The Call</div><div class="fdesc">What are you inviting people to join?</div></div></div><div class="lesson-content" style="margin-top:16px"><p>Write your cause statement: "We believe that [the world should be this way]. We're building [this vehicle] to make it happen. Join us." This is the heart of your movement.</p></div></div>`,ar:`<div class="lesson-section"><div class="section-title">القضية التي توحّد</div><div class="lesson-content"><p>القضية المستقبلية هي رؤية للعالم كما ينبغي أن يكون. لا تتعلق بمنتجك — بل بالتغيير الذي تريد رؤيته في العالم. قضيتك تمنح الناس سبباً للانضمام لحركتك يتجاوز مجرد شراء منتج. تمنحهم هوية وهدفاً وانتماءً.</p><p>يعلّم برانسون أن القضية القوية ليست أبداً عن 'أنا.' إنها عن 'نحن' و 'العالم الذي نريد بناؤه.' عندما يؤمن الناس بقضيتك، يصبحون مبشرين لعلامتك التجارية، ليس مجرد عملاء.</p></div><div class="highlight-box">إذا أردت بناء حركة، امنح الناس شيئاً أكبر منهم ليؤمنوا به.</div></div>`}},
'ex-new-opportunity':{en:'The New Opportunity',ar:'الفرصة الجديدة',book:'Expert Secrets',chapter:'Chapter 4',source:'expert',xp:75,content:{en:`<div class="lesson-section"><div class="section-title">New Vehicle, New Hope</div><div class="lesson-content"><p>The New Opportunity is the mechanism through which your cause becomes real. It's not an improvement on an existing solution — it's a completely new vehicle. Brunson teaches that people are not inspired by 'better' — they are inspired by 'different.'</p><p>A New Opportunity creates a new category in the mind of the prospect. When you have a new vehicle, you own the category. You're not competing with everyone else — you're in a race of one.</p></div><div class="highlight-box">Don't improve the old way. Create a new way that makes the old way obsolete.</div></div><div class="lesson-section"><div class="section-title">New Opportunity Examples</div><div class="framework-grid"><div class="framework-card"><div class="ficon">📱</div><div class="ftitle">Old: SEO</div><div class="fdesc">New: Content Funnel System</div></div><div class="framework-card"><div class="ficon">🏋️</div><div class="ftitle">Old: Gym Membership</div><div class="fdesc">New: 12-Week Home Transformation Protocol</div></div><div class="framework-card"><div class="ficon">📚</div><div class="ftitle">Old: Online Course</div><div class="fdesc">New: Done-With-You Implementation Program</div></div></div><div class="lesson-content" style="margin-top:16px"><p>Take your current offer. Ask: is this an improvement on an existing solution, or is it a new vehicle? If it's just better, reframe it to be different. Name your new vehicle so it becomes a category of one.</p></div></div>`,ar:`<div class="lesson-section"><div class="section-title">وسيلة جديدة، أمل جديد</div><div class="lesson-content"><p>الفرصة الجديدة هي الآلية التي تتحقق من خلالها قضيتك. ليست تحسيناً لحل موجود — بل وسيلة جديدة تماماً. يعلّم برانسون أن الناس لا يلهمهم 'أفضل' — بل يلهمهم 'مختلف.'</p><p>الفرصة الجديدة تخلق فئة جديدة في ذهن العميل. عندما يكون لديك وسيلة جديدة، تمتلك الفئة. لا تتنافس مع الجميع — أنت في سباق منفرد.</p></div><div class="highlight-box">لا تحسّن الطريقة القديمة. أنشئ طريقة جديدة تجعل القديمة قديمة.</div></div>`}},
'ex-webinar-structure':{en:'The Perfect Webinar',ar:'الندوة المثالية',book:'Expert Secrets',chapter:'Chapter 11: The Perfect Webinar',source:'expert',xp:150,content:{en:`<div class="lesson-section"><div class="section-title">Why the Perfect Webinar Works</div><div class="lesson-content"><p>The Perfect Webinar is Russell Brunson's signature presentation framework. It's a <strong>90-minute to 2-hour presentation</strong> designed to take someone from skeptic to buyer using stories, value, and strategic selling.</p><p>This framework generates hundreds of millions of dollars annually through live webinars, automated webinars, VSLs, and in-person presentations. It works because it systematically dismantles every objection while building massive value before ever mentioning the offer.</p></div></div><div class="lesson-section"><div class="section-title">The 4-Part Perfect Webinar Structure</div><ul class="step-list"><li class="step-item"><strong>Part 1: Introduction & Big Promise (0-10 min)</strong><br>Your Big Domino statement. One belief, if believed, makes the sale inevitable. Introduce yourself via your Attractive Character backstory. Set expectations for the webinar content.</li><li class="step-item"><strong>Part 2: The One Thing (10-40 min)</strong><br>Teach ONE big idea that creates the Epiphany. Break their #1 false belief about the 'vehicle' (your methodology). Use stories, case studies, and demonstrations. DO NOT teach tactics — teach the transformation.</li><li class="step-item"><strong>Part 3: The Stack & Close (40-75 min)</strong><br>Build the stack. Reveal each element of your offer one at a time, assigning a value to each. The Stack makes it impossible to say no. Break false beliefs about internal struggles and external obstacles using stories.</li><li class="step-item"><strong>Part 4: Q&A + Closes (75-90 min)</strong><br>Answer objections in Q&A format. Use future pacing. Close repeatedly — "If you're still watching, here's why you should join today..."</li></ul></div><div class="lesson-section"><div class="section-title">The Stack Close — The Most Powerful Sales Technique</div><div class="info-box"><strong>How The Stack Works:</strong><br><br>You never present individual items and prices. You build a stack:<br><br>"You get [Element 1] — value $X... PLUS [Element 2] — value $Y... PLUS [Element 3] — value $Z... All of this would normally cost $[sum]. But today only, you get everything for just $[your price]."<br><br><strong>Psychology:</strong> The brain anchors to the total stack value ($3,000+) and compares it to your price ($497). The comparison makes your price feel like a steal, not an expense.</div></div>`,ar:`<div class="lesson-section"><div class="section-title">لماذا تنجح الندوة المثالية</div><div class="lesson-content"><p>الندوة المثالية هي إطار العرض التقديمي المميز لراسل برانسون. إنها عرض تقديمي مدته <strong>90 دقيقة إلى ساعتين</strong> مصمم لتحويل الشخص من متشكك إلى مشترٍ.</p></div></div>`}},
'ex-stack-close':{en:'The Stack Close',ar:'الإغلاق بالتكديس',book:'Expert Secrets',chapter:'Chapter 5',source:'expert',xp:75,content:{en:`<div class="lesson-section"><div class="section-title">The Stack That Changes Everything</div><div class="lesson-content"><p>The Stack Close is the most powerful closing technique in Expert Secrets. Instead of presenting the price and then listing what's included, you do the opposite: you list everything included first, assigning a value to each element, and then reveal the price as a fraction of the total value.</p><p>This technique works because of anchoring. When the brain sees a total value of $4,000 and a price of $497, the price feels small by comparison. The prospect has already done the math in their head before you even name the price.</p></div><div class="highlight-box">Build the value first. Name the price last. The gap between the two is what triggers the sale.</div></div><div class="lesson-section"><div class="section-title">Stack Components</div><div class="framework-grid"><div class="framework-card"><div class="ficon">📦</div><div class="ftitle">Core Product</div><div class="fdesc">The main transformation.</div></div><div class="framework-card"><div class="ficon">🎁</div><div class="ftitle">Bonuses</div><div class="fdesc">Each removes an objection.</div></div><div class="framework-card"><div class="ficon">💰</div><div class="ftitle">The Price</div><div class="fdesc">Revealed after the total value is stacked high.</div></div></div><div class="lesson-content" style="margin-top:16px"><p>Audit your current offer. Do you stack value before naming price? If not, rewrite your sales presentation to build the stack first. The price should feel like an afterthought.</p></div></div>`,ar:`<div class="lesson-section"><div class="section-title">التكديس الذي يغير كل شيء</div><div class="lesson-content"><p>إغلاق التكديس هو أقوى تقنية إغلاق في Expert Secrets. بدلاً من تقديم السعر ثم سرد ما يتضمنه، تفعل العكس: تسرد كل ما يتضمنه أولاً، مع تعيين قيمة لكل عنصر، ثم تكشف السعر كجزء من القيمة الإجمالية.</p><p>هذه التقنية تعمل بسبب التثبيت. عندما يرى الدماغ قيمة إجمالية 4,000$ وسعر 497$، يبدو السعر صغيراً بالمقارنة. العميل قام بالفعل بالحساب في رأسه قبل حتى أن تذكر السعر.</p></div><div class="highlight-box">ابنِ القيمة أولاً. اذكر السعر أخيراً. الفجوة بينهما هي ما يطلق البيعة.</div></div>`}},
'ex-presentation-secrets':{en:'Presentation Secrets',ar:'أسرار العروض التقديمية',book:'Expert Secrets',chapter:'Chapter 5',source:'expert',xp:75,content:{en:`<div class="lesson-section"><div class="section-title">Secrets of Great Presenters</div><div class="lesson-content"><p>Brunson teaches that great presentation is not about natural talent — it's about preparation. The best presenters rehearse, they use scripts, they know their stories, and they practice their transitions. The goal is to make the presentation feel effortless and natural, which only comes from deliberate practice.</p><p>Three secrets: first, know your opening cold. Second, know your closing cold. Third, have a structure that lets you be flexible in the middle. The middle is where you can improvise; the opening and closing must be rehearsed to perfection.</p></div><div class="highlight-box">The audience doesn't know what you planned vs. what you're improvising. They only know what they feel. Make them feel prepared.</div></div><div class="lesson-section"><div class="section-title">The Presentation Formula</div><div class="framework-grid"><div class="framework-card"><div class="ficon">🎯</div><div class="ftitle">Open Cold</div><div class="fdesc">Your opening must be memorized and tested.</div></div><div class="framework-card"><div class="ficon">🎨</div><div class="ftitle">Improvise Middle</div><div class="fdesc">The middle can flex based on the audience.</div></div><div class="framework-card"><div class="ficon">🏁</div><div class="ftitle">Close Cold</div><div class="fdesc">The close must be rehearsed to convert.</div></div></div><div class="lesson-content" style="margin-top:16px"><p>Record your next presentation. Identify the opening 2 minutes and the closing 2 minutes. Rehearse those segments until you could deliver them in your sleep. Watch how the rest of the presentation flows from that foundation.</p></div></div>`,ar:`<div class="lesson-section"><div class="section-title">أسرار العروض التقديمية العظيمة</div><div class="lesson-content"><p>يعلّم برانسون أن العرض التقديمي العظيم لا يتعلق بالموهبة الطبيعية — بل بالتحضير. أفضل المقدمين يتدرّبون، ويستخدمون النصوص، ويعرفون قصصهم، ويمارسون انتقالاتهم. الهدف هو جعل العرض يبدو سهلاً وطبيعياً، وهذا لا يأتي إلا من الممارسة المتعمدة.</p><p>ثلاثة أسرار: أولاً، اعرف افتتاحيتك عن ظهر قلب. ثانياً، اعرف ختامك عن ظهر قلب. ثالثاً، لديك هيكل يسمح لك بالمرونة في المنتصف. المنتصف هو حيث يمكنك الارتجال؛ الافتتاح والختام يجب تدريبهما إلى الكمال.</p></div><div class="highlight-box">الجمهور لا يعرف ما خططت له مقابل ما ترتجله. يعرفون فقط ما يشعرون به. اجعلهم يشعرون بأنك مستعد.</div></div>`}},
'ex-content-publishing':{en:'Content Publishing System',ar:'نظام نشر المحتوى',book:'Expert Secrets',chapter:'Chapter 6',source:'expert',xp:75,content:{en:`<div class="lesson-section"><div class="section-title">The Expert Publishing Engine</div><div class="lesson-content"><p>Brunson teaches that experts must become publishers. The old model was to create a product and then market it. The new model is to publish content that builds an audience, and then monetize the audience with offers. Publishing is the engine that powers your expert business.</p><p>Your publishing system should have three pillars: a primary platform (where you publish long-form content like a podcast, blog, or YouTube channel), a distribution system (to spread that content across social platforms), and a lead capture mechanism (that turns content consumers into list subscribers).</p></div><div class="highlight-box">Content is the engine. The funnel is the transmission. Traffic is the fuel. Publish every day.</div></div><div class="lesson-section"><div class="section-title">The Publishing System</div><div class="framework-grid"><div class="framework-card"><div class="ficon">📝</div><div class="ftitle">Primary Content</div><div class="fdesc">Your long-form hub: podcast, video, or blog.</div></div><div class="framework-card"><div class="ficon">📱</div><div class="ftitle">Distribution</div><div class="fdesc">Repurpose content across social platforms.</div></div><div class="framework-card"><div class="ficon">📧</div><div class="ftitle">Lead Capture</div><div class="fdesc">Turn content consumers into email subscribers.</div></div></div><div class="lesson-content" style="margin-top:16px"><p>Pick your primary platform. Commit to publishing once a week. Repurpose that content into 5-7 daily social posts. Every post drives to an opt-in. This is your publishing engine.</p></div></div>`,ar:`<div class="lesson-section"><div class="section-title">محرك نشر الخبير</div><div class="lesson-content"><p>يعلّم برانسون أن الخبراء يجب أن يصبحوا ناشرين. النموذج القديم كان إنشاء منتج ثم تسويقه. النموذج الجديد هو نشر محتوى يبني جمهوراً، ثم تحقيق الدخل من الجمهور بالعروض. النشر هو المحرك الذي يغذي عمل الخبير.</p><p>يجب أن يكون لنظام النشر ثلاثة أعمدة: منصة أساسية (حيث تنشر محتوى طويلاً مثل بودكاست أو مدونة أو قناة يوتيوب)، نظام توزيع (لنشر ذلك المحتوى عبر منصات التواصل)، وآلية التقاط العملاء (تحويل مستهلكي المحتوى إلى مشتركين في القائمة).</p></div><div class="highlight-box">المحتوى هو المحرك. القمع هو ناقل الحركة. الزيارات هي الوقود. انشر كل يوم.</div></div>`}},
'ex-book-funnel':{en:'Book Funnel Strategy',ar:'استراتيجية قمع الكتاب',book:'Expert Secrets',chapter:'Chapter 6',source:'expert',xp:75,content:{en:`<div class="lesson-section"><div class="section-title">The Book as a Funnel</div><div class="lesson-content"><p>Brunson's book funnel strategy is simple: use a book as a lead generation tool. The book is not the product — it's the lead magnet. You give away the book (or sell it at a low price) to attract your ideal prospects, and then you funnel them into higher-value offers.</p><p>The book establishes authority, builds trust, and educates your prospects on your unique mechanism. By the time they finish the book, they are primed to buy your high-ticket offer because they've already been through the Epiphany Bridge in the book's narrative.</p></div><div class="highlight-box">A book is not a product — it's a sales tool. Use it to build trust, not to make money.</div></div><div class="lesson-section"><div class="section-title">Book Funnel Components</div><div class="framework-grid"><div class="framework-card"><div class="ficon">📚</div><div class="ftitle">The Book</div><div class="fdesc">Your authoritative lead magnet.</div></div><div class="framework-card"><div class="ficon">🧲</div><div class="ftitle">The Bridge</div><div class="fdesc">A bonus or offer inside the book.</div></div><div class="framework-card"><div class="ficon">💰</div><div class="ftitle">The Backend</div><div class="fdesc">The high-ticket offer your readers ascend to.</div></div></div><div class="lesson-content" style="margin-top:16px"><p>If you're writing a book, write it with the funnel in mind. Every chapter should build toward the offer. The final chapter should explicitly bridge the reader into your funnel with a specific call to action.</p></div></div>`,ar:`<div class="lesson-section"><div class="section-title">الكتاب كقمع</div><div class="lesson-content"><p>استراتيجية قمع الكتاب لبرانسون بسيطة: استخدام الكتاب كأداة لتوليد العملاء المحتملين. الكتاب ليس المنتج — بل مغناطيس العملاء. تعطي الكتاب (أو تبيعه بسعر منخفض) لجذب العملاء المحلومين، ثم توجههم إلى عروض ذات قيمة أعلى.</p><p>الكتاب يثبت السلطة، ويبني الثقة، ويعلم العملاء المحتملين آليتك الفريدة. بحلول الوقت الذي ينهون فيه الكتاب، يكونون مهيئين لشراء عرضك المرتفع السعر لأنهم مروا بالفعل عبر جسر الإلهام في سرد الكتاب.</p></div><div class="highlight-box">الكتاب ليس منتجاً — بل أداة بيع. استخدمه لبناء الثقة لا لجني المال.</div></div>`}},
'ex-podcast-strategy':{en:'Podcast Strategy',ar:'استراتيجية البودكاست',book:'Expert Secrets',chapter:'Chapter 6',source:'expert',xp:75,content:{en:`<div class="lesson-section"><div class="section-title">Podcasting as a Trust Vehicle</div><div class="lesson-content"><p>Podcasting is Brunson's preferred way to build expert authority. When someone listens to you for 30-60 minutes, they develop a relationship with you. They hear your voice, your stories, and your beliefs. By the time you make an offer, they already trust you.</p><p>The podcast funnel strategy: publish episodes that teach your unique mechanism. At the end of each episode, direct listeners to a lead magnet or a specific offer. Over time, your podcast becomes a lead generation engine that runs on autopilot.</p></div><div class="highlight-box">A podcast is a 30-minute commercial that people choose to listen to. Make it worth their time, and they'll buy from you.</div></div><div class="lesson-section"><div class="section-title">Podcast Funnel Flow</div><div class="framework-grid"><div class="framework-card"><div class="ficon">🎙️</div><div class="ftitle">Episodes</div><div class="fdesc">Teach your framework through stories and examples.</div></div><div class="framework-card"><div class="ficon">🧲</div><div class="ftitle">The Offer</div><div class="fdesc">Every episode has a call to action to your lead magnet.</div></div><div class="framework-card"><div class="ficon">📊</div><div class="ftitle">The Funnel</div><div class="fdesc">Listeners become subscribers, then buyers.</div></div></div><div class="lesson-content" style="margin-top:16px"><p>Start a podcast focused on your niche. Publish weekly. Mention your lead magnet in every episode. Over 52 episodes, you build an audience that already knows, likes, and trusts you.</p></div></div>`,ar:`<div class="lesson-section"><div class="section-title">البودكاست كوسيلة ثقة</div><div class="lesson-content"><p>البودكاست هو الطريقة المفضلة لبرانسون لبناء سلطة الخبير. عندما يستمع لك شخص لمدة 30-60 دقيقة، يطور علاقة معك. يسمع صوتك وقصصك ومعتقداتك. بحلول الوقت الذي تقدم فيه عرضاً، يكونون يثقون بك بالفعل.</p><p>استراتيجية قمع البودكاست: انشر حلقات تعلّم آليتك الفريدة. في نهاية كل حلقة، وجّه المستمعين إلى مغناطيس عملاء أو عرض محدد. مع الوقت، يصبح بودكاستك محركاً لتوليد العملاء يعمل تلقائياً.</p></div><div class="highlight-box">البودكاست هو إعلان مدته 30 دقيقة يختار الناس الاستماع إليه. اجعله يستحق وقتهم، وسيشترون منك.</div></div>`}},
'tr-dream100-intro':{en:'The Dream 100 Strategy',ar:'استراتيجية قائمة الحلم المئة',book:'Traffic Secrets',chapter:'Chapter 1: Who Is Your Dream Customer?',source:'traffic',xp:100,content:{en:`<div class="lesson-section"><div class="section-title">The Fastest Path to Traffic</div><div class="lesson-content"><p>The Dream 100 is the most important concept in Traffic Secrets. The insight: <strong>your dream customers are already congregating somewhere.</strong> They're in someone else's Facebook groups, watching someone else's YouTube channel, reading someone else's email list. Your job is to infiltrate those existing audiences.</p><p>Instead of building an audience from scratch (which takes years), you <strong>borrow other people's audiences</strong> while simultaneously building your own.</p></div><div class="highlight-box"><strong>Russell's Core Principle:</strong> "Who has already congregated my dream customers, and how can I work with them to get in front of their audience?"</div></div><div class="lesson-section"><div class="section-title">Building Your Dream 100 List</div><ul class="step-list"><li class="step-item"><strong>Step 1: Define Your Dream Customer</strong><br>Before finding Dream 100 partners, get crystal clear on who your perfect customer is. What are they into? What do they buy? Where do they hang out? What are their dreams and fears?</li><li class="step-item"><strong>Step 2: Find Their Congregation Points</strong><br>Where do your dream customers hang out? Podcasts they listen to, YouTubers they follow, Facebook groups they're in, email newsletters they subscribe to, blogs they read, influencers they follow.</li><li class="step-item"><strong>Step 3: Build Your 100-Person List</strong><br>List 100 people/channels/publications that already have your dream customers. These are your Dream 100 — the people you will systematically build relationships with.</li><li class="step-item"><strong>Step 4: Dig Your Well Before You're Thirsty</strong><br>Start following, commenting, sharing, buying their products BEFORE you pitch anything. Build authentic relationships. This is the 'dig' phase — it takes 3-6 months of consistent engagement.</li><li class="step-item"><strong>Step 5: Outreach & Collaboration</strong><br>Once you've built genuine rapport, propose collaboration: "I'd love to be on your podcast / do a webinar to your list / contribute to your community." Lead with value, not your pitch.</li></ul></div><div class="lesson-section"><div class="section-title">Dream 100 Worksheet</div><div class="worksheet"><div class="worksheet-title">🎯 Build Your Dream 100 List</div><div class="worksheet-field"><div class="field-label">Describe Your Dream Customer (be specific)</div><textarea class="field-textarea" rows="3" placeholder="e.g. 28-35 year old digital marketers who want to start a side business, currently making $40-80K, frustrated with their 9-5, watch Gary Vee, read marketing blogs..."></textarea></div><div class="worksheet-field"><div class="field-label">Top 10 Podcasts Your Dream Customer Listens To</div><textarea class="field-textarea" rows="3"></textarea></div><div class="worksheet-field"><div class="field-label">Top 10 YouTube Channels They Watch</div><textarea class="field-textarea" rows="3"></textarea></div><div class="worksheet-field"><div class="field-label">Top 5 Facebook Groups / Communities</div><textarea class="field-textarea" rows="2"></textarea></div></div></div>`,ar:`<div class="lesson-section"><div class="section-title">أسرع طريق للزيارات</div><div class="lesson-content"><p>قائمة الحلم المئة هي أهم مفهوم في أسرار الزيارات. الفكرة: <strong>عملاؤك المثاليون يتجمعون بالفعل في مكان ما.</strong></p></div></div>`}},
'tr-build-list':{en:'Building Your Dream 100 List',ar:'بناء قائمة الحلم المئة',book:'Traffic Secrets',chapter:'Chapter 1',source:'traffic',xp:75,content:{en:`<div class="lesson-section"><div class="section-title">Research Before Outreach</div><div class="lesson-content"><p>Building your Dream 100 list starts with research. You identify the 100 (or more) people, channels, podcasts, newsletters, and communities where your dream customers already spend time. The list is built by platform — Instagram accounts, YouTube channels, Facebook Groups, email newsletters, podcasts, and so on — so you can work each platform systematically.</p><p>The list is a living document. You add partners as you discover them and move them through stages: researched → following → engaging → relationship → collaborated. The goal is to eventually work your way into the audiences of all 100, either by buying ads to them or getting your Dream 100 to promote you.</p></div><div class="highlight-box">Every platform has its top 100 players. Your Dream 100 list is the answer to the question: where do my people already gather?</div></div><div class="lesson-section"><div class="section-title">List Building by Platform</div><div class="framework-grid"><div class="framework-card"><div class="ficon">📺</div><div class="ftitle">YouTube</div><div class="fdesc">Find the top channels your audience subscribes to.</div></div><div class="framework-card"><div class="ficon">📧</div><div class="ftitle">Newsletters</div><div class="fdesc">Find email lists your customers already read.</div></div><div class="framework-card"><div class="ficon">🎙️</div><div class="ftitle">Podcasts</div><div class="fdesc">Identify the shows that hold your audience's attention.</div></div></div><div class="lesson-content" style="margin-top:16px"><p>Start your list today: open a spreadsheet, create columns for Name, Platform, Audience Size, and Stage. Fill in 20 entries this week and research how each one monetizes their audience.</p></div></div>`,ar:`<div class="lesson-section"><div class="section-title">البحث قبل التواصل</div><div class="lesson-content"><p>بناء قائمة الحلم المئة يبدأ بالبحث. تحدد 100 (أو أكثر) من الأشخاص والقنوات والبودكاستات والنشرات الإخبارية والمجتمعات حيث يقضي عملاؤك المحلومون وقتهم بالفعل. تُبنى القائمة حسب المنصة — حسابات إنستغرام، قنوات يوتيوب، مجموعات فيسبوك، نشرات بريد إلكتروني، بودكاستات وما إلى ذلك — حتى تستطيع العمل على كل منصة بشكل منهجي.</p><p>القائمة وثيقة حية. تضيف شركاء بمجرد اكتشافهم وتنقلهم عبر مراحل: مبحوث → متابَع → مُتفاعَل معه → علاقة → متعاوَن معه. الهدف في نهاية المطاف هو الوصول إلى جماهير الـ100 بأكملهم، إما بشراء إعلانات لهم أو الحصول على ترويج قائمة الحلم لك.</p></div><div class="highlight-box">كل منصة لها أفضل 100 لاعب. قائمة الحلم المئة هي الإجابة على السؤال: أين يتجمع ناسي بالفعل؟</div></div>`}},
'tr-outreach':{en:'Dream 100 Outreach',ar:'التواصل مع قائمة الحلم',book:'Traffic Secrets',chapter:'Chapter 1',source:'traffic',xp:75,content:{en:`<div class="lesson-section"><div class="section-title">The Art of the Ask</div><div class="lesson-content"><p>Most Dream 100 outreach fails because people ask too soon. The framework requires relationship-first: you follow your Dream 100, comment thoughtfully on their content, share their work, buy their products, and leave genuine reviews before you ever ask for anything. Brunson calls this 'digging your well before you're thirsty.'</p><p>The ask itself must be framed as a win for them, not for you. A joint venture proposal should explain what's in it for their audience — the value they'll receive. Successful Dream 100 outreach leads to podcast appearances, affiliate promotions, email swaps, and co-webinars that put you in front of built audiences you couldn't afford to build alone.</p></div><div class="highlight-box">Lead with value for their audience, not with what you want. The best Dream 100 deals feel like gifts, not asks.</div></div><div class="lesson-section"><div class="section-title">Outreach Sequence</div><div class="framework-grid"><div class="framework-card"><div class="ficon">🌱</div><div class="ftitle">Grow First</div><div class="fdesc">Follow, engage, and buy for months before asking.</div></div><div class="framework-card"><div class="ficon">🎁</div><div class="ftitle">Lead with Value</div><div class="fdesc">Frame the ask around what their audience gains.</div></div><div class="framework-card"><div class="ficon">🤝</div><div class="ftitle">Long-Term View</div><div class="fdesc">One JV relationship outlasts 100 cold ads.</div></div></div><div class="lesson-content" style="margin-top:16px"><p>Pick your top 5 Dream 100 targets. Spend the next 30 days engaging genuinely with each — buy something, comment publicly, share their work. Only after that consistent investment do you reach out with a proposal.</p></div></div>`,ar:`<div class="lesson-section"><div class="section-title">فن الطلب</div><div class="lesson-content"><p>معظم تواصل الحلم المئة يفشل لأن الناس يطلبون بسرعة. الإطار يتطلب أولاً علاقة: تتابع قائمتك المئة، وتعلّق بتفكير على محتواهم، وتشارك عملهم، وتشتري منتجاتهم، وتترك مراجعات حقيقية قبل أن تطلب أي شيء. يسمّي برانسون هذا 'احفر بئرك قبل أن تكون عطشاناً.'</p><p>الطلب نفسه يجب أن يُقدَّم كفوز لهم لا لك. اقتراح مشروع مشترك يجب أن يشرح ما فيه لجمهورهم — القيمة التي سيحصلون عليها. التواصل الناجح مع الحلم المئة يقود إلى ظهور في بودكاستات وترويج تابع وتبادل إيميل وندوات مشتركة تضعك أمام جماهير مبنية لم تكن تستطيع بناءها وحدك.</p></div><div class="highlight-box">ابدأ بقيمة لجمهورهم لا بما تريد. أفضل صفقات الحلم المئة تبدو هدايا لا طلبات.</div></div>`}},
'tr-content-strategy':{en:'Organic Content Strategy',ar:'استراتيجية المحتوى العضوي',book:'Traffic Secrets',chapter:'Chapter 7: Fill Your Funnel Organically',source:'traffic',xp:125,content:{en:`<div class="lesson-section"><div class="section-title">The Content Trifecta</div><div class="lesson-content"><p>Russell Brunson's organic traffic strategy is built on the concept of <strong>'publishing every single day.'</strong> But it's not about quantity — it's about the right system. He calls it the Content Trifecta: a primary content platform, distribution channels, and a list-building mechanism.</p></div><div class="framework-grid"><div class="framework-card"><div class="ficon">🎙️</div><div class="ftitle">Core Content</div><div class="fdesc">Pick ONE primary platform: blog, podcast, or YouTube. This is where you create long-form content weekly.</div></div><div class="framework-card"><div class="ficon">📱</div><div class="ftitle">Distribution</div><div class="fdesc">Repurpose core content across Instagram, TikTok, Twitter, Facebook. Each platform gets a native cut.</div></div><div class="framework-card"><div class="ficon">📧</div><div class="ftitle">List Building</div><div class="fdesc">Every piece of content drives to an opt-in page. You own your email list. You rent social platforms.</div></div></div></div><div class="lesson-section"><div class="section-title">The Daily Content System</div><ul class="step-list"><li class="step-item"><strong>Weekly Long-Form (1x/week):</strong> Create a podcast episode, YouTube video, or blog post. This is your 'hub' content — 20-60 minutes of value on one topic.</li><li class="step-item"><strong>Daily Micro-Content (7x/week):</strong> Repurpose the weekly content into 7 daily social posts. Clips, quotes, frameworks, questions — one per platform.</li><li class="step-item"><strong>Daily Email (5x/week):</strong> Send a Seinfeld-style email (story-based, entertaining, includes one call to action).</li><li class="step-item"><strong>Monthly Dream 100 Collab (1-2x/month):</strong> Appear on someone else's platform (podcast guest, Instagram Live, JV webinar).</li></ul></div>`,ar:`<div class="lesson-section"><div class="section-title">ثلاثي المحتوى</div><div class="lesson-content"><p>استراتيجية الزيارات العضوية لراسل برانسون مبنية على مفهوم <strong>'النشر كل يوم.'</strong></p></div></div>`}},
'tr-seo-basics':{en:'SEO Basics for Funnels',ar:'أساسيات السيو للقمع',book:'Traffic Secrets',chapter:'Chapter 2',source:'traffic',xp:75,content:{en:`<div class="lesson-section"><div class="section-title">SEO as a Traffic Ecosystem</div><div class="lesson-content"><p>Brunson's approach to SEO in Traffic Secrets is strategic rather than technical. The core insight is that search traffic is 'owned traffic in the making' — people who find you through a search have already expressed intent. If you can capture them with a great lead magnet, they move from rented search traffic to your own list.</p><p>The SEO strategy for funnel builders is keyword-to-funnel: identify the search terms your dream customer uses when they have a problem you solve, create content that ranks for those terms, and at the center of that content, place an irresistible lead magnet that pulls them into your funnel. SEO becomes a list-building machine, not just a traffic source.</p></div><div class="highlight-box">Search intent is the warmest cold traffic you can get. Someone searching 'how to lose weight fast' is already in problem-awareness mode — meet them with the right magnet.</div></div><div class="lesson-section"><div class="section-title">SEO-to-Funnel System</div><div class="framework-grid"><div class="framework-card"><div class="ficon">🔍</div><div class="ftitle">Keyword Intent</div><div class="fdesc">Target keywords that signal the problem you solve.</div></div><div class="framework-card"><div class="ficon">📝</div><div class="ftitle">Content Ranks</div><div class="fdesc">Blog posts and videos rank for those keywords.</div></div><div class="framework-card"><div class="ficon">🧲</div><div class="ftitle">Lead Magnet Core</div><div class="fdesc">Every piece has a magnet to pull readers into the funnel.</div></div></div><div class="lesson-content" style="margin-top:16px"><p>Write down the top 5 questions your dream customer types into Google. Create one piece of long-form content answering each, and embed a relevant lead magnet in each article. That is a five-entry SEO funnel system.</p></div></div>`,ar:`<div class="lesson-section"><div class="section-title">السيو كنظام بيئي للزيارات</div><div class="lesson-content"><p>نهج برانسون للسيو في Traffic Secrets استراتيجي لا تقني. الفكرة الأساسية هي أن زيارات البحث هي 'زيارات ملكوكة قيد التكوين' — من يجدك عبر بحث قد أعرب بالفعل عن نيّته. إذا استطعت التقاطهم بمغناطيس جيد، ينتقلون من زيارات البحث المستأجرة إلى قائمتك الخاصة.</p><p>استراتيجية السيو لبناة القمع هي الكلمة المفتاحية إلى القمع: حدد مصطلحات البحث التي يستخدمها عميلك المحلوم عندما يواجه مشكلة تحلها، أنشئ محتوى يتصدر تلك المصطلحات، وفي مركز ذلك المحتوى ضع مغناطيساً لا يقاوم يسحبهم إلى قمعك. السيو يصبح آلة بناء قوائم لا مجرد مصدر زيارات.</p></div><div class="highlight-box">نية البحث هي أدفأ زيارة باردة يمكنك الحصول عليها. من يبحث 'كيف أخسر وزناً بسرعة' هو بالفعل في وضع وعي بالمشكلة — قابله بالمغناطيس المناسب.</div></div>`}},
'tr-social-organic':{en:'Social Organic Traffic',ar:'الزيارات العضوية من السوشيال',book:'Traffic Secrets',chapter:'Chapter 2',source:'traffic',xp:75,content:{en:`<div class="lesson-section"><div class="section-title">Organic Social Systems</div><div class="lesson-content"><p>Organic social traffic is the foundation of Brunson's traffic strategy. The goal is to build a presence on social platforms where your dream customers spend time, and then systematically move them from social platforms to your email list. Social media is rental property — email is owned real estate.</p><p>The system is simple: pick one platform where your audience is most active, post daily, drive to a lead magnet, and repeat. Once you have a system that works on one platform, duplicate it on others. Consistency beats perfection.</p></div><div class="highlight-box">You rent social platforms. You own your email list. Build your house on owned land.</div></div><div class="lesson-section"><div class="section-title">The Social System</div><div class="framework-grid"><div class="framework-card"><div class="ficon">📱</div><div class="ftitle">One Platform First</div><div class="fdesc">Master one platform before expanding.</div></div><div class="framework-card"><div class="ficon">📅</div><div class="ftitle">Post Daily</div><div class="fdesc">Consistency trains the algorithm and the audience.</div></div><div class="framework-card"><div class="ficon">🧲</div><div class="ftitle">Lead Magnet</div><div class="fdesc">Every post drives to a capture page.</div></div></div><div class="lesson-content" style="margin-top:16px"><p>Choose your primary social platform. Commit to posting once daily for 30 days. Each post should end with a question or a call to action that leads to your lead magnet.</p></div></div>`,ar:`<div class="lesson-section"><div class="section-title">أنظمة التواصل العضوي</div><div class="lesson-content"><p>زيارات التواصل العضوي هي أساس استراتيجية برانسون للزيارات. الهدف هو بناء حضور على منصات التواصل حيث يقضي عملاؤك المحلومون وقتهم، ثم نقلهم بشكل منهجي من منصات التواصل إلى قائمتك البريدية. وسائل التواصل هي ممتلكات مستأجرة — البريد الإلكتروني هو عقار مملوك.</p><p>النظام بسيط: اختر منصة واحدة حيث جمهورك أكثر نشاطاً، انشر يومياً، وجّه إلى مغناطيس عملاء، وكرّر. بمجرد أن يكون لديك نظام يعمل على منصة واحدة، انسخه على منصات أخرى. الاتساق يهزم الكمال.</p></div><div class="highlight-box">تستأجر منصات التواصل. تملك قائمتك البريدية. ابنِ منزلك على أرض مملوكة.</div></div>`}},
'tr-fb-ads':{en:'Facebook & Instagram Ads',ar:'فيسبوك وإنستغرام',book:'Traffic Secrets',chapter:'Chapter 10: Paid Traffic',source:'traffic',xp:150,content:{en:`<div class="lesson-section"><div class="section-title">The Paid Traffic Mindset Shift</div><div class="lesson-content"><p>Russell Brunson's perspective on paid traffic: <strong>'If you can't buy traffic profitably, you can't scale.'</strong> Organic traffic is slow. Dream 100 is relationship-dependent. Paid traffic is the only mechanism that lets you turn $1 into $2 at scale — predictably and immediately.</p><p>But most people fail with paid ads because they treat advertising as an expense, not an investment. The key is understanding your funnel economics first.</p></div><div class="highlight-box"><strong>Critical Metric:</strong> EPC (Earnings Per Click). If your funnel earns $2 per click, you can profitably buy any traffic that costs less than $2/click. Know your numbers before you run ads.</div></div><div class="lesson-section"><div class="section-title">The 3-Tier Facebook Ad Strategy</div><ul class="step-list"><li class="step-item"><strong>Tier 1: Cold Traffic — Awareness Ads</strong><br>Target: Interest-based audiences and Lookalikes<br>Goal: Drive to lead magnet or front-end offer<br>Ad format: Video (hook-heavy), or image with curiosity headline<br>Budget: Start at $10-20/day per ad set</li><li class="step-item"><strong>Tier 2: Warm Traffic — Retargeting Ads</strong><br>Target: Website visitors, video viewers (50%+), page engagers<br>Goal: Convert to buyer<br>Ad format: Testimonials, case studies, offer-focused<br>Budget: 20-30% of cold traffic budget</li><li class="step-item"><strong>Tier 3: Hot Traffic — Customer Ads</strong><br>Target: Existing buyers<br>Goal: Upsell, ascend value ladder<br>Ad format: Exclusive offer, VIP treatment<br>Budget: Small — these people already know and trust you</li></ul></div>`,ar:`<div class="lesson-section"><div class="section-title">التحول في عقلية الإعلانات المدفوعة</div><div class="lesson-content"><p>منظور راسل برانسون في الإعلانات المدفوعة: <strong>'إذا لم تستطع شراء الزيارات بشكل مربح، فلا يمكنك التوسع.'</strong></p></div></div>`}},
'tr-google-ads':{en:'Google Ads Mastery',ar:'إتقان إعلانات جوجل',book:'Traffic Secrets',chapter:'Chapter 3',source:'traffic',xp:75,content:{en:`<div class="lesson-section"><div class="section-title">Search Intent at Scale</div><div class="lesson-content"><p>Google Ads captures intent in a way that social ads cannot. When someone types a search query, they are actively looking for a solution — not just scrolling. Brunson teaches that Google Ads are best used for capturing high-intent traffic at the bottom of the funnel.</p><p>Your Google Ads strategy should focus on problem-aware keywords and solution-aware keywords. Problem-aware keywords are searches like 'how to lose weight fast' — the prospect knows the problem but not the solution. Solution-aware keywords are searches like 'best weight loss program' — the prospect is ready to buy.</p></div><div class="highlight-box">Google Ads give you access to people who are already looking. Meet them at the exact moment of intent.</div></div><div class="lesson-section"><div class="section-title">Google Ads Funnel</div><div class="framework-grid"><div class="framework-card"><div class="ficon">🔍</div><div class="ftitle">Problem Keywords</div><div class="fdesc">Capture awareness-stage searchers with a lead magnet.</div></div><div class="framework-card"><div class="ficon">💎</div><div class="ftitle">Solution Keywords</div><div class="fdesc">Drive decision-stage searchers directly to an offer.</div></div><div class="framework-card"><div class="ficon">📊</div><div class="ftitle">Retargeting</div><div class="fdesc">Re-engage visitors who didn't convert.</div></div></div><div class="lesson-content" style="margin-top:16px"><p>Create two Google Ads campaigns: one targeting problem keywords with a lead magnet, and one targeting solution keywords with a front-end offer. Test both and scale the winner.</p></div></div>`,ar:`<div class="lesson-section"><div class="section-title">نية البحث على نطاق واسع</div><div class="lesson-content"><p>إعلانات جوجل تلتقط النية بطريقة لا تستطيع إعلانات التواصل الاجتماعي فعلها. عندما يكتب شخص استعلام بحث، يكون يبحث بنشاط عن حل — لا يتصفح فقط. يعلّم برانسون أن إعلانات جوجل هي الأفضل لالتقاط زيارات عالية النية في قاع القمع.</p><p>استراتيجية إعلانات جوجل يجب أن تركّز على الكلمات المفتاحية المدركة للمشكلة والمدركة للحل. الكلمات المدركة للمشكلة هي عمليات بحث مثل 'كيف أخسر وزناً بسرعة' — العميل يعرف المشكلة لكن لا يعرف الحل. الكلمات المدركة للحل هي عمليات بحث مثل 'أفضل برنامج لخسارة الوزن' — العميل مستعد للشراء.</p></div><div class="highlight-box">إعلانات جوجل تمنحك الوصول إلى أشخاص يبحثون بالفعل. قابلهم في لحظة النية بالضبط.</div></div>`}},
'tr-retargeting':{en:'Retargeting Systems',ar:'أنظمة إعادة الاستهداف',book:'Traffic Secrets',chapter:'Chapter 3',source:'traffic',xp:75,content:{en:`<div class="lesson-section"><div class="section-title">The Second Visit Advantage</div><div class="lesson-content"><p>Retargeting is the most efficient form of paid traffic because it reaches people who have already shown interest. They've visited your site, watched your video, or engaged with your content. The cost per click is lower, and the conversion rate is higher.</p><p>Brunson recommends a simple retargeting structure: a video retargeting campaign (show ads to people who watched 50%+ of your video), a site retargeting campaign (show ads to visitors who didn't convert), and an email retargeting campaign (send abandoned cart emails and browse-abandonment sequences).</p></div><div class="highlight-box">Hot traffic is the most profitable traffic. Retargeting lets you buy it at a discount.</div></div><div class="lesson-section"><div class="section-title">Retargeting Layers</div><div class="framework-grid"><div class="framework-card"><div class="ficon">📹</div><div class="ftitle">Video Retargeting</div><div class="fdesc">Target viewers who engaged with your content.</div></div><div class="framework-card"><div class="ficon">🌐</div><div class="ftitle">Site Retargeting</div><div class="fdesc">Bring back visitors who didn't convert.</div></div><div class="framework-card"><div class="ficon">📧</div><div class="ftitle">Email Retargeting</div><div class="fdesc">Recover abandoned carts and browse abandoners.</div></div></div><div class="lesson-content" style="margin-top:16px"><p>Set up retargeting pixels on your site today. Create a custom audience of visitors who reached your thank-you page without buying. That's your retargeting audience — show them an upsell or a downsell.</p></div></div>`,ar:`<div class="lesson-section"><div class="section-title">ميزة الزيارة الثانية</div><div class="lesson-content"><p>إعادة الاستهداف هي أكثر أشكال الزيارات المدفوعة كفاءة لأنها تصل إلى أشخاص أظهروا اهتماماً بالفعل. زاروا موقعك، أو شاهدوا فيديو، أو تفاعلوا مع محتواك. تكلفة النقرة أقل، ومعدل التحويل أعلى.</p><p>يوصي برانسون بهيكل بسيط لإعادة الاستهداف: حملة إعادة استهداف بالفيديو (عرض إعلانات لأشخاص شاهدوا 50%+ من فيديو)، حملة إعادة استهداف للموقع (عرض إعلانات للزوار الذين لم يحولوا)، وحملة إعادة استهداف بالبريد (إرسال إيميلات سلة مهملة وتسلسلات التخلي عن التصفح).</p></div><div class="highlight-box">الزيارات الساخنة هي أكثر الزيارات ربحية. إعادة الاستهداف تتيح لك شراءها بخصم.</div></div>`}},
'tr-instagram':{en:'Instagram Traffic',ar:'زيارات إنستغرام',book:'Traffic Secrets',chapter:'Chapter 4',source:'traffic',xp:75,content:{en:`<div class="lesson-section"><div class="section-title">Instagram for Funnels</div><div class="lesson-content"><p>Instagram is Brunson's preferred organic platform for building an Attractive Character. The visual nature of Instagram allows you to tell stories through photos, Reels, and Stories. The key is to use Instagram as a top-of-funnel awareness engine, driving followers to your lead magnet.</p><p>Your Instagram strategy should include: daily Stories (behind-the-scenes, personal, valuable tips), 3-5 Reels per week (hook-heavy, value-packed short videos), and 2-3 feed posts per week (educational or inspirational content with a clear call to action).</p></div><div class="highlight-box">Instagram is where your Attractive Character comes to life. Show, don't just tell.</div></div><div class="lesson-section"><div class="section-title">Instagram Engine</div><div class="framework-grid"><div class="framework-card"><div class="ficon">📸</div><div class="ftitle">Stories</div><div class="fdesc">Daily behind-the-scenes content builds connection.</div></div><div class="framework-card"><div class="ficon">🎬</div><div class="ftitle">Reels</div><div class="fdesc">Short, hook-heavy videos drive growth.</div></div><div class="framework-card"><div class="ficon">📝</div><div class="ftitle">Feed Posts</div><div class="fdesc">Educational content with CTAs drives traffic.</div></div></div><div class="lesson-content" style="margin-top:16px"><p>Start with Stories daily. Add 3 Reels per week. Put your lead magnet link in your bio and mention it in every Story. This is your Instagram-to-funnel system.</p></div></div>`,ar:`<div class="lesson-section"><div class="section-title">إنستغرام للقمع</div><div class="lesson-content"><p>إنستغرام هو المنصة العضوية المفضلة لبرانسون لبناء شخصية جذابة. الطبيعة البصرية لإنستغرام تتيح لك سرد القصص من خلال الصور وReels وStories. المفتاح هو استخدام إنستغرام كمحرك وعي في أعلى القمع، لتوجيه المتابعين إلى مغناطيس العملاء.</p><p>استراتيجيتك على إنستغرام يجب أن تشمل: Stories يومياً (خلف الكواليس، شخصي، نصائح قيمة)، 3-5 Reels أسبوعياً (خطاف قوي، فيديوهات قصيرة مليئة بالقيمة)، و2-3 منشورات في الخلاصة أسبوعياً (محتوى تعليمي أو ملهم مع دعوة واضحة للتصرف).</p></div><div class="highlight-box">إنستغرام هو المكان الذي تعيش فيه شخصيتك الجذابة. أظهر، لا تكتفِ بالإخبار.</div></div>`}},
