<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Funnel Mastery Academy | DotCom • Expert • Traffic Secrets</title>
<style>
/* ===== DESIGN TOKENS ===== */
:root {
  --primary: #1a1a2e;
  --secondary: #16213e;
  --accent: #e94560;
  --accent2: #f5a623;
  --gold: #ffd700;
  --teal: #0f3460;
  --surface: #0d0d1a;
  --card: #1e1e35;
  --card2: #252540;
  --text: #e8e8f0;
  --text-muted: #9090b0;
  --text-dim: #6060a0;
  --border: rgba(233,69,96,0.2);
  --border2: rgba(255,255,255,0.08);
  --gradient: linear-gradient(135deg, #e94560 0%, #f5a623 100%);
  --gradient2: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
  --shadow: 0 20px 60px rgba(0,0,0,0.5);
  --radius: 12px;
  --radius2: 20px;
  --font-display: 'Georgia', serif;
  --font-body: 'Segoe UI', system-ui, sans-serif;
  --font-arabic: 'Traditional Arabic', 'Arial Unicode MS', serif;
  --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

[data-theme="light"] {
  --primary: #f8f9ff;
  --secondary: #eef0ff;
  --surface: #ffffff;
  --card: #f0f2ff;
  --card2: #e8eaff;
  --text: #1a1a2e;
  --text-muted: #555580;
  --text-dim: #8080a0;
  --border: rgba(233,69,96,0.25);
  --border2: rgba(0,0,0,0.08);
  --teal: #0f3460;
  --shadow: 0 20px 60px rgba(0,0,0,0.1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  font-family: var(--font-body);
  background: var(--surface);
  color: var(--text);
  line-height: 1.7;
  overflow-x: hidden;
  transition: background 0.3s, color 0.3s;
}

[lang="ar"] body, .ar-text { font-family: var(--font-arabic); }

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--primary); }
::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }

/* ===== LOADER ===== */
#loader {
  position: fixed; inset: 0; z-index: 9999;
  background: var(--surface);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 24px;
}
.loader-logo { font-size: 3rem; animation: pulse 1.5s infinite; }
.loader-bar { width: 200px; height: 4px; background: var(--card2); border-radius: 2px; overflow: hidden; }
.loader-fill { height: 100%; background: var(--gradient); border-radius: 2px; animation: load 2s ease forwards; }
@keyframes load { from { width: 0 } to { width: 100% } }
@keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.1); } }

/* ===== TOP NAV ===== */
#topnav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  height: 60px;
  background: rgba(13,13,26,0.95);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border2);
  display: flex; align-items: center;
  padding: 0 20px;
  gap: 16px;
}
[data-theme="light"] #topnav { background: rgba(248,249,255,0.95); }
.nav-logo { font-size: 1.1rem; font-weight: 700; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; white-space: nowrap; }
.nav-spacer { flex: 1; }
.nav-btn {
  background: var(--card); border: 1px solid var(--border2);
  color: var(--text); border-radius: 8px;
  padding: 6px 14px; font-size: 0.8rem; cursor: pointer;
  transition: var(--transition); white-space: nowrap;
}
.nav-btn:hover, .nav-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
.nav-xp {
  background: var(--gradient); color: white;
  padding: 4px 12px; border-radius: 20px;
  font-size: 0.8rem; font-weight: 700;
  white-space: nowrap;
}
#hamburger { display: none; background: none; border: none; color: var(--text); font-size: 1.4rem; cursor: pointer; }

/* ===== LAYOUT ===== */
#app { display: flex; padding-top: 60px; min-height: 100vh; }

/* ===== SIDEBAR ===== */
#sidebar {
  width: 300px; min-width: 300px;
  background: var(--primary);
  border-right: 1px solid var(--border2);
  height: calc(100vh - 60px);
  position: sticky; top: 60px;
  overflow-y: auto;
  transition: transform 0.3s;
}
.sidebar-search {
  padding: 16px;
  border-bottom: 1px solid var(--border2);
}
.search-input {
  width: 100%; padding: 10px 14px;
  background: var(--card); border: 1px solid var(--border2);
  border-radius: 8px; color: var(--text);
  font-size: 0.85rem; outline: none;
  transition: var(--transition);
}
.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--text-dim); }

.sidebar-progress {
  padding: 16px;
  border-bottom: 1px solid var(--border2);
}
.progress-label { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 8px; display: flex; justify-content: space-between; }
.progress-bar { height: 6px; background: var(--card2); border-radius: 3px; overflow: hidden; margin-bottom: 4px; }
.progress-fill { height: 100%; background: var(--gradient); border-radius: 3px; transition: width 0.5s; }

.book-section { border-bottom: 1px solid var(--border2); }
.book-header {
  padding: 14px 16px; cursor: pointer;
  display: flex; align-items: center; gap: 10px;
  transition: var(--transition);
  font-weight: 600; font-size: 0.9rem;
}
.book-header:hover { background: var(--card); }
.book-icon { font-size: 1.2rem; }
.book-badge {
  margin-left: auto; font-size: 0.7rem;
  padding: 2px 8px; border-radius: 10px; color: white;
}
.badge-dotcom { background: #e94560; }
.badge-expert { background: #7b2ff7; }
.badge-traffic { background: #0984e3; }
.badge-project { background: #00b894; }
.book-toggle { margin-left: 4px; transition: transform 0.3s; font-size: 0.8rem; }
.book-section.open .book-toggle { transform: rotate(180deg); }

.module-list { display: none; }
.book-section.open .module-list { display: block; }

.module-item { padding: 10px 16px 10px 36px; cursor: pointer; font-size: 0.8rem; color: var(--text-muted); transition: var(--transition); display: flex; align-items: center; gap: 8px; }
.module-item:hover { background: var(--card); color: var(--text); }
.module-item.active { background: rgba(233,69,96,0.1); color: var(--accent); border-right: 3px solid var(--accent); }
.module-item.completed::after { content: '✓'; margin-left: auto; color: #00b894; font-size: 0.8rem; }
.module-item.locked { opacity: 0.4; cursor: not-allowed; }
.module-icon { font-size: 0.9rem; }

/* ===== MAIN CONTENT ===== */
#main { flex: 1; overflow-y: auto; min-width: 0; }
.content-area { max-width: 900px; margin: 0 auto; padding: 40px 30px; }

/* ===== DASHBOARD ===== */
.dashboard-hero {
  background: var(--gradient2);
  border-radius: var(--radius2);
  padding: 48px 40px;
  margin-bottom: 32px;
  position: relative;
  overflow: hidden;
  border: 1px solid var(--border);
}
.dashboard-hero::before {
  content: '';
  position: absolute; top: -50%; right: -10%;
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(233,69,96,0.15) 0%, transparent 70%);
  pointer-events: none;
}
.hero-eyebrow { color: var(--accent); font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 12px; }
.hero-title { font-family: var(--font-display); font-size: 2.2rem; font-weight: 700; line-height: 1.2; margin-bottom: 16px; }
.hero-title span { background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.hero-subtitle { color: var(--text-muted); font-size: 1rem; max-width: 500px; margin-bottom: 28px; }
.hero-stats { display: flex; gap: 32px; flex-wrap: wrap; }
.stat-item { text-align: center; }
.stat-num { font-size: 1.8rem; font-weight: 800; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.stat-label { font-size: 0.75rem; color: var(--text-muted); }

.card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 32px; }
.card {
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 24px;
  cursor: pointer;
  transition: var(--transition);
  position: relative;
  overflow: hidden;
}
.card:hover { transform: translateY(-4px); border-color: var(--accent); box-shadow: var(--shadow); }
.card-icon { font-size: 2rem; margin-bottom: 12px; }
.card-title { font-size: 1rem; font-weight: 700; margin-bottom: 6px; }
.card-desc { font-size: 0.8rem; color: var(--text-muted); }
.card-progress { margin-top: 16px; }
.card-accent { position: absolute; top: 0; left: 0; right: 0; height: 3px; }

/* ===== LESSON VIEW ===== */
.lesson-header { margin-bottom: 32px; }
.lesson-breadcrumb { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 12px; }
.lesson-breadcrumb span { color: var(--accent); }
.lesson-title { font-family: var(--font-display); font-size: 1.8rem; font-weight: 700; margin-bottom: 8px; line-height: 1.3; }
.lesson-meta { display: flex; gap: 16px; flex-wrap: wrap; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 20px; }
.lesson-meta-item { display: flex; align-items: center; gap: 4px; }
.source-badge { display: inline-block; padding: 3px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: 700; margin-right: 8px; }
.src-dotcom { background: rgba(233,69,96,0.2); color: #e94560; border: 1px solid rgba(233,69,96,0.3); }
.src-expert { background: rgba(123,47,247,0.2); color: #a06af9; border: 1px solid rgba(123,47,247,0.3); }
.src-traffic { background: rgba(9,132,227,0.2); color: #39a1f4; border: 1px solid rgba(9,132,227,0.3); }
.src-practice { background: rgba(0,184,148,0.2); color: #00b894; border: 1px solid rgba(0,184,148,0.3); }

.lesson-section { margin-bottom: 32px; }
.section-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.section-title::before { content: ''; display: block; width: 4px; height: 20px; background: var(--gradient); border-radius: 2px; }

.lesson-content { color: var(--text); line-height: 1.8; }
.lesson-content p { margin-bottom: 16px; }
.lesson-content strong { color: var(--accent2); }

.highlight-box {
  background: linear-gradient(135deg, rgba(233,69,96,0.08), rgba(245,166,35,0.08));
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 24px;
  margin: 20px 0;
  position: relative;
}
.highlight-box::before { content: '💡'; position: absolute; top: -12px; left: 20px; font-size: 1.2rem; }

.info-box {
  background: rgba(9,132,227,0.08);
  border: 1px solid rgba(9,132,227,0.25);
  border-radius: var(--radius);
  padding: 20px 24px;
  margin: 20px 0;
}

.framework-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin: 20px 0; }
.framework-card {
  background: var(--card2);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 20px;
  text-align: center;
  transition: var(--transition);
}
.framework-card:hover { border-color: var(--accent); transform: translateY(-2px); }
.framework-card .ficon { font-size: 2rem; margin-bottom: 10px; }
.framework-card .ftitle { font-size: 0.85rem; font-weight: 700; margin-bottom: 6px; }
.framework-card .fdesc { font-size: 0.75rem; color: var(--text-muted); }

.step-list { list-style: none; counter-reset: steps; }
.step-item {
  counter-increment: steps;
  padding: 16px 16px 16px 60px;
  position: relative;
  margin-bottom: 12px;
  background: var(--card);
  border-radius: var(--radius);
  border: 1px solid var(--border2);
}
.step-item::before {
  content: counter(steps);
  position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
  width: 32px; height: 32px;
  background: var(--gradient);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 0.85rem; color: white;
  line-height: 32px; text-align: center;
}

.funnel-visual {
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: var(--radius2);
  padding: 32px;
  margin: 24px 0;
  text-align: center;
}
.funnel-stage {
  margin: 0 auto 8px;
  border-radius: 8px;
  padding: 14px 20px;
  font-weight: 700;
  font-size: 0.9rem;
  position: relative;
  color: white;
  transition: var(--transition);
  cursor: pointer;
}
.funnel-stage:hover { transform: scale(1.02); }
.funnel-stage .stage-num { font-size: 0.7rem; opacity: 0.7; margin-right: 8px; }
.funnel-arrow { text-align: center; color: var(--text-muted); font-size: 1.2rem; margin: 4px 0; }

/* ===== QUIZ ===== */
.quiz-container {
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: var(--radius2);
  padding: 32px;
  margin: 24px 0;
}
.quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
.quiz-title { font-size: 1.1rem; font-weight: 700; }
.quiz-score-badge { background: var(--gradient); color: white; padding: 4px 14px; border-radius: 20px; font-size: 0.85rem; font-weight: 700; }
.question-block { margin-bottom: 24px; }
.question-text { font-weight: 600; margin-bottom: 14px; font-size: 0.95rem; }
.options-list { list-style: none; }
.option-item {
  padding: 12px 18px;
  border: 2px solid var(--border2);
  border-radius: 10px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: var(--transition);
  font-size: 0.9rem;
}
.option-item:hover { border-color: var(--accent); background: rgba(233,69,96,0.05); }
.option-item.selected { border-color: var(--accent2); background: rgba(245,166,35,0.1); }
.option-item.correct { border-color: #00b894; background: rgba(0,184,148,0.1); }
.option-item.wrong { border-color: #e17055; background: rgba(225,112,85,0.1); }
.option-item.disabled { cursor: not-allowed; }
.quiz-feedback { padding: 16px; border-radius: 10px; margin-top: 16px; font-size: 0.9rem; display: none; }
.feedback-correct { background: rgba(0,184,148,0.1); border: 1px solid rgba(0,184,148,0.3); color: #00b894; }
.feedback-wrong { background: rgba(225,112,85,0.1); border: 1px solid rgba(225,112,85,0.3); color: #e17055; }
.quiz-btn {
  background: var(--gradient); color: white; border: none;
  padding: 12px 28px; border-radius: 10px;
  font-size: 0.9rem; font-weight: 700; cursor: pointer;
  transition: var(--transition); margin-top: 16px;
}
.quiz-btn:hover { opacity: 0.9; transform: translateY(-1px); }

/* ===== WORKSHEET ===== */
.worksheet {
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: var(--radius2);
  padding: 32px;
  margin: 24px 0;
}
.worksheet-title { font-size: 1rem; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
.worksheet-field { margin-bottom: 18px; }
.field-label { font-size: 0.82rem; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
.field-input, .field-textarea {
  width: 100%; padding: 12px 16px;
  background: var(--card2); border: 1px solid var(--border2);
  border-radius: 8px; color: var(--text);
  font-family: var(--font-body); font-size: 0.9rem;
  outline: none; transition: var(--transition);
  resize: vertical;
}
.field-input:focus, .field-textarea:focus { border-color: var(--accent); }

/* ===== NOTES ===== */
.notes-panel {
  position: fixed; right: -400px; top: 60px; bottom: 0;
  width: 380px; background: var(--primary);
  border-left: 1px solid var(--border2);
  z-index: 500; transition: right 0.3s;
  display: flex; flex-direction: column;
}
.notes-panel.open { right: 0; }
.notes-header {
  padding: 20px; border-bottom: 1px solid var(--border2);
  display: flex; justify-content: space-between; align-items: center;
  font-weight: 700;
}
.notes-close { background: none; border: none; color: var(--text); cursor: pointer; font-size: 1.2rem; }
.notes-list { flex: 1; overflow-y: auto; padding: 16px; }
.note-card {
  background: var(--card); border-radius: 10px;
  padding: 14px; margin-bottom: 12px;
  border: 1px solid var(--border2); font-size: 0.85rem;
}
.note-meta { font-size: 0.75rem; color: var(--text-muted); margin-top: 8px; }
.note-delete { color: #e17055; cursor: pointer; font-size: 0.75rem; margin-left: 8px; }
.notes-footer { padding: 16px; border-top: 1px solid var(--border2); }
.note-input { width: 100%; padding: 12px; background: var(--card); border: 1px solid var(--border2); border-radius: 8px; color: var(--text); font-size: 0.85rem; resize: none; outline: none; margin-bottom: 10px; }
.note-input:focus { border-color: var(--accent); }

/* ===== AI TUTOR ===== */
.ai-tutor-panel {
  position: fixed; left: -420px; top: 60px; bottom: 0;
  width: 400px; background: var(--primary);
  border-right: 1px solid var(--border2);
  z-index: 500; transition: left 0.3s;
  display: flex; flex-direction: column;
}
.ai-tutor-panel.open { left: 300px; }
.ai-header { padding: 20px; border-bottom: 1px solid var(--border2); }
.ai-title { font-weight: 700; display: flex; align-items: center; gap: 8px; }
.ai-dot { width: 8px; height: 8px; background: #00b894; border-radius: 50%; animation: blink 1.5s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
.ai-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
.ai-msg {
  padding: 12px 16px; border-radius: 12px;
  font-size: 0.85rem; line-height: 1.6; max-width: 90%;
}
.ai-msg.bot { background: var(--card); border: 1px solid var(--border2); align-self: flex-start; }
.ai-msg.user { background: var(--gradient); color: white; align-self: flex-end; border-radius: 12px 12px 4px 12px; }
.ai-input-area { padding: 16px; border-top: 1px solid var(--border2); display: flex; gap: 8px; }
.ai-input {
  flex: 1; padding: 10px 14px;
  background: var(--card); border: 1px solid var(--border2);
  border-radius: 8px; color: var(--text); font-size: 0.85rem;
  outline: none;
}
.ai-input:focus { border-color: var(--accent); }
.ai-send { background: var(--gradient); border: none; color: white; padding: 10px 16px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: 700; }
.ai-quick-btns { padding: 0 16px 12px; display: flex; flex-wrap: wrap; gap: 6px; }
.ai-quick { background: var(--card2); border: 1px solid var(--border2); color: var(--text-muted); padding: 5px 10px; border-radius: 6px; font-size: 0.75rem; cursor: pointer; transition: var(--transition); }
.ai-quick:hover { border-color: var(--accent); color: var(--accent); }

/* ===== BADGES ===== */
.badges-row { display: flex; flex-wrap: wrap; gap: 12px; margin: 20px 0; }
.badge-item {
  background: var(--card);
  border: 2px solid var(--border2);
  border-radius: var(--radius);
  padding: 14px 18px;
  display: flex; align-items: center; gap: 10px;
  font-size: 0.85rem;
  transition: var(--transition);
}
.badge-item.earned { border-color: var(--gold); background: rgba(255,215,0,0.08); }
.badge-item .badge-ico { font-size: 1.5rem; }
.badge-item .badge-name { font-weight: 700; font-size: 0.8rem; }
.badge-item .badge-desc { font-size: 0.72rem; color: var(--text-muted); }

/* ===== TABS ===== */
.tabs { display: flex; gap: 4px; border-bottom: 2px solid var(--border2); margin-bottom: 24px; overflow-x: auto; }
.tab-btn {
  padding: 10px 20px; background: none; border: none;
  color: var(--text-muted); cursor: pointer;
  font-size: 0.85rem; font-weight: 600;
  border-bottom: 2px solid transparent;
  margin-bottom: -2px; white-space: nowrap;
  transition: var(--transition);
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* ===== CHECKLIST ===== */
.checklist { list-style: none; }
.checklist li {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 0; border-bottom: 1px solid var(--border2);
  font-size: 0.88rem;
}
.checklist input[type=checkbox] { margin-top: 3px; accent-color: var(--accent); cursor: pointer; flex-shrink: 0; }
.checklist li.done { text-decoration: line-through; color: var(--text-muted); }

/* ===== COMPLETION BTN ===== */
.complete-btn {
  background: var(--gradient); color: white; border: none;
  padding: 16px 40px; border-radius: 12px;
  font-size: 1rem; font-weight: 700; cursor: pointer;
  transition: var(--transition);
  display: flex; align-items: center; gap: 10px;
  margin: 32px auto 0;
}
.complete-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(233,69,96,0.4); }
.complete-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* ===== CAPSTONE ===== */
.capstone-hero {
  background: linear-gradient(135deg, #1a0030, #0f3460);
  border: 2px solid var(--gold);
  border-radius: var(--radius2);
  padding: 40px;
  text-align: center;
  margin-bottom: 32px;
}
.capstone-crown { font-size: 3rem; margin-bottom: 16px; }

function renderQuiz(id) {
  const quiz = QUIZZES[id];
  if (!quiz) return '';
  const saved = STATE.quizScores[id] || {};
  const isAr = STATE.lang === 'ar';
  
  return `
    <div class="quiz-container">
      <div class="quiz-header">
        <div class="quiz-title">${isAr?'اختبار المعرفة':'Knowledge Check'}</div>
        ${saved.score !== undefined ? `<div class="quiz-score-badge">${saved.score}/${quiz.questions.length} ${isAr?'صحيح':'correct'}</div>` : ''}
      </div>
      ${quiz.questions.map((q,qi) => `
        <div class="question-block">
          <div class="question-text">${qi+1}. ${q.q}</div>
          <ul class="options-list">
            ${q.options.map((opt,oi) => `
              <li class="option-item ${saved.answers&&saved.answers[qi]===oi?(oi===q.correct?'correct':'wrong'):(oi===q.correct&&saved.answers?'correct':'')}" 
                onclick="selectOption(this,${qi},${oi},'${id}')" ${saved.answers?'disabled':''}>
                ${String.fromCharCode(65+oi)}. ${opt}
              </li>
            `).join('')}
          </ul>
          <div class="quiz-feedback ${saved.answers&&saved.answers[qi]===q.correct?'feedback-correct':'feedback-wrong'}" style="display:${saved.answers?'block':'none'}">
            ${saved.answers&&saved.answers[qi]===q.correct?'✅ Correct! ':'❌ Incorrect. '} ${q.explanation}
          </div>
        </div>
      `).join('')}
      <button class="quiz-btn" onclick="submitQuiz('${id}')" ${saved.answers?'disabled':''}>
        ${saved.answers?(isAr?'تم الإرسال':'Submitted'):(isAr?'إرسال الإجابات':'Submit Answers')}
      </button>
    </div>
  `;
}

let selectedAnswers = {};
function selectOption(el, qi, oi, lid) {
  const items = el.parentElement.querySelectorAll('.option-item');
  items.forEach(i => i.classList.remove('selected'));
  el.classList.add('selected');
  if (!selectedAnswers[lid]) selectedAnswers[lid] = {};
  selectedAnswers[lid][qi] = oi;
}

function submitQuiz(lid) {
  const quiz = QUIZZES[lid];
  const answers = selectedAnswers[lid] || {};
  let score = 0;
  quiz.questions.forEach((q,qi) => { if (answers[qi] === q.correct) score++; });
  STATE.quizScores[lid] = { score, answers };
  localStorage.setItem('fma_quiz', JSON.stringify(STATE.quizScores));
  loadLesson(lid);
  setTimeout(() => {
    document.querySelectorAll('.tab-btn').forEach(b => { if (b.textContent.includes('Quiz') || b.textContent.includes('اختبار')) b.click(); });
  }, 100);
  showToast('📊', `Quiz complete! Score: ${score}/${quiz.questions.length}`);
  addXP(score * 25);
}

// ===== COMPLETE LESSON =====
function completeLesson(id) {
  if (STATE.completed.includes(id)) return;
  STATE.completed.push(id);
  localStorage.setItem('fma_completed', JSON.stringify(STATE.completed));
  const lesson = LESSONS[id];
  if (lesson) addXP(lesson.xp);
  updateProgress();
  checkBadges(id);
  renderCurriculum();
  showToast('🎉', `Lesson completed! +${lesson?.xp||50} XP`);
  const btn = document.querySelector('.complete-btn');
  if (btn) { btn.disabled = true; btn.textContent = '✅ Completed!'; }
  const navEl = document.getElementById('nav-' + id);
  if (navEl) navEl.classList.add('completed');
}

function addXP(amount) {
  STATE.xp += amount;
  document.getElementById('xpDisplay').textContent = '⚡ ' + STATE.xp + ' XP';
}

function updateProgress() {
  const total = ALL_LESSONS.length;
  const done = STATE.completed.length;
  const pct = Math.round((done/total)*100);
  const fill = document.getElementById('progressFill');
  const pctEl = document.getElementById('progressPct');
  const det = document.getElementById('progressDetail');
  if (fill) fill.style.width = pct + '%';
  if (pctEl) pctEl.textContent = pct + '%';
  if (det) det.textContent = `${done} / ${total} ${STATE.lang==='en'?'lessons':'دروس'}`;
}

function checkBadges(id) {
  const checks = [
    { id: 'first-lesson', test: () => STATE.completed.length >= 1 },
    { id: 'funnel-novice', test: () => STATE.completed.includes('dc-what-is-funnel') },
    { id: 'hook-master', test: () => STATE.completed.includes('dc-hook') },
    { id: 'story-teller', test: () => STATE.completed.includes('ex-epiphany-bridge') },
    { id: 'traffic-boss', test: () => STATE.completed.includes('tr-dream100-intro') },
    { id: 'graduate', test: () => STATE.completed.length >= ALL_LESSONS.length - 2 },
  ];
  checks.forEach(c => {
    if (!STATE.badges.includes(c.id) && c.test()) {
      STATE.badges.push(c.id);
      localStorage.setItem('fma_badges', JSON.stringify(STATE.badges));
      showToast('🏅', `Badge unlocked: ${c.id.replace(/-/g,' ')}!`);
    }
  });
}

// ===== NAVIGATION =====
function navigate(dir) {
  const idx = ALL_LESSONS.indexOf(STATE.currentLesson);
  if (idx === -1) return;
  const next = ALL_LESSONS[idx + dir];
  if (next) loadLesson(next);
}

// ===== SEARCH =====
function searchLessons(q) {
  const term = q.toLowerCase();
  document.querySelectorAll('.module-item[id^="nav-"]').forEach(el => {
    const text = el.textContent.toLowerCase();
    el.style.display = !term || text.includes(term) ? '' : 'none';
  });
  if (term) {
    document.querySelectorAll('.book-section').forEach(el => el.classList.add('open'));
  }
}

  const isAr = STATE.lang === 'ar';
  document.querySelectorAll('[data-en]').forEach(el => {
    const key = isAr ? 'ar' : 'en';
    if (el.dataset[key]) el.textContent = el.dataset[key];
  });
  document.querySelectorAll('[data-en-placeholder]').forEach(el => {
    const key = isAr ? 'ar' : 'en';
    if (el.dataset[key + 'Placeholder']) el.placeholder = el.dataset[key + 'Placeholder'];
  });
  const noteInput = document.getElementById('noteInput');
  if (noteInput) noteInput.placeholder = isAr ? 'أضف ملاحظة...' : 'Add a note about this lesson...';
}

// ===== NOTES =====
function toggleNotes() {
  document.getElementById('notesPanel').classList.toggle('open');
  renderNotesList();
}

function renderNotesList() {
  const list = document.getElementById('notesList');
  if (!list) return;
  const notes = STATE.notes.filter(n => !STATE.currentLesson || n.lesson === STATE.currentLesson);
  list.innerHTML = notes.length === 0 
    ? `<p style="color:var(--text-muted);font-size:0.85rem">No notes yet.</p>` 
    : notes.reverse().map((n,i) => `
      <div class="note-card">
        <div>${n.text}</div>
        <div class="note-meta">${new Date(n.ts).toLocaleDateString()} — ${n.lesson} <span class="note-delete" onclick="deleteNote(${i})">✕</span></div>
      </div>
    `).join('');
}

function saveNote() {
  const input = document.getElementById('noteInput');
  const text = input?.value?.trim();
  if (!text) return;
  STATE.notes.push({ text, lesson: STATE.currentLesson || 'general', ts: Date.now() });
  localStorage.setItem('fma_notes', JSON.stringify(STATE.notes));
  if (input) input.value = '';
  renderNotesList();
  showToast('📝', 'Note saved!');
}

function deleteNote(idx) {
  STATE.notes.splice(idx, 1);
  localStorage.setItem('fma_notes', JSON.stringify(STATE.notes));
  renderNotesList();
}

// ===== AI TUTOR (Groq · llama-3.3-70b-versatile, via Netlify Function proxy) =====
// This calls YOUR Netlify Function, not Groq directly — so the real Groq key stays
// server-side and is never exposed to visitors. The function lives at
// netlify/functions/groq-proxy.js and Netlify auto-routes it to the path below
// once deployed, on whatever domain the site ends up on.
const PROXY_API_URL = '/.netlify/functions/groq-proxy';
const AI_HISTORY_KEY = 'fma_ai_history';
const MAX_HISTORY_MESSAGES = 16; // ~8 user/assistant turns kept, to stay under Groq's free-tier token limits

function toggleAI() {
  document.getElementById('aiPanel').classList.toggle('open');
}

function loadAIHistory() {
  try { return JSON.parse(localStorage.getItem(AI_HISTORY_KEY)) || []; }
  catch (e) { return []; }
}

function saveAIHistory(history) {
  localStorage.setItem(AI_HISTORY_KEY, JSON.stringify(history));
}

// Clears the saved conversation (call this when Groq reports the context is too long,
// or whenever the student wants to start over).
function resetAIChat() {
  localStorage.removeItem(AI_HISTORY_KEY);
  const msgs = document.getElementById('aiMessages');
  if (msgs) msgs.innerHTML = '';
  addAIMessage(STATE.lang === 'ar'
    ? '👋 محادثة جديدة! ماذا تريد أن تتعلم؟'
    : "👋 New chat started! What do you want to master?", 'bot');
  showToast('🗑️', STATE.lang === 'ar' ? 'بدأت محادثة جديدة' : 'Started a new chat');
}

function renderAIHistory() {
  const history = loadAIHistory();
  const msgs = document.getElementById('aiMessages');
  if (!msgs || history.length === 0) return;
  msgs.innerHTML = '';
  history.forEach(m => addAIMessage(m.content, m.role === 'user' ? 'user' : 'bot'));
}

// Strips HTML down to plain text so lesson content can be fed into the system prompt cheaply
function stripHtml(html) {
  if (!html) return '';
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  return (tmp.textContent || tmp.innerText || '').replace(/\s+/g, ' ').trim();
}

// Grounds the tutor in the actual course content: the full current lesson, plus
// short summaries of every other written lesson. Kept compact on purpose —
// Groq's free tier caps usable tokens per request, so this is not the whole site's HTML,
// just the substance of it.
function buildSystemPrompt() {
  const lang = STATE.lang === 'ar' ? 'ar' : 'en';
  let prompt = `You are an expert marketing coach and tutor inside "Funnel Mastery Academy," a self-paced course built on Russell Brunson's books: DotCom Secrets, Expert Secrets, and Traffic Secrets. Use the course material below as your primary source of truth, in your own words — be concise, practical, and speak like a direct mentor focused on actionable advice. Always reply in the same language the student's most recent message is written in — English, Arabic, or French — even if the course content below is in a different language. Keep replies under 200 words unless asked for more detail.\n\n`;

  const current = STATE.currentLesson && LESSONS[STATE.currentLesson];
  if (current) {
    const text = stripHtml(current.content?.[lang] || current.content?.en || '').slice(0, 3000);
    prompt += `STUDENT IS CURRENTLY VIEWING — "${current[lang] || current.en}" (${current.book}, ${current.chapter}):\n${text}\n\n`;
  }

  const summaries = Object.entries(LESSONS)
    .filter(([id]) => id !== STATE.currentLesson)
    .map(([id, l]) => {
      const text = stripHtml(l.content?.[lang] || l.content?.en || '').slice(0, 220);
      return `• ${l[lang] || l.en} (${l.book}): ${text}`;
    });
  if (summaries.length) {
    prompt += `OTHER WRITTEN LESSONS IN THIS COURSE:\n${summaries.join('\n')}\n\n`;
  }

  prompt += `Most of the curriculum is still being written. If asked about a lesson not summarized above, answer from your own general knowledge of Brunson's frameworks and say it's general guidance rather than this course's exact lesson content.`;
  return prompt;
}

async function sendAIMessage() {
  const input = document.getElementById('aiInput');
  const msg = input?.value?.trim();
  if (!msg) return;

  addAIMessage(msg, 'user');
  input.value = '';

  const history = loadAIHistory();
  history.push({ role: 'user', content: msg });
  const trimmedHistory = history.slice(-MAX_HISTORY_MESSAGES);

  const thinking = document.createElement('div');
  thinking.className = 'ai-msg bot';
  thinking.textContent = STATE.lang === 'ar' ? '⏳ أفكر...' : '⏳ Thinking...';
  document.getElementById('aiMessages').appendChild(thinking);
  scrollAI();

  try {
    const res = await fetch(PROXY_API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: [{ role: 'system', content: buildSystemPrompt() }, ...trimmedHistory]
      })
    });

    if (!res.ok) {
      const errBody = await res.json().catch(() => ({}));
      const errMsg = (errBody.error?.message || '').toLowerCase();
      const isContextOverflow = res.status === 400 &&
        (errMsg.includes('context') || errMsg.includes('too long') || errMsg.includes('maximum') || errMsg.includes('reduce'));
      const isRateLimit = res.status === 429;

      if (isContextOverflow) {
        thinking.textContent = STATE.lang === 'ar'
          ? '⚠️ أصبحت هذه المحادثة طويلة جداً على النموذج. اضغط 🗑️ "محادثة جديدة" أعلى النافذة، ثم أعد سؤالك.'
          : '⚠️ This chat has gotten too long for the model to handle. Tap the 🗑️ button above to start a new chat, then ask again.';
      } else if (isRateLimit) {
        thinking.textContent = STATE.lang === 'ar'
          ? '⏳ تجاوزت الحد المسموح من الطلبات المجانية. انتظر دقيقة وحاول مجدداً.'
          : "⏳ Daily free quota reached. Try again in a bit.";
      } else {
        thinking.textContent = STATE.lang === 'ar' ? 'خطأ في الاتصال. حاول مجدداً.' : 'Connection error. Please try again.';
      }
      scrollAI();
      return;
    }

    const data = await res.json();
    const reply = data.choices?.[0]?.message?.content?.trim() ||
      (STATE.lang === 'ar' ? 'لم أتمكن من الحصول على رد.' : 'Sorry, I could not get a response.');
    thinking.textContent = reply;

    history.push({ role: 'assistant', content: reply });
    saveAIHistory(history.slice(-MAX_HISTORY_MESSAGES));
  } catch (e) {
    thinking.textContent = STATE.lang === 'ar' ? 'خطأ في الاتصال. حاول مجدداً.' : 'Connection error. Please try again.';
  }
  scrollAI();
}

function aiAsk(q) {
  const input = document.getElementById('aiInput');
  if (input) { input.value = q; sendAIMessage(); }
}

function addAIMessage(text, type) {
  const msgs = document.getElementById('aiMessages');
  if (!msgs) return;
  const div = document.createElement('div');
  div.className = `ai-msg ${type}`;
  div.textContent = text;
  msgs.appendChild(div);
  scrollAI();
}

function scrollAI() {
  const msgs = document.getElementById('aiMessages');
  if (msgs) msgs.scrollTop = msgs.scrollHeight;
}

document.getElementById('aiInput')?.addEventListener('keypress', e => { if (e.key === 'Enter') sendAIMessage(); });

// ===== TOAST =====
function showToast(icon, msg) {
  const toast = document.getElementById('toast');
  document.getElementById('toast-icon').textContent = icon;
  document.getElementById('toast-msg').textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3500);
}

// ===== ACCORDION =====
function toggleAccordion(header) {
  header.parentElement.classList.toggle('open');
}

// ===== COPY TEMPLATE =====
function copyTemplate(btn) {
  const card = btn.parentElement;
  const text = card.innerText.replace('Copy All\n','').replace('Copy\n','');
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ Copied!';
    setTimeout(() => btn.textContent = 'Copy', 2000);
  });
}

// ===== MOBILE SIDEBAR =====
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('mobile-open');
}

// ===== CERT =====
function printCert() {
  window.print();
}

// ===== KEYBOARD SHORTCUTS =====
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.getElementById('notesPanel').classList.remove('open');
    document.getElementById('aiPanel').classList.remove('open');
    document.getElementById('sidebar').classList.remove('mobile-open');
  }
  if (e.altKey && e.key === 'ArrowRight') navigate(1);
  if (e.altKey && e.key === 'ArrowLeft') navigate(-1);
});

// Click outside sidebar to close on mobile
document.getElementById('main').addEventListener('click', () => {
  if (window.innerWidth < 900) document.getElementById('sidebar').classList.remove('mobile-open');
});

// Open first book by default
setTimeout(() => {
  toggleBook('dotcom');
}, 100);
</script>
