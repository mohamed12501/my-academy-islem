<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Funnel Mastery Academy | DotCom • Expert • Traffic Secrets</title>
<style>
:root{--primary:#1a1a2e;--secondary:#16213e;--accent:#e94560;--accent2:#f5a623;--gold:#ffd700;--teal:#0f3460;--surface:#0d0d1a;--card:#1e1e35;--card2:#252540;--text:#e8e8f0;--text-muted:#9090b0;--text-dim:#6060a0;--border:rgba(233,69,96,0.2);--border2:rgba(255,255,255,0.08);--gradient:linear-gradient(135deg,#e94560 0%,#f5a623 100%);--gradient2:linear-gradient(135deg,#1a1a2e 0%,#0f3460 100%);--shadow:0 20px 60px rgba(0,0,0,0.5);--radius:12px;--radius2:20px;--font-display:'Georgia',serif;--font-body:'Segoe UI',system-ui,sans-serif;--font-arabic:'Traditional Arabic','Arial Unicode MS',serif;--transition:all 0.3s cubic-bezier(0.4,0,0.2,1)}
[data-theme="light"]{--primary:#f8f9ff;--secondary:#eef0ff;--surface:#fff;--card:#f0f2ff;--card2:#e8eaff;--text:#1a1a2e;--text-muted:#555580;--text-dim:#8080a0;--border:rgba(233,69,96,0.25);--border2:rgba(0,0,0,0.08);--shadow:0 20px 60px rgba(0,0,0,0.1)}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--surface);color:var(--text);line-height:1.7;overflow-x:hidden;transition:background .3s,color .3s}
[lang="ar"] body,.ar-text{font-family:var(--font-arabic)}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--primary)}
::-webkit-scrollbar-thumb{background:var(--accent);border-radius:3px}
#loader{position:fixed;inset:0;z-index:9999;background:var(--surface);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px}
.loader-logo{font-size:3rem;animation:pulse 1.5s infinite}
.loader-bar{width:200px;height:4px;background:var(--card2);border-radius:2px;overflow:hidden}
.loader-fill{height:100%;background:var(--gradient);border-radius:2px;animation:load 2s ease forwards}
@keyframes load{from{width:0}to{width:100%}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
#topnav{position:fixed;top:0;left:0;right:0;z-index:1000;height:60px;background:rgba(13,13,26,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border2);display:flex;align-items:center;padding:0 20px;gap:16px}
[data-theme="light"] #topnav{background:rgba(248,249,255,0.95)}
.nav-logo{font-size:1.1rem;font-weight:700;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
.nav-spacer{flex:1}
.nav-btn{background:var(--card);border:1px solid var(--border2);color:var(--text);border-radius:8px;padding:6px 14px;font-size:.8rem;cursor:pointer;transition:var(--transition);white-space:nowrap}
.nav-btn:hover,.nav-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.nav-xp{background:var(--gradient);color:#fff;padding:4px 12px;border-radius:20px;font-size:.8rem;font-weight:700;white-space:nowrap}
#hamburger{display:none;background:none;border:none;color:var(--text);font-size:1.4rem;cursor:pointer}
#app{display:flex;padding-top:60px;min-height:100vh}
#sidebar{width:300px;min-width:300px;background:var(--primary);border-right:1px solid var(--border2);height:calc(100vh - 60px);position:sticky;top:60px;overflow-y:auto;transition:transform .3s}
.sidebar-search{padding:16px;border-bottom:1px solid var(--border2)}
.search-input{width:100%;padding:10px 14px;background:var(--card);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:.85rem;outline:none;transition:var(--transition)}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:var(--text-dim)}
.sidebar-progress{padding:16px;border-bottom:1px solid var(--border2)}
.progress-label{font-size:.75rem;color:var(--text-muted);margin-bottom:8px;display:flex;justify-content:space-between}
.progress-bar{height:6px;background:var(--card2);border-radius:3px;overflow:hidden;margin-bottom:4px}
.progress-fill{height:100%;background:var(--gradient);border-radius:3px;transition:width .5s}
.book-section{border-bottom:1px solid var(--border2)}
.book-header{padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:var(--transition);font-weight:600;font-size:.9rem}
.book-header:hover{background:var(--card)}
.book-icon{font-size:1.2rem}
.book-badge{margin-left:auto;font-size:.7rem;padding:2px 8px;border-radius:10px;color:#fff}
.badge-dotcom{background:#e94560}
.badge-expert{background:#7b2ff7}
.badge-traffic{background:#0984e3}
.badge-project{background:#00b894}
.book-toggle{margin-left:4px;transition:transform .3s;font-size:.8rem}
.book-section.open .book-toggle{transform:rotate(180deg)}
.module-list{display:none}
.book-section.open .module-list{display:block}
.module-item{padding:10px 16px 10px 36px;cursor:pointer;font-size:.8rem;color:var(--text-muted);transition:var(--transition);display:flex;align-items:center;gap:8px}
.module-item:hover{background:var(--card);color:var(--text)}
.module-item.active{background:rgba(233,69,96,0.1);color:var(--accent);border-right:3px solid var(--accent)}
.module-item.completed::after{content:'✓';margin-left:auto;color:#00b894;font-size:.8rem}
.module-icon{font-size:.9rem}
#main{flex:1;overflow-y:auto;min-width:0}
.content-area{max-width:900px;margin:0 auto;padding:40px 30px}
.dashboard-hero{background:var(--gradient2);border-radius:var(--radius2);padding:48px 40px;margin-bottom:32px;position:relative;overflow:hidden;border:1px solid var(--border)}
.dashboard-hero::before{content:'';position:absolute;top:-50%;right:-10%;width:400px;height:400px;background:radial-gradient(circle,rgba(233,69,96,0.15) 0%,transparent 70%);pointer-events:none}
.hero-eyebrow{color:var(--accent);font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:3px;margin-bottom:12px}
.hero-title{font-family:var(--font-display);font-size:2.2rem;font-weight:700;line-height:1.2;margin-bottom:16px}
.hero-title span{background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero-subtitle{color:var(--text-muted);font-size:1rem;max-width:500px;margin-bottom:28px}
.hero-stats{display:flex;gap:32px;flex-wrap:wrap}
.stat-item{text-align:center}
.stat-num{font-size:1.8rem;font-weight:800;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-label{font-size:.75rem;color:var(--text-muted)}
.card-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px;margin-bottom:32px}
.card{background:var(--card);border:1px solid var(--border2);border-radius:var(--radius);padding:24px;cursor:pointer;transition:var(--transition);position:relative;overflow:hidden}
.card:hover{transform:translateY(-4px);border-color:var(--accent);box-shadow:var(--shadow)}
.card-icon{font-size:2rem;margin-bottom:12px}
.card-title{font-size:1rem;font-weight:700;margin-bottom:6px}
.card-desc{font-size:.8rem;color:var(--text-muted)}
.card-progress{margin-top:16px}
.card-accent{position:absolute;top:0;left:0;right:0;height:3px}
.lesson-header{margin-bottom:32px}
.lesson-breadcrumb{font-size:.8rem;color:var(--text-muted);margin-bottom:12px}
.lesson-breadcrumb span{color:var(--accent)}
.lesson-title{font-family:var(--font-display);font-size:1.8rem;font-weight:700;margin-bottom:8px;line-height:1.3}
.lesson-meta{display:flex;gap:16px;flex-wrap:wrap;font-size:.8rem;color:var(--text-muted);margin-bottom:20px}
.lesson-meta-item{display:flex;align-items:center;gap:4px}
.source-badge{display:inline-block;padding:3px 10px;border-radius:6px;font-size:.7rem;font-weight:700;margin-right:8px}
.src-dotcom{background:rgba(233,69,96,0.2);color:#e94560;border:1px solid rgba(233,69,96,0.3)}
.src-expert{background:rgba(123,47,247,0.2);color:#a06af9;border:1px solid rgba(123,47,247,0.3)}
.src-traffic{background:rgba(9,132,227,0.2);color:#39a1f4;border:1px solid rgba(9,132,227,0.3)}
.src-practice{background:rgba(0,184,148,0.2);color:#00b894;border:1px solid rgba(0,184,148,0.3)}
.lesson-section{margin-bottom:32px}
.section-title{font-size:1.1rem;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.section-title::before{content:'';display:block;width:4px;height:20px;background:var(--gradient);border-radius:2px}
.lesson-content{color:var(--text);line-height:1.8}
.lesson-content p{margin-bottom:16px}
.lesson-content strong{color:var(--accent2)}
.highlight-box{background:linear-gradient(135deg,rgba(233,69,96,0.08),rgba(245,166,35,0.08));border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px;margin:20px 0;position:relative}
.highlight-box::before{content:'💡';position:absolute;top:-12px;left:20px;font-size:1.2rem}
.info-box{background:rgba(9,132,227,0.08);border:1px solid rgba(9,132,227,0.25);border-radius:var(--radius);padding:20px 24px;margin:20px 0}
.framework-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin:20px 0}
.framework-card{background:var(--card2);border:1px solid var(--border2);border-radius:var(--radius);padding:20px;text-align:center;transition:var(--transition)}
.framework-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.framework-card .ficon{font-size:2rem;margin-bottom:10px}
.framework-card .ftitle{font-size:.85rem;font-weight:700;margin-bottom:6px}
.framework-card .fdesc{font-size:.75rem;color:var(--text-muted)}
.step-list{list-style:none;counter-reset:steps}
.step-item{counter-increment:steps;padding:16px 16px 16px 60px;position:relative;margin-bottom:12px;background:var(--card);border-radius:var(--radius);border:1px solid var(--border2)}
.step-item::before{content:counter(steps);position:absolute;left:16px;top:50%;transform:translateY(-50%);width:32px;height:32px;background:var(--gradient);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.85rem;color:#fff;line-height:32px;text-align:center}
.funnel-visual{background:var(--card);border:1px solid var(--border2);border-radius:var(--radius2);padding:32px;margin:24px 0;text-align:center}
.funnel-stage{margin:0 auto 8px;border-radius:8px;padding:14px 20px;font-weight:700;font-size:.9rem;position:relative;color:#fff;transition:var(--transition);cursor:pointer}
.funnel-stage:hover{transform:scale(1.02)}
.funnel-stage .stage-num{font-size:.7rem;opacity:.7;margin-right:8px}
.funnel-arrow{text-align:center;color:var(--text-muted);font-size:1.2rem;margin:4px 0}
.quiz-container{background:var(--card);border:1px solid var(--border2);border-radius:var(--radius2);padding:32px;margin:24px 0}
.quiz-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.quiz-title{font-size:1.1rem;font-weight:700}
.quiz-score-badge{background:var(--gradient);color:#fff;padding:4px 14px;border-radius:20px;font-size:.85rem;font-weight:700}
.question-block{margin-bottom:24px}
.question-text{font-weight:600;margin-bottom:14px;font-size:.95rem}
.options-list{list-style:none}
.option-item{padding:12px 18px;border:2px solid var(--border2);border-radius:10px;margin-bottom:8px;cursor:pointer;transition:var(--transition);font-size:.9rem}
.option-item:hover{border-color:var(--accent);background:rgba(233,69,96,0.05)}
.option-item.selected{border-color:var(--accent2);background:rgba(245,166,35,0.1)}
.option-item.correct{border-color:#00b894;background:rgba(0,184,148,0.1)}
.option-item.wrong{border-color:#e17055;background:rgba(225,112,85,0.1)}
.option-item.disabled{cursor:not-allowed}
.quiz-feedback{padding:16px;border-radius:10px;margin-top:16px;font-size:.9rem;display:none}
.feedback-correct{background:rgba(0,184,148,0.1);border:1px solid rgba(0,184,148,0.3);color:#00b894}
.feedback-wrong{background:rgba(225,112,85,0.1);border:1px solid rgba(225,112,85,0.3);color:#e17055}
.quiz-btn{background:var(--gradient);color:#fff;border:none;padding:12px 28px;border-radius:10px;font-size:.9rem;font-weight:700;cursor:pointer;transition:var(--transition);margin-top:16px}
.quiz-btn:hover{opacity:.9;transform:translateY(-1px)}
.worksheet{background:var(--card);border:1px solid var(--border2);border-radius:var(--radius2);padding:32px;margin:24px 0}
.worksheet-title{font-size:1rem;font-weight:700;margin-bottom:20px;display:flex;align-items:center;gap:8px}
.worksheet-field{margin-bottom:18px}
.field-label{font-size:.82rem;font-weight:600;color:var(--text-muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px}
.field-input,.field-textarea{width:100%;padding:12px 16px;background:var(--card2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:var(--font-body);font-size:.9rem;outline:none;transition:var(--transition);resize:vertical}
.field-input:focus,.field-textarea:focus{border-color:var(--accent)}
.notes-panel{position:fixed;right:-400px;top:60px;bottom:0;width:380px;background:var(--primary);border-left:1px solid var(--border2);z-index:500;transition:right .3s;display:flex;flex-direction:column}
.notes-panel.open{right:0}
.notes-header{padding:20px;border-bottom:1px solid var(--border2);display:flex;justify-content:space-between;align-items:center;font-weight:700}
.notes-close{background:none;border:none;color:var(--text);cursor:pointer;font-size:1.2rem}
.notes-list{flex:1;overflow-y:auto;padding:16px}
.note-card{background:var(--card);border-radius:10px;padding:14px;margin-bottom:12px;border:1px solid var(--border2);font-size:.85rem}
.note-meta{font-size:.75rem;color:var(--text-muted);margin-top:8px}
.note-delete{color:#e17055;cursor:pointer;font-size:.75rem;margin-left:8px}
.notes-footer{padding:16px;border-top:1px solid var(--border2)}
.note-input{width:100%;padding:12px;background:var(--card);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:.85rem;resize:none;outline:none;margin-bottom:10px}
.note-input:focus{border-color:var(--accent)}
.ai-tutor-panel{position:fixed;left:-420px;top:60px;bottom:0;width:400px;background:var(--primary);border-right:1px solid var(--border2);z-index:500;transition:left .3s;display:flex;flex-direction:column}
.ai-tutor-panel.open{left:300px}
.ai-header{padding:20px;border-bottom:1px solid var(--border2)}
.ai-title{font-weight:700;display:flex;align-items:center;gap:8px}
.ai-dot{width:8px;height:8px;background:#00b894;border-radius:50%;animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.ai-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.ai-msg{padding:12px 16px;border-radius:12px;font-size:.85rem;line-height:1.6;max-width:90%}
.ai-msg.bot{background:var(--card);border:1px solid var(--border2);align-self:flex-start}
.ai-msg.user{background:var(--gradient);color:#fff;align-self:flex-end;border-radius:12px 12px 4px 12px}
.ai-input-area{padding:16px;border-top:1px solid var(--border2);display:flex;gap:8px}
.ai-input{flex:1;padding:10px 14px;background:var(--card);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:.85rem;outline:none}
.ai-input:focus{border-color:var(--accent)}
.ai-send{background:var(--gradient);border:none;color:#fff;padding:10px 16px;border-radius:8px;cursor:pointer;font-size:.85rem;font-weight:700}
.ai-quick-btns{padding:0 16px 12px;display:flex;flex-wrap:wrap;gap:6px}
.ai-quick{background:var(--card2);border:1px solid var(--border2);color:var(--text-muted);padding:5px 10px;border-radius:6px;font-size:.75rem;cursor:pointer;transition:var(--transition)}
.ai-quick:hover{border-color:var(--accent);color:var(--accent)}
.badges-row{display:flex;flex-wrap:wrap;gap:12px;margin:20px 0}
.badge-item{background:var(--card);border:2px solid var(--border2);border-radius:var(--radius);padding:14px 18px;display:flex;align-items:center;gap:10px;font-size:.85rem;transition:var(--transition)}
.badge-item.earned{border-color:var(--gold);background:rgba(255,215,0,0.08)}
.badge-item .badge-ico{font-size:1.5rem}
.badge-item .badge-name{font-weight:700;font-size:.8rem}
.badge-item .badge-desc{font-size:.72rem;color:var(--text-muted)}
.tabs{display:flex;gap:4px;border-bottom:2px solid var(--border2);margin-bottom:24px;overflow-x:auto}
.tab-btn{padding:10px 20px;background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:.85rem;font-weight:600;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:var(--transition)}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-content{display:none}
.tab-content.active{display:block}
.checklist{list-style:none}
.checklist li{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border2);font-size:.88rem}
.checklist input[type=checkbox]{margin-top:3px;accent-color:var(--accent);cursor:pointer;flex-shrink:0}
.checklist li.done{text-decoration:line-through;color:var(--text-muted)}
.complete-btn{background:var(--gradient);color:#fff;border:none;padding:16px 40px;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer;transition:var(--transition);display:flex;align-items:center;gap:10px;margin:32px auto 0}
.complete-btn:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(233,69,96,0.4)}
.complete-btn:disabled{opacity:.5;cursor:not-allowed}
.capstone-hero{background:linear-gradient(135deg,#1a0030,#0f3460);border:2px solid var(--gold);border-radius:var(--radius2);padding:40px;text-align:center;margin-bottom:32px}
.capstone-crown{font-size:3rem;margin-bottom:16px}
.capstone-title{font-family:var(--font-display);font-size:1.8rem;font-weight:700;margin-bottom:10px}
.capstone-desc{color:var(--text-muted);font-size:.95rem;max-width:500px;margin:0 auto}
.rubric-table{width:100%;border-collapse:collapse;margin:20px 0;font-size:.85rem}
.rubric-table th{background:var(--card2);padding:12px 16px;text-align:left;border:1px solid var(--border2)}
.rubric-table td{padding:12px 16px;border:1px solid var(--border2);vertical-align:top}
.rubric-table tr:hover td{background:var(--card)}
.toast{position:fixed;bottom:24px;right:24px;z-index:9000;background:var(--card2);border:1px solid var(--border2);border-radius:12px;padding:16px 24px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow);font-size:.9rem;transform:translateY(80px);opacity:0;transition:all .4s cubic-bezier(.4,0,.2,1);max-width:350px}
.toast.show{transform:translateY(0);opacity:1}
.toast-icon{font-size:1.3rem}
.accordion-item{border:1px solid var(--border2);border-radius:var(--radius);margin-bottom:8px;overflow:hidden}
.accordion-header{padding:14px 18px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-weight:600;font-size:.9rem;transition:var(--transition);background:var(--card)}
.accordion-header:hover{background:var(--card2)}
.accordion-toggle{transition:transform .3s}
.accordion-item.open .accordion-toggle{transform:rotate(180deg)}
.accordion-body{display:none;padding:16px 18px;font-size:.88rem;line-height:1.7;color:var(--text-muted);border-top:1px solid var(--border2)}
.accordion-item.open .accordion-body{display:block}
.value-ladder-chart{position:relative}
.vl-stage{display:flex;align-items:center;margin-bottom:8px}
.vl-bar-wrap{flex:1;background:var(--card2);border-radius:6px;height:44px;overflow:hidden;margin-right:16px}
.vl-bar{height:100%;border-radius:6px;display:flex;align-items:center;padding-left:16px;font-weight:700;font-size:.85rem;color:#fff;transition:width 1s}
.vl-label{width:120px;font-size:.8rem;color:var(--text-muted);text-align:right}
.vl-price{font-weight:700;font-size:.85rem;color:var(--accent2);margin-left:12px;width:80px}
@media(max-width:900px){#sidebar{position:fixed;left:0;top:60px;z-index:900;transform:translateX(-100%)}
#sidebar.mobile-open{transform:translateX(0)}
.content-area{padding:24px 16px}
#hamburger{display:block}
.hero-title{font-size:1.6rem}
.hero-stats{gap:16px}
.ai-tutor-panel{left:-420px}
.ai-tutor-panel.open{left:0}
.dashboard-hero{padding:28px 20px}
.card-grid{grid-template-columns:1fr}}
[dir="rtl"] .module-item{padding:10px 36px 10px 16px}
[dir="rtl"] .module-item.active{border-right:none;border-left:3px solid var(--accent)}
[dir="rtl"] .section-title::before{margin-right:0;margin-left:8px}
[dir="rtl"] .step-item{padding:16px 60px 16px 16px}
[dir="rtl"] .step-item::before{left:auto;right:16px}
[dir="rtl"] .vl-label{text-align:left;margin-right:16px;margin-left:0}
[dir="rtl"] .vl-bar-wrap{margin-right:0;margin-left:16px}
.ref-table{width:100%;border-collapse:collapse;font-size:.82rem}
.ref-table th{background:var(--teal);color:#fff;padding:10px 14px;text-align:left}
.ref-table td{padding:10px 14px;border-bottom:1px solid var(--border2)}
.ref-table tr:hover td{background:var(--card)}

const LESSONS={
'dc-what-is-funnel':{en:'What is a Sales Funnel?',ar:'ما هو قمع المبيعات؟',book:'DotCom Secrets',chapter:'Introduction',source:'dotcom',xp:50,content:{en:`<div class="lesson-section"><div class="section-title">The Core Concept</div><div class="lesson-content"><p>A sales funnel is the <strong>journey you deliberately design</strong> to take a stranger and turn them into a raving fan and repeat customer. Unlike a website that shows everything to everyone, a funnel is a series of pages designed to guide one specific person toward one specific goal.</p><p>Russell Brunson's core insight: <strong>the internet is not a business — it's a place to find your customers.</strong> Your funnel is the mechanism that converts attention into revenue.</p></div><div class="highlight-box"><strong>Key Definition:</strong> A sales funnel is a series of steps that moves a prospect from "I don't know you" → "I trust you" → "Here is my money." Each step filters out non-buyers and maximizes value from buyers.</div></div><div class="lesson-section"><div class="section-title">Why Funnels Beat Websites</div><div class="framework-grid"><div class="framework-card"><div class="ficon">🌐</div><div class="ftitle">Website</div><div class="fdesc">Many options, visitor decides. Average conversion: 1-2%. Leads leak everywhere.</div></div><div class="framework-card"><div class="ficon">🔻</div><div class="ftitle">Sales Funnel</div><div class="fdesc">One path, one decision. Average conversion: 10-40%. Revenue maximized at each step.</div></div><div class="framework-card"><div class="ficon">💰</div><div class="ftitle">The Difference</div><div class="fdesc">ClickFunnels users saw avg 3x higher revenue vs traditional website on same traffic.</div></div></div></div><div class="lesson-section"><div class="section-title">The Basic Funnel Structure</div><div class="funnel-visual"><div style="color:var(--text-muted);font-size:.8rem;margin-bottom:16px;text-transform:uppercase;letter-spacing:2px">Top ← Awareness → Bottom</div><div class="funnel-stage" style="background:linear-gradient(90deg,#e94560,#c0392b);width:100%"><span class="stage-num">①</span> AWARENESS — Traffic arrives at your landing page</div><div class="funnel-arrow">↓</div><div class="funnel-stage" style="background:linear-gradient(90deg,#9b59b6,#8e44ad);width:85%"><span class="stage-num">②</span> LEAD — They opt-in for your free offer</div><div class="funnel-arrow">↓</div><div class="funnel-stage" style="background:linear-gradient(90deg,#2980b9,#1a6fa3);width:70%"><span class="stage-num">③</span> FRONT-END OFFER — First paid product ($7-$47)</div><div class="funnel-arrow">↓</div><div class="funnel-stage" style="background:linear-gradient(90deg,#27ae60,#1e8449);width:55%"><span class="stage-num">④</span> UPSELL — Core offer ($97-$497)</div><div class="funnel-arrow">↓</div><div class="funnel-stage" style="background:linear-gradient(90deg,#f39c12,#e67e22);width:35%"><span class="stage-num">⑤</span> BACKEND — High-ticket / Continuity ($1,000+)</div></div></div><div class="lesson-section"><div class="section-title">Real-World Case Study</div><div class="info-box"><strong>📦 Example: Supplement Company</strong><br><br><strong>Website approach:</strong> 10,000 visitors → 1% buy → 100 sales × $40 = $4,000<br><br><strong>Funnel approach:</strong> 10,000 visitors → 30% opt-in (3,000 leads) → 5% buy front-end (150 sales × $40 = $6,000) → 30% take upsell (45 × $120 = $5,400) → 10% take backend (15 × $500 = $7,500)<br><br><strong>Total funnel revenue: $18,900 vs $4,000</strong> — 4.7x more from same traffic.</div></div>`,ar:`<div class="lesson-section"><div class="section-title">المفهوم الأساسي</div><div class="lesson-content"><p>قمع المبيعات هو <strong>الرحلة التي تصممها عن قصد</strong> لتحويل الغريب إلى معجب متحمس وعميل متكرر. على عكس الموقع الإلكتروني الذي يعرض كل شيء للجميع، القمع هو سلسلة من الصفحات مصممة لتوجيه شخص معين نحو هدف محدد.</p><p>الفكرة الأساسية لراسل برانسون: <strong>الإنترنت ليس عملاً تجارياً — إنه مكان لإيجاد عملائك.</strong> قمعك هو الآلية التي تحول الانتباه إلى إيرادات.</p></div><div class="highlight-box"><strong>تعريف رئيسي:</strong> قمع المبيعات هو سلسلة من الخطوات تنقل العميل المحتمل من "لا أعرفك" ← "أثق بك" ← "خذ مالي." كل خطوة تصفي غير المشترين وتعظم القيمة من المشترين.</div></div>`}},
'dc-value-ladder-intro':{en:'The Value Ladder — Build Your Ascension Model',ar:'سلم القيمة — ابنِ نموذج الصعود',book:'DotCom Secrets',chapter:'Chapter 1: The Secret Formula',source:'dotcom',xp:75,content:{en:`<div class="lesson-section"><div class="section-title">What is the Value Ladder?</div><div class="lesson-content"><p>The Value Ladder is the foundation of Russell Brunson's entire framework. It's a system of ascending offers, where each level provides <strong>more value at a higher price point</strong>, and each purchase prepares the customer to want the next level.</p><p>Most businesses fail because they try to sell high-ticket offers to cold traffic. The Value Ladder solves this by building trust and delivering value progressively.</p></div><div class="highlight-box"><strong>Core Principle:</strong> "If I want to make more money, I have to find ways to serve my clients at higher and higher levels." — Russell Brunson</div></div><div class="lesson-section"><div class="section-title">The 4 Levels of Value Ladder</div><div class="value-ladder-chart"><div class="vl-stage"><div class="vl-label">Bait / Lead Magnet</div><div class="vl-bar-wrap"><div class="vl-bar" style="width:95%;background:linear-gradient(90deg,#74b9ff,#0984e3)">Free</div></div><div class="vl-price">$0</div></div><div class="vl-stage"><div class="vl-label">Frontend Offer</div><div class="vl-bar-wrap"><div class="vl-bar" style="width:72%;background:linear-gradient(90deg,#a29bfe,#6c5ce7)">Low Cost</div></div><div class="vl-price">$7–$97</div></div><div class="vl-stage"><div class="vl-label">Core Offer</div><div class="vl-bar-wrap"><div class="vl-bar" style="width:50%;background:linear-gradient(90deg,#fd79a8,#e84393)">Mid Tier</div></div><div class="vl-price">$197–$997</div></div><div class="vl-stage"><div class="vl-label">Backend / Continuity</div><div class="vl-bar-wrap"><div class="vl-bar" style="width:28%;background:linear-gradient(90deg,#fdcb6e,#e17055)">High Ticket</div></div><div class="vl-price">$2,000+</div></div></div></div><div class="lesson-section"><div class="section-title">Real Value Ladder Examples</div><div class="accordion-item"><div class="accordion-header" onclick="toggleAccordion(this)"><span>💪 Fitness Coach Example</span><span class="accordion-toggle">▼</span></div><div class="accordion-body"><strong>Free:</strong> "5 Fat-Burning Exercises" PDF<br><strong>$27:</strong> "30-Day Home Workout Plan" ebook<br><strong>$297:</strong> 12-week online training program + nutrition guide<br><strong>$2,500:</strong> 1-on-1 coaching program (3 months)<br><strong>$500/mo:</strong> Inner Circle accountability group</div></div><div class="accordion-item"><div class="accordion-header" onclick="toggleAccordion(this)"><span>🏢 B2B SaaS Example</span><span class="accordion-toggle">▼</span></div><div class="accordion-body"><strong>Free:</strong> "Ultimate CRM Checklist" download<br><strong>$1/trial:</strong> 14-day software trial<br><strong>$97/mo:</strong> Starter plan (1-5 users)<br><strong>$497/mo:</strong> Professional plan with integrations<br><strong>$5,000+:</strong> Enterprise custom implementation</div></div><div class="accordion-item"><div class="accordion-header" onclick="toggleAccordion(this)"><span>📱 SMMA Example</span><span class="accordion-toggle">▼</span></div><div class="accordion-body"><strong>Free:</strong> "SMMA Audit Checklist" + video training<br><strong>$47:</strong> "Get Your First Client" course<br><strong>$497:</strong> SMMA Launch Bootcamp (6 weeks)<br><strong>$2,000/mo:</strong> Done-For-You Social Media Management<br><strong>$10,000+:</strong> White-label agency partnership program</div></div></div>`,ar:`<div class="lesson-section"><div class="section-title">ما هو سلم القيمة؟</div><div class="lesson-content"><p>سلم القيمة هو أساس إطار عمل راسل برانسون بأكمله. إنه نظام من العروض المتصاعدة، حيث يوفر كل مستوى <strong>قيمة أكبر بسعر أعلى</strong>، وكل عملية شراء تعد العميل لرغبة المستوى التالي.</p><p>تفشل معظم الأعمال لأنها تحاول بيع عروض عالية التذكرة لحركة مرور باردة. يحل سلم القيمة هذه المشكلة من خلال بناء الثقة وتقديم القيمة تدريجياً.</p></div></div>`}},
'dc-ac-elements':{en:'The Attractive Character — 4 Elements',ar:'الشخصية الجذابة — 4 عناصر',book:'DotCom Secrets',chapter:'Chapter 3: The Attractive Character',source:'dotcom',xp:75,content:{en:`<div class="lesson-section"><div class="section-title">What is the Attractive Character?</div><div class="lesson-content"><p>The Attractive Character (AC) is the persona you create to communicate with your list. It's not necessarily "you" — it's the character your audience <strong>wants to follow, trust, and buy from</strong>. Think of it as your brand's personality, engineered for maximum connection.</p><p>Russell Brunson identifies 4 types of Attractive Characters and the elements that make them work.</p></div></div><div class="lesson-section"><div class="section-title">The 4 Attractive Character Types</div><div class="framework-grid"><div class="framework-card"><div class="ficon">🦸</div><div class="ftitle">The Leader</div><div class="fdesc">Takes their audience from where they are to where they want to be. Has the answer, shows the way.</div></div><div class="framework-card"><div class="ficon">🧭</div><div class="ftitle">The Adventurer</div><div class="fdesc">Explores and discovers, brings back lessons for the audience. Shares the journey in real time.</div></div><div class="framework-card"><div class="ficon">📣</div><div class="ftitle">The Reporter</div><div class="fdesc">Interviews experts, curates information. Authority through proximity and curation.</div></div><div class="framework-card"><div class="ficon">🦸‍♀️</div><div class="ftitle">The Reluctant Hero</div><div class="fdesc">Didn't want to be an expert, was thrust into it. Most relatable — "I'm just like you."</div></div></div></div><div class="lesson-section"><div class="section-title">The 4 Core Elements of Every AC</div><ul class="step-list"><li class="step-item"><strong>Backstory</strong> — The story that created who they are today. Must include a struggle that your audience can identify with. The deeper the relatability, the stronger the connection.</li><li class="step-item"><strong>Parables</strong> — Short stories that convey beliefs and values. These are used in emails, posts, and videos to teach lessons through narrative instead of lectures.</li><li class="step-item"><strong>Character Flaws</strong> — Nobody trusts perfection. Your AC must be vulnerable, imperfect, and real. Share flaws that are relatable but don't undermine your authority.</li><li class="step-item"><strong>Polarity</strong> — The AC has strong opinions. They attract the right people and repel the wrong ones. This creates raving fans, not lukewarm followers.</li></ul></div><div class="lesson-section"><div class="section-title">Build Your Attractive Character</div><div class="worksheet"><div class="worksheet-title">📋 Attractive Character Worksheet</div><div class="worksheet-field"><div class="field-label">What type of AC are you? (Leader / Adventurer / Reporter / Reluctant Hero)</div><input class="field-input" placeholder="e.g. Reluctant Hero — I stumbled into this..."></div><div class="worksheet-field"><div class="field-label">Your Backstory (What struggle connects you to your audience?)</div><textarea class="field-textarea" rows="3" placeholder="e.g. I was broke and desperate, failed 3 businesses, then discovered..."></textarea></div><div class="worksheet-field"><div class="field-label">Your Polarity (What do you stand FOR and AGAINST?)</div><textarea class="field-textarea" rows="2" placeholder="e.g. I believe in ethical marketing and am against manipulative tactics..."></textarea></div><div class="worksheet-field"><div class="field-label">1 Character Flaw You'll Share (makes you relatable)</div><input class="field-input" placeholder="e.g. I'm terrible at consistency, I used to quit everything..."></div></div></div>`,ar:`<div class="lesson-section"><div class="section-title">ما هي الشخصية الجذابة؟</div><div class="lesson-content"><p>الشخصية الجذابة هي الشخصية التي تنشئها للتواصل مع قائمتك. ليست بالضرورة "أنت" — إنها الشخصية التي يريد جمهورك <strong>متابعتها والثقة بها والشراء منها</strong>.</p></div></div>`}},
'dc-hook':{en:'The Hook — Grabbing Attention in 3 Seconds',ar:'الخطاف — جذب الانتباه في 3 ثوانٍ',book:'DotCom Secrets',chapter:'Section 2: The Communication Funnel',source:'dotcom',xp:100,content:{en:`<div class="lesson-section"><div class="section-title">Why the Hook is Everything</div><div class="lesson-content"><p>Russell Brunson's formula is: <strong>Hook → Story → Offer.</strong> But without a hook, there is no story or offer — because no one is listening. The hook is the thing that stops someone mid-scroll or mid-conversation and makes them think "wait, what?"</p><p>In today's attention economy, you have <strong>3 seconds maximum</strong> to grab someone before they scroll past, click away, or tune out. Your hook must be sharp, specific, and speak directly to one person's desire or pain.</p></div><div class="highlight-box"><strong>Russell's Hook Formula:</strong> "What + Who + Why Now" = Irresistible curiosity that stops the scroll.</div></div><div class="lesson-section"><div class="section-title">The 5 Types of Hooks</div><ul class="step-list"><li class="step-item"><strong>Question Hook:</strong> "What would you do if your business made $10K while you slept?" — Questions trigger the brain's gap-filling instinct.</li><li class="step-item"><strong>Shock Stat Hook:</strong> "97% of online businesses fail in year one. Here's what the 3% do differently." — Stats create credibility and contrast.</li><li class="step-item"><strong>Story Hook:</strong> "In 2019 I was $100K in debt. Today I run a 7-figure company. Here's the one funnel that changed everything." — Story creates investment.</li><li class="step-item"><strong>Secret Hook:</strong> "The 'weird' sales trick that top earners never talk about..." — Secrets create exclusivity and urgency.</li><li class="step-item"><strong>Curiosity Gap Hook:</strong> "I almost quit everything... until I found THIS." — Incomplete information forces the brain to seek closure.</li></ul></div><div class="lesson-section"><div class="section-title">Swipe File — 20 Proven Hook Templates</div><div class="template-card"><div class="template-header">⚡ Copy-Paste Hook Templates</div><button class="copy-btn" onclick="copyTemplate(this)">Copy All</button>1. "How I [achieved result] in [time] without [common struggle]"<br>2. "The [number]-step system [expert/company] uses to [result]"<br>3. "Stop doing [common thing]. Do THIS instead."<br>4. "What nobody tells you about [topic]"<br>5. "I tried [X] different [methods] to [achieve goal]. Here's what actually worked."<br>6. "The reason [audience] are [struggling] has nothing to do with [obvious reason]"<br>7. "If I had to start [business/skill] from zero today, I would do THIS"<br>8. "Warning: Do NOT [do thing] until you've read this"<br>9. "The [adjective] truth about [desirable result]"<br>10. "[Controversial statement that your audience believes is wrong] — here's proof."<br>11. "You're [losing/leaving] $[amount] per month because of this one mistake"<br>12. "Steal my [resource/system/template] for [desired outcome]"<br>13. "[Famous person] just revealed their [secret/strategy]. Here's how to use it."<br>14. "How [similar person] went from [bad state] to [good state] in [short time]"<br>15. "I got [result] with zero [typical requirement]. Here's exactly how."<br>16. "The [industry] secret that [big companies] don't want you to know"<br>17. "Before you spend another dollar on [thing], read this"<br>18. "My [client/student] just got [specific result]. Copy their exact [system/steps]"<br>19. "If you hate [common task], this [solution] is for you"<br>20. "[Number] things I wish someone told me about [topic] before I started"</div></div>`,ar:`<div class="lesson-section"><div class="section-title">لماذا الخطاف هو كل شيء</div><div class="lesson-content"><p>معادلة راسل برانسون: <strong>الخطاف ← القصة ← العرض.</strong> بدون خطاف، لا توجد قصة أو عرض — لأن لا أحد يستمع. الخطاف هو الشيء الذي يوقف شخصاً ما في منتصف التمرير.</p></div></div>`}},
'dc-soap-opera':{en:'The Soap Opera Email Sequence',ar:'تسلسل بريد المسلسل التلفزيوني',book:'DotCom Secrets',chapter:'Chapter 6: The Soap Opera Sequence',source:'dotcom',xp:100,content:{en:`<div class="lesson-section"><div class="section-title">What Makes People Binge Email?</div><div class="lesson-content"><p>The Soap Opera Sequence (SOS) is your <strong>welcome email series</strong> — the first 5-7 emails someone receives after joining your list. Just like a soap opera that ends each episode on a cliffhanger, your email sequence must make the reader <strong>desperately need to open the next email</strong>.</p><p>This sequence does 3 critical things: builds your Attractive Character, breaks down false beliefs, and makes the first sale feel natural and inevitable.</p></div></div><div class="lesson-section"><div class="section-title">The 5-Email Soap Opera Structure</div><ul class="step-list"><li class="step-item"><strong>Email 1: Set the Stage</strong><br>Deliver the lead magnet. Set expectations for what's coming. Create intrigue: "Tomorrow I'm going to share the ONE thing that changed everything for me..." Open loop established.</li><li class="step-item"><strong>Email 2: High Drama</strong><br>Start with your backstory. The backstory must have high drama — your lowest point, your wall hit. This creates emotional connection. End with a cliffhanger about how you found the solution.</li><li class="step-item"><strong>Email 3: Epiphany / Solution</strong><br>Introduce your Epiphany Bridge — the realization that changed everything. This is where you seed your offer naturally. The epiphany should be something your product or service helped you achieve.</li><li class="step-item"><strong>Email 4: Hidden Benefits</strong><br>Go beneath the surface. Talk about the surprising, hidden benefits of your solution that most people don't know about. Break false beliefs. Address the #1 objection.</li><li class="step-item"><strong>Email 5: Urgency + CTA</strong><br>Tie it all together. Make the offer. Create urgency (genuine scarcity, deadline, or consequence). The sale should feel like a natural next step, not a pitch.</li></ul></div><div class="lesson-section"><div class="section-title">Email Templates — Fill in the Blanks</div><div class="template-card"><div class="template-header">📧 Email 1: Set the Stage Template</div><button class="copy-btn" onclick="copyTemplate(this)">Copy</button>Subject: [FIRST NAME], here's your [lead magnet] + something special<br><br>Hey [FIRST NAME],<br><br>Welcome! You just made a great decision.<br><br>Here's the [lead magnet] you requested: [LINK]<br><br>But I want to give you even more.<br><br>Over the next [X] days, I'm going to share [specific benefit or story arc].<br><br>Tomorrow, I'm going to reveal [intriguing teaser that creates curiosity].<br><br>Stay tuned — this is going to be worth it.<br><br>Talk soon,<br>[YOUR NAME]<br><br>P.S. [Add a curiosity-building PS that makes them look forward to the next email]</div></div>`,ar:`<div class="lesson-section"><div class="section-title">ما الذي يجعل الناس يتابعون البريد الإلكتروني؟</div><div class="lesson-content"><p>تسلسل بريد المسلسل التلفزيوني هو <strong>سلسلة رسائل الترحيب</strong> — أول 5-7 رسائل يتلقاها شخص ما بعد الانضمام لقائمتك.</p></div></div>`}},
'dc-why-funnels':{en:'Why Funnels Work',ar:'لماذا تعمل القمع',book:'DotCom Secrets',chapter:'Introduction',source:'dotcom',xp:50,content:{en:`<div class="lesson-section"><div class="section-title">Traffic Temperature Decides Everything</div><div class="lesson-content"><p>Funnels convert better than websites for one reason: they meet a visitor at their exact level of awareness and move them one step at a time. A website dumps every option on a cold stranger and hopes they self-select. A funnel removes choices so the only decision left is yes or no.</p><p>Brunson frames traffic in three temperatures — cold (never heard of you), warm (knows of you), and hot (already trusts you). The same offer must be presented differently to each, and a funnel lets you control that sequence while a website cannot.</p></div><div class="highlight-box">Conversion is not about pushing harder — it's about reducing the number of decisions a visitor must make at any single moment to exactly one.</div></div><div class="lesson-section"><div class="section-title">Why One Path Beats Many Doors</div><div class="framework-grid"><div class="framework-card"><div class="ficon">❄️</div><div class="ftitle">Cold</div><div class="fdesc">Doesn't know you. Needs a strong hook and education before any pitch.</div></div><div class="framework-card"><div class="ficon">🌤️</div><div class="ftitle">Warm</div><div class="fdesc">Knows you exist. Responds to story and proof you can deliver.</div></div><div class="framework-card"><div class="ficon">🔥</div><div class="ftitle">Hot</div><div class="fdesc">Trusts you. Just needs the offer and a reason to act now.</div></div></div><div class="lesson-content" style="margin-top:16px"><p>Build a different entry point for each temperature, then funnel all three toward the same core offer. That control is the structural reason funnels out-convert websites on identical traffic.</p></div></div>`,ar:`<div class="lesson-section"><div class="section-title">حرارة الزيارات تحدد كل شيء</div><div class="lesson-content"><p>القمع يحوّل أفضل من الموقع لسبب واحد: يلتقي بالزائر عند مستوى وعيه بالضبط وينقله خطوة واحدة في كل مرة. الموقع يرمي كل الخيارات على الغريب البارد ويأمل أن يختار بنفسه. القمع يزيل الخيارات حتى يبقى القرار الوحيد هو نعم أو لا.</p><p>يصنّف برانسون الزيارات في ثلاث درجات حرارة — باردة (لم تسمع عنك)، دافئة (تعرفك)، وساخنة (تثق بك). يجب تقديم نفس العرض بشكل مختلف لكل منها، والقمع يتيح لك التحكم في هذا التسلسل بينما الموقع لا يستطيع.</p></div><div class="highlight-box">التحويل ليس دفعاً أقوى — بل تقليل عدد القرارات التي يجب على الزائر اتخاذها في أي لحظة إلى قرار واحد بالضبط.</div></div>`}},
'dc-funnel-vs-website':{en:'Funnel vs. Website',ar:'القمع مقابل الموقع',book:'DotCom Secrets',chapter:'Introduction',source:'dotcom',xp:50,content:{en:`<div class="lesson-section"><div class="section-title">From "Brochure" to "Salesperson"</div><div class="lesson-content"><p>A traditional website behaves like a digital brochure: it sits there, lists everything you do, and waits. A funnel behaves like your best salesperson: it greets one specific person, asks one question, handles one objection, and asks for one decision.</p><p>The mindset shift is to stop asking 'what should my site contain?' and start asking 'what is the single next step I want this exact person to take?' Everything that doesn't serve that next step is a leak.</p></div><div class="highlight-box">Rule of one: one avatar, one goal, one offer, one call to action per page. Every extra option lowers conversion.</div></div><div class="lesson-section"><div class="section-title">Plugging the Leaks</div><div class="framework-grid"><div class="framework-card"><div class="ficon">🚪</div><div class="ftitle">Many Exits</div><div class="fdesc">A homepage with 12 menu links gives 12 ways to wander off.</div></div><div class="framework-card"><div class="ficon">➡️</div><div class="ftitle">One Exit</div><div class="fdesc">A squeeze page gives exactly one way to move forward.</div></div><div class="framework-card"><div class="ficon">📈</div><div class="ftitle">The Result</div><div class="fdesc">Squeeze pages convert 20-40% vs a homepage 1-2%.</div></div></div><div class="lesson-content" style="margin-top:16px"><p>Audit any page by counting its exits. If a visitor can leave in more than one direction, you are leaking leads. Collapse every page down to a single forward action and watch conversion climb.</p></div></div>`,ar:`<div class="lesson-section"><div class="section-title">من "كتيّب" إلى "بائع"</div><div class="lesson-content"><p>الموقع التقليدي يتصرف كنشرة رقمية: يجلس هناك، يسرد كل ما تفعله، وينتظر. القمع يتصرف كأفضل بائع لديك: يرحّب بشخص محدد، يطرح سؤالاً واحداً، يعالج اعتراضاً واحداً، ويطلب قراراً واحداً.</p><p>التحول الذهني هو التوقف عن السؤال 'ماذا يجب أن يحتوي موقعي؟' والبدء بالسؤال 'ما هي الخطوة التالية الوحيدة التي أريد أن يتخذها هذا الشخص؟' كل ما لا يخدم تلك الخطوة هو تسرّب.</p></div><div class="highlight-box">قاعدة الواحد: شخصية واحدة، هدف واحد، عرض واحد، دعوة واحدة للتصرف في كل صفحة. كل خيار إضافي يخفّض التحويل.</div></div>`}},
'dc-building-ladder':{en:'Building Your Value Ladder',ar:'بناء سلم القيمة',book:'DotCom Secrets',chapter:'Chapter 1',source:'dotcom',xp:75,content:{en:`<div class="lesson-section"><div class="section-title">The Four Rungs</div><div class="lesson-content"><p>A value ladder is the sequence of offers you take a customer through, each delivering more value at a higher price. It usually has four rungs: a free or low-cost bait, a frontend offer, a middle offer, and a high-ticket backend. The point is that you rarely sell the expensive thing first — you earn the right to it.</p><p>Each rung exists to ascend the customer to the next. The bait proves you can help; the frontend builds trust with a small win; the middle deepens the result; the backend delivers transformation at premium price. Without a ladder, you leave most of a customer's lifetime value on the table.</p></div><div class="highlight-box">As Dan Kennedy says, the business that can spend the most to acquire a customer wins. A value ladder is what lets you afford to.</div></div><div class="lesson-section"><div class="section-title">Ascending the Ladder</div><div class="framework-grid"><div class="framework-card"><div class="ficon">🪜</div><div class="ftitle">Bait → Frontend</div><div class="fdesc">Free lead magnet earns the first small purchase.</div></div><div class="framework-card"><div class="ficon">📊</div><div class="ftitle">Frontend → Middle</div><div class="fdesc">A satisfied buyer ascends to a deeper, pricier offer.</div></div><div class="framework-card"><div class="ficon">💎</div><div class="ftitle">Middle → Backend</div><div class="fdesc">Your best clients buy the premium transformation.</div></div></div><div class="lesson-content" style="margin-top:16px"><p>Worked example: free checklist → $27 course → $497 program → $5,000 coaching. A buyer who starts at $27 and ascends is worth far more than a one-time $27 sale — and that lifetime value is what funds your advertising.</p></div></div>`,ar:`<div class="lesson-section"><div class="section-title">الدرجات الأربع</div><div class="lesson-content"><p>سلم القيمة هو تسلسل العروض التي تنقل العميل عبرها، كل واحد يقدم قيمة أكبر بسعر أعلى. عادةً له أربع درجات: طُعم مجاني أو منخفض التكلفة، عرض أمامي، عرض أوسط، وعرض خلفي مرتفع السعر. الفكرة أنك نادراً ما تبيع الشيء الغالي أولاً — بل تكتسب الحق فيه.</p><p>كل درجة موجودة لترقية العميل إلى التالية. الطُعم يثبت أنك تستطيع المساعدة؛ العرض الأمامي يبني الثقة بفوز صغير؛ الأوسط يعمّق النتيجة؛ الخلفي يقدم التحوّل بسعر مميز. بدون سلم، تترك معظم القيمة الدائمة للعميل على الطاولة.</p></div><div class="highlight-box">كما يقول دان كينيدي، العمل الذي يستطيع إنفاق الأكثر لاكتساب عميل يفوز. سلم القيمة هو ما يجعلك قادراً على ذلك.</div></div>`}},
'dc-offers-ladder':{en:'Crafting Ladder Offers',ar:'تصميم عروض السلم',book:'DotCom Secrets',chapter:'Chapter 1',source:'dotcom',xp:75,content:{en:`<div class="lesson-section"><div class="section-title">Designing Each Offer</div><div class="lesson-content"><p>Every rung needs an offer engineered for its position. A bait offer maximizes opt-ins, not profit. A frontend offer is priced to be an easy yes (often $7-$97) and ideally self-liquidates your ad cost. Middle and backend offers are where real profit lives, because trust has already been built.</p><p>A self-liquidating offer (SLO) is the key idea here: if your frontend sale pays for the traffic that produced it, you can acquire customers for free and profit entirely on the rest of the ladder. That is how funnels become advertising machines instead of cost centers.</p></div><div class="highlight-box">Frontend covers cost. Backend creates profit. Design every offer knowing exactly which job it does.</div></div><div class="lesson-section"><div class="section-title">Offer Roles by Rung</div><div class="framework-grid"><div class="framework-card"><div class="ficon">🎁</div><div class="ftitle">Bait</div><div class="fdesc">Free or tiny price. Goal: maximize leads.</div></div><div class="framework-card"><div class="ficon">💵</div><div class="ftitle">Frontend (SLO)</div><div class="fdesc">$7-$97. Goal: pay back ad spend.</div></div><div class="framework-card"><div class="ficon">🏆</div><div class="ftitle">Backend</div><div class="fdesc">High-ticket. Goal: real profit & transformation.</div></div></div><div class="lesson-content" style="margin-top:16px"><p>If a customer costs $40 to acquire and your $47 frontend converts enough to return that $40, every backend sale after is pure margin. Build your ladder so the frontend breaks even and the backend prints profit.</p></div></div>`,ar:`<div class="lesson-section"><div class="section-title">تصميم كل عرض</div><div class="lesson-content"><p>كل درجة تحتاج عرضاً مصمماً لموقعها. عرض الطُعم يعظّم الاشتراكات لا الربح. العرض الأمامي يُسعّر ليكون نعم سهلة (غالباً 7-97$) ويغطّي تكلفة الإعلان مثالياً. الأوسط والخلفي حيث يعيش الربح الحقيقي، لأن الثقة بُنيت مسبقاً.</p><p>العرض ذاتي التغطية (SLO) هو الفكرة المفتاحية: إذا غطّت بيعتك الأمامية تكلفة الزيارات التي أنتجتها، يمكنك اكتساب العملاء مجاناً والربح بالكامل من بقية السلم. هكذا يصبح القمع آلة إعلانية بدل مركز تكلفة.</p></div><div class="highlight-box">الأمامي يغطّي التكلفة. الخلفي يصنع الربح. صمّم كل عرض وأنت تعرف بالضبط أي مهمة يؤديها.</div></div>`}},
'dc-ac-story':{en:'The Attractive Character Story',ar:'قصة الشخصية الجذابة',book:'DotCom Secrets',chapter:'Chapter 3',source:'dotcom',xp:75,content:{en:`<div class="lesson-section"><div class="section-title">Four Story Types</div><div class="lesson-content"><p>The Attractive Character earns attention through stories, not features. Brunson identifies four recurring storylines you cycle through: the backstory (how you started), the parable (a short teaching story), the character flaw (what makes you relatable), and the polarity (taking a stand that repels the wrong people and attracts the right ones).</p><p>These aren't random anecdotes. Each storyline does a job: backstory builds connection, parables teach without lecturing, flaws build trust by showing you're human, and polarity builds a loyal tribe by being willing to be disliked by some.</p></div><div class="highlight-box">People don't buy from companies — they buy from characters they feel they know. Stories are how you become that character.</div></div><div class="lesson-section"><div class="section-title">The Four Storylines</div><div class="framework-grid"><div class="framework-card"><div class="ficon">📖</div><div class="ftitle">Backstory</div><div class="fdesc">How you started — builds connection and relatability.</div></div><div class="framework-card"><div class="ficon">🌱</div><div class="ftitle">Parable</div><div class="fdesc">A short teaching story that makes a point stick.</div></div><div class="framework-card"><div class="ficon">⚡</div><div class="ftitle">Flaw & Polarity</div><div class="fdesc">Show humanity; take a stand to build a tribe.</div></div></div><div class="lesson-content" style="margin-top:16px"><p>Keep a running file of your own backstories, parables, flaws, and polarizing beliefs. Rotate them through your emails and content so your audience keeps meeting the same character from new angles.</p></div></div>`,ar:`<div class="lesson-section"><div class="section-title">أربعة أنواع من القصص</div><div class="lesson-content"><p>الشخصية الجذابة تكسب الانتباه عبر القصص لا المزايا. يحدد برانسون أربع حبكات متكررة تتنقّل بينها: قصة الخلفية (كيف بدأت)، المثل (قصة تعليمية قصيرة)، عيب الشخصية (ما يجعلك قريباً)، والاستقطاب (موقف يطرد الأشخاص الخطأ ويجذب الصحيحين).</p><p>هذه ليست حكايات عشوائية. كل حبكة تؤدي مهمة: قصة الخلفية تبني الاتصال، الأمثال تعلّم دون محاضرة، العيوب تبني الثقة بإظهار إنسانيتك، والاستقطاب يبني قبيلة موالية باستعدادك لأن يكرهك البعض.</p></div><div class="highlight-box">الناس لا يشترون من الشركات — بل من شخصيات يشعرون أنهم يعرفونها. القصص هي كيف تصبح تلك الشخصية.</div></div>`}},
'dc-ac-emails':{en:'Email Sequences & the AC',ar:'تسلسل الإيميلات والشخصية الجذابة',book:'DotCom Secrets',chapter:'Chapter 3',source:'dotcom',xp:75,content:{en:`<div class="lesson-section"><div class="section-title">Becoming a Welcome Guest</div><div class="lesson-content"><p>Your Attractive Character lives most vividly in your inbox relationship. The goal is to become a welcome guest, not an annoying pest — someone whose emails people actually open because the character behind them is entertaining and useful.</p><p>This is done by carrying the same voice, recurring characters, and ongoing storylines across every email, so each message feels like the next episode of a show the reader is following — which is exactly what the Soap Opera and Seinfeld sequences are built on.</p></div><div class="highlight-box">An open rate is a relationship metric. People open emails from characters they like, not from brands they tolerate.</div></div><div class="lesson-section"><div class="section-title">Carrying the Character</div><div class="framework-grid"><div class="framework-card"><div class="ficon">🎙️</div><div class="ftitle">Consistent Voice</div><div class="fdesc">Same tone every time so readers recognize you instantly.</div></div><div class="framework-card"><div class="ficon">🔁</div><div class="ftitle">Recurring Threads</div><div class="fdesc">Ongoing stories make readers await the next email.</div></div><div class="framework-card"><div class="ficon">🎯</div><div class="ftitle">Always an Offer</div><div class="fdesc">Every entertaining email still ties back to a sale.</div></div></div><div class="lesson-content" style="margin-top:16px"><p>Audit your last 10 emails: does the same character voice run through them? Is there an ongoing thread a reader could follow? If every email reads like it came from a different anonymous company, your Attractive Character isn't showing up.</p></div></div>`,ar:`<div class="lesson-section"><div class="section-title">أن تصبح ضيفاً مرحَّباً به</div><div class="lesson-content"><p>شخصيتك الجذابة تعيش بأوضح صورها في علاقة البريد. الهدف أن تصبح ضيفاً مرحَّباً به لا مُزعجاً مُلِحّاً — شخصاً يفتح الناس إيميلاته فعلاً لأن الشخصية خلفها مسلية ومفيدة.</p><p>يتم ذلك بحمل نفس الصوت والشخصيات المتكررة والحبكات المستمرة عبر كل إيميل، فيشعر كل رسالة كأنها الحلقة التالية من مسلسل يتابعه القارئ — وهذا بالضبط ما يقوم عليه تسلسلا الأوبرا الصابونية وساينفيلد.</p></div><div class="highlight-box">معدل الفتح مقياس علاقة. الناس يفتحون إيميلات الشخصيات التي يحبونها لا العلامات التي يتحمّلونها.</div></div>`}},
'dc-story-framework':{en:'Story Framework',ar:'إطار القصة',book:'DotCom Secrets',chapter:'Chapter 4',source:'dotcom',xp:75,content:{en:`<div class="lesson-section"><div class="section-title">Story Is the Bridge</div><div class="lesson-content"><p>In Hook, Story, Offer, the story is what transforms attention into desire. After the hook grabs attention, the story builds the emotional case for why the offer matters — because people buy on emotion and justify with logic.</p><p>A good selling story follows three foundational elements — character, desire, and conflict — and moves the listener from their current painful state to the new reality your offer makes possible. The story isn't decoration; it's the mechanism that makes the offer feel necessary.</p></div><div class="highlight-box">Logic tells; story sells. The offer answers 'what'; the story answers the far more important 'why should I care'.</div></div><div class="lesson-section"><div class="section-title">The Three Story Elements</div><div class="framework-grid"><div class="framework-card"><div class="ficon">👤</div><div class="ftitle">Character</div><div class="fdesc">Someone the listener identifies with — often you, earlier.</div></div><div class="framework-card"><div class="ficon">🎯</div><div class="ftitle">Desire</div><div class="fdesc">A clear goal the character is chasing.</div></div><div class="framework-card"><div class="ficon">⛰️</div><div class="ftitle">Conflict</div><div class="fdesc">The obstacle that creates tension and stakes.</div></div></div><div class="lesson-content" style="margin-top:16px"><p>Before writing any sales page, draft the story first: who is the character, what do they desperately want, what wall stops them, and what shift lets them through? Your offer is simply the bridge over that wall.</p></div></div>`,ar:`<div class="lesson-section"><div class="section-title">القصة هي الجسر</div><div class="lesson-content"><p>في الخطاف والقصة والعرض، القصة هي ما يحوّل الانتباه إلى رغبة. بعد أن يلتقط الخطاف الانتباه، تبني القصة الحجة العاطفية لماذا يهم العرض — لأن الناس يشترون بالعاطفة ويبرّرون بالمنطق.</p><p>القصة البيعية الجيدة تتبع ثلاثة عناصر أساسية — شخصية ورغبة وصراع — وتنقل المستمع من حالته المؤلمة الحالية إلى الواقع الجديد الذي يجعله عرضك ممكناً. القصة ليست زينة؛ بل الآلية التي تجعل العرض يبدو ضرورياً.</p></div><div class="highlight-box">المنطق يُخبر؛ القصة تبيع. العرض يجيب 'ماذا'؛ والقصة تجيب السؤال الأهم بكثير 'لماذا يهمني'.</div></div>`}},
'dc-offer-stack':{en:'The Offer Stack',ar:'تكديس العرض',book:'DotCom Secrets',chapter:'Chapter 4',source:'dotcom',xp:75,content:{en:`<div class="lesson-section"><div class="section-title">Value Stacking</div><div class="lesson-content"><p>The offer stack is how you make the price feel small next to the value. Instead of selling one thing for one price, you assemble a stack of components — the core product plus bonuses — and present the total value before revealing a price that's a fraction of it.</p><p>Each item in the stack is given its own value and stacked visually so that by the time you name the price, the prospect has already concluded it's a bargain. The bonuses should each solve a specific objection that would otherwise stop the sale.</p></div><div class="highlight-box">Don't sell a product for $X. Build a stack worth 10X, then offer it for X. The gap between value and price is what triggers the yes.</div></div><div class="lesson-section"><div class="section-title">Building the Stack</div><div class="framework-grid"><div class="framework-card"><div class="ficon">📦</div><div class="ftitle">Core Offer</div><div class="fdesc">The main transformation the customer is buying.</div></div><div class="framework-card"><div class="ficon">🎁</div><div class="ftitle">Objection Bonuses</div><div class="fdesc">Each bonus removes one reason to say no.</div></div><div class="framework-card"><div class="ficon">🏷️</div><div class="ftitle">Value vs Price</div><div class="fdesc">Total value shown high; price revealed as a fraction.</div></div></div><div class="lesson-content" style="margin-top:16px"><p>Worked example: core program ($1,997) + templates ($497) + live Q&A ($997) + private community ($297) = $3,788 in value, yours today for $497. The stack makes $497 feel obvious rather than expensive.</p></div></div>`,ar:`<div class="lesson-section"><div class="section-title">تكديس القيمة</div><div class="lesson-content"><p>تكديس العرض هو كيف تجعل السعر يبدو صغيراً أمام القيمة. بدل بيع شيء واحد بسعر واحد، تجمّع كومة من المكوّنات — المنتج الأساسي مع المكافآت — وتعرض القيمة الإجمالية قبل كشف سعر هو جزء بسيط منها.</p><p>كل عنصر في الكومة يُعطى قيمته الخاصة ويُكدّس بصرياً، فبحلول الوقت الذي تذكر فيه السعر، يكون العميل قد استنتج أنها صفقة رابحة. يجب أن تحلّ كل مكافأة اعتراضاً محدداً كان سيوقف البيعة.</p></div><div class="highlight-box">لا تبع منتجاً بـX. ابنِ كومة تساوي 10X، ثم اعرضها بـX. الفجوة بين القيمة والسعر هي ما يطلق الموافقة.</div></div>`}},
'dc-lead-funnel':{en:'Lead Capture Funnels',ar:'قمع جمع العملاء',book:'DotCom Secrets',chapter:'Chapter 5',source:'dotcom',xp:75,content:{en:`<div class="lesson-section"><div class="section-title">Capturing Leads</div><div class="lesson-content"><p>A lead funnel exists to convert anonymous traffic into known contacts. Its simplest form is the squeeze page: a single page offering a valuable lead magnet in exchange for an email address, with no other option but to opt in or leave.</p><p>The two-step variation adds a small commitment first (like clicking a button) before asking for the email, which raises conversions through consistency. The lead magnet itself must promise a specific, fast result — a checklist, cheat sheet, or short video beats a vague 'free newsletter'.</p></div><div class="highlight-box">A lead funnel trades a specific quick win for permission to keep talking. The better the bait matches the dream customer, the higher the opt-in.</div></div><div class="lesson-section"><div class="section-title">Lead Funnel Anatomy</div><div class="framework-grid"><div class="framework-card"><div class="ficon">🧲</div><div class="ftitle">Lead Magnet</div><div class="fdesc">A specific quick win worth an email address.</div></div><div class="framework-card"><div class="ficon">📝</div><div class="ftitle">Squeeze Page</div><div class="fdesc">One page, one field, one decision.</div></div><div class="framework-card"><div class="ficon">✅</div><div class="ftitle">Thank-You + SLO</div><div class="fdesc">Confirm, then present a tripwire offer.</div></div></div><div class="lesson-content" style="margin-top:16px"><p>After opt-in, never send people to a dead 'thanks' page. Send them to a thank-you page carrying a low-cost self-liquidating offer — the moment of highest intent is right after they say yes the first time.</p></div></div>`,ar:`<div class="lesson-section"><div class="section-title">التقاط العملاء المحتملين</div><div class="lesson-content"><p>قمع العملاء المحتملين موجود لتحويل الزيارات المجهولة إلى جهات اتصال معروفة. أبسط أشكاله صفحة الضغط: صفحة واحدة تعرض مغناطيس عملاء قيّماً مقابل بريد إلكتروني، دون خيار آخر سوى الاشتراك أو المغادرة.</p><p>النسخة ذات الخطوتين تضيف التزاماً صغيراً أولاً (كالضغط على زر) قبل طلب البريد، مما يرفع التحويل عبر الاتساق. مغناطيس العملاء نفسه يجب أن يَعِد بنتيجة محددة وسريعة — قائمة أو ورقة مختصرة أو فيديو قصير يتفوق على 'نشرة مجانية' غامضة.</p></div><div class="highlight-box">قمع العملاء يقايض فوزاً سريعاً محدداً بإذن لمواصلة الحديث. كلما طابق الطُعم العميل الحلم أكثر، ارتفع الاشتراك.</div></div>`}},
'dc-sales-funnel':{en:'Sales Funnels',ar:'قمع المبيعات',book:'DotCom Secrets',chapter:'Chapter 5',source:'dotcom',xp:75,content:{en:`<div class="lesson-section"><div class="section-title">Selling on the Frontend</div><div class="lesson-content"><p>A sales funnel turns a lead into a buyer. Two workhorses are the tripwire and the Self-Liquidating Offer (SLO). A tripwire is an irresistibly cheap offer (often $1-$7, sometimes free-plus-shipping) whose job is to convert a prospect into a buyer — because buyers behave completely differently from leads.</p><p>Once someone buys even a tiny thing, the relationship changes: they've crossed the line from prospect to customer. The SLO and order-form bump then aim to recover ad cost immediately, while upsells right after purchase capture more value at the moment of peak buying momentum.</p></div><div class="highlight-box">The first sale isn't about profit — it's about converting a lead into a buyer. The buyer relationship is the real asset.</div></div><div class="lesson-section"><div class="section-title">Frontend Mechanics</div><div class="framework-grid"><div class="framework-card"><div class="ficon">🪤</div><div class="ftitle">Tripwire</div><div class="fdesc">A tiny irresistible offer that creates a buyer.</div></div><div class="framework-card"><div class="ficon">➕</div><div class="ftitle">Order Bump</div><div class="fdesc">A one-click add-on on the order form.</div></div><div class="framework-card"><div class="ficon">⬆️</div><div class="ftitle">Upsell (OTO)</div><div class="fdesc">A one-time offer right after purchase.</div></div></div><div class="lesson-content" style="margin-top:16px"><p>Worked example: $7 tripwire + $17 order bump + $97 one-time upsell. Even if only the tripwire converts a cold buyer, you've turned a stranger into a customer for under the cost of a coffee — and earned the right to sell them again.</p></div></div>`,ar:`<div class="lesson-section"><div class="section-title">البيع في المقدمة</div><div class="lesson-content"><p>قمع المبيعات يحوّل العميل المحتمل إلى مشترٍ. حصانان للعمل هما العرض المبدئي (tripwire) والعرض ذاتي التغطية (SLO). العرض المبدئي عرض رخيص بشكل لا يُقاوَم (غالباً 1-7$، أحياناً مجاني مع الشحن) مهمته تحويل المحتمل إلى مشترٍ — لأن المشترين يتصرفون بشكل مختلف تماماً عن المحتملين.</p><p>بمجرد أن يشتري أحدهم حتى شيئاً صغيراً، تتغير العلاقة: عبروا الخط من محتمل إلى عميل. ثم يهدف الـSLO وزيادة نموذج الطلب لاسترداد تكلفة الإعلان فوراً، بينما تلتقط العروض الإضافية بعد الشراء مباشرة قيمة أكبر في لحظة ذروة زخم الشراء.</p></div><div class="highlight-box">البيعة الأولى ليست عن الربح — بل عن تحويل المحتمل إلى مشترٍ. علاقة المشتري هي الأصل الحقيقي.</div></div>`}},
'dc-webinar-funnel':{en:'Webinar Funnels',ar:'قمع الندوة الإلكترونية',book:'DotCom Secrets',chapter:'Chapter 5',source:'dotcom',xp:75,content:{en:`<div class="lesson-section"><div class="section-title">Selling Through Teaching</div><div class="lesson-content"><p>A webinar funnel sells higher-priced offers by teaching first. Traffic goes to a registration page, attendees receive reminders, and the live (or automated) presentation delivers genuine value before making an offer at the end. It works because it earns trust through teaching before asking for the sale.</p><p>The structure has three parts: an introduction that builds rapport and curiosity, content that teaches one core concept while breaking false beliefs, and a close that stacks the offer. The registration page should sell the click with curiosity, not give away the answer.</p></div><div class="highlight-box">A webinar is the perfect vehicle for offers that need explanation. You teach the what, and the desire for the how is what they pay for.</div></div><div class="lesson-section"><div class="section-title">Webinar Funnel Flow</div><div class="framework-grid"><div class="framework-card"><div class="ficon">📋</div><div class="ftitle">Registration</div><div class="fdesc">Curiosity-driven page that sells the signup.</div></div><div class="framework-card"><div class="ficon">🎓</div><div class="ftitle">Content</div><div class="fdesc">Teach one concept; break false beliefs.</div></div><div class="framework-card"><div class="ficon">🛒</div><div class="ftitle">The Close</div><div class="fdesc">Stack the offer and create urgency.</div></div></div><div class="lesson-content" style="margin-top:16px"><p>Run the same webinar weekly rather than inventing new ones. Promote Monday to Thursday, present Thursday, push the replay Friday to Sunday, then repeat — a single perfected webinar can carry a business for a year.</p></div></div>`,ar:`<div class="lesson-section"><div class="section-title">البيع عبر التعليم</div><div class="lesson-content"><p>قمع الندوة يبيع عروضاً أعلى سعراً بالتعليم أولاً. تذهب الزيارات لصفحة تسجيل، يتلقى الحاضرون تذكيرات، ويقدّم العرض المباشر (أو الآلي) قيمة حقيقية قبل تقديم العرض في النهاية. ينجح لأنه يكسب الثقة بالتعليم قبل طلب البيعة.</p><p>للبنية ثلاثة أجزاء: مقدمة تبني الألفة والفضول، محتوى يعلّم مفهوماً أساسياً واحداً بينما يكسر المعتقدات الخاطئة، وإغلاق يكدّس العرض. صفحة التسجيل يجب أن تبيع النقرة بالفضول، لا أن تعطي الجواب.</p></div><div class="highlight-box">الندوة هي الوسيلة المثالية للعروض التي تحتاج شرحاً. تعلّم الـ'ماذا'، والرغبة في الـ'كيف' هي ما يدفعون مقابله.</div></div>`}},
'dc-product-launch':{en:'Product Launch Funnels',ar:'قمع إطلاق المنتج',book:'DotCom Secrets',chapter:'Chapter 5',source:'dotcom',xp:75,content:{en:`<div class="lesson-section"><div class="section-title">The Sideways Sales Letter</div><div class="lesson-content"><p>A product launch funnel, based on Jeff Walker's formula, breaks a sales message across a sequence of free videos instead of one page. Each video delivers value while building anticipation, so by the time the offer opens, the audience is primed and eager.</p><p>It works best on warm and hot traffic. Video one introduces the new opportunity, video two shows the transformation is possible, video three reveals the path, and video four opens the cart. The sequence converts because each step removes a belief barrier before asking for money.</p></div><div class="highlight-box">A launch builds desire over days, not minutes. Anticipation does the selling so the offer feels like a relief, not a pitch.</div></div><div class="lesson-section"><div class="section-title">The Launch Sequence</div><div class="framework-grid"><div class="framework-card"><div class="ficon">🎬</div><div class="ftitle">Videos 1-3</div><div class="fdesc">Deliver value and dismantle false beliefs.</div></div><div class="framework-card"><div class="ficon">🛒</div><div class="ftitle">Video 4</div><div class="fdesc">Open the cart with the stacked offer.</div></div><div class="framework-card"><div class="ficon">⏰</div><div class="ftitle">Scarcity</div><div class="fdesc">A real deadline drives the decision.</div></div></div><div class="lesson-content" style="margin-top:16px"><p>Use a launch when you have an engaged audience and a substantial offer. The pre-launch videos warm even lukewarm subscribers into buyers, and a genuine closing deadline concentrates sales into a powerful window.</p></div></div>`,ar:`<div class="lesson-section"><div class="section-title">رسالة البيع الجانبية</div><div class="lesson-content"><p>قمع إطلاق المنتج، المبني على صيغة جيف ووكر، يقسّم رسالة البيع عبر سلسلة فيديوهات مجانية بدل صفحة واحدة. كل فيديو يقدم قيمة بينما يبني الترقّب، فبحلول فتح العرض يكون الجمهور مهيّأً ومتحمساً.</p><p>يعمل أفضل على الزيارات الدافئة والساخنة. الفيديو الأول يقدم الفرصة الجديدة، الثاني يُظهر أن التحوّل ممكن، الثالث يكشف المسار، والرابع يفتح السلة. ينجح التسلسل لأن كل خطوة تزيل حاجز معتقد قبل طلب المال.</p></div><div class="highlight-box">الإطلاق يبني الرغبة عبر أيام لا دقائق. الترقّب يقوم بالبيع فيبدو العرض راحة لا عرضاً.</div></div>`}},
'dc-seinfeld':{en:'Seinfeld Emails',ar:'إيميلات سينفيلد',book:'DotCom Secrets',chapter:'Chapter 6',source:'dotcom',xp:75,content:{en:`<div class="lesson-section"><div class="section-title">Emails About "Nothing"</div><div class="lesson-content"><p>After the Soap Opera Sequence ends, the Daily Seinfeld emails keep the relationship alive. Named after the show 'about nothing,' these daily messages are roughly 90% entertainment and 10% content — everyday stories from your Attractive Character that always tie back to an offer.</p><p>Brunson recommends sending them daily, not weekly — each email sells a certain amount, so mailing weekly leaves money on the table. The entertainment keeps people opening; the tie-back keeps them buying. The story can be about anything, but it must always lead somewhere.</p></div><div class="highlight-box">Be entertaining, not serious. People delete boring sales emails but read entertaining stories — even daily — when a character they like is telling them.</div></div><div class="lesson-section"><div class="section-title">The Seinfeld Formula</div><div class="framework-grid"><div class="framework-card"><div class="ficon">😄</div><div class="ftitle">90% Entertainment</div><div class="fdesc">A genuine, everyday story that holds attention.</div></div><div class="framework-card"><div class="ficon">🎯</div><div class="ftitle">10% Content</div><div class="fdesc">A lesson or angle that earns the pivot.</div></div><div class="framework-card"><div class="ficon">🔗</div><div class="ftitle">Always a CTA</div><div class="fdesc">Every email ties back to an offer.</div></div></div><div class="lesson-content" style="margin-top:16px"><p>Start each Seinfeld email with a true, small story from your day, then bridge it to a lesson, then to an offer. Mailed daily, this turns your list from a decaying asset into a daily revenue engine.</p></div></div>`,ar:`<div class="lesson-section"><div class="section-title">إيميلات عن "لا شيء"</div><div class="lesson-content"><p>بعد انتهاء تسلسل الأوبرا الصابونية، تُبقي إيميلات ساينفيلد اليومية العلاقة حية. سُمّيت تيمناً بالمسلسل 'عن لا شيء'، وهذه الرسائل اليومية تقريباً 90% ترفيه و10% محتوى — قصص يومية من شخصيتك الجذابة ترتبط دائماً بعرض.</p><p>يوصي برانسون بإرسالها يومياً لا أسبوعياً — كل إيميل يبيع قدراً معيناً، فالإرسال أسبوعياً يترك مالاً على الطاولة. الترفيه يُبقي الناس يفتحون؛ الربط يُبقيهم يشترون. القصة قد تكون عن أي شيء، لكن يجب أن تقود دائماً إلى مكان.</p></div><div class="highlight-box">كن مسلياً لا جاداً. الناس يحذفون إيميلات البيع المملة لكن يقرؤون القصص المسلية — حتى يومياً — حين ترويها شخصية يحبونها.</div></div>`}},
'dc-broadcast':{en:'Broadcast Emails',ar:'الإيميلات البثية',book:'DotCom Secrets',chapter:'Chapter 6',source:'dotcom',xp:75,content:{en:`<div class="lesson-section"><div class="section-title">Broadcast vs Sequence</div><div class="lesson-content"><p>Broadcast emails are the live, one-off messages you send to your whole list in real time — today's Seinfeld story, a launch announcement, a flash sale. They differ from automated sequences, which fire based on where someone is in their journey.</p><p>Once a subscriber finishes the Soap Opera Sequence, they graduate onto the broadcast list and receive whatever you send that day. The healthiest email strategy combines both: automated sequences do the onboarding and selling on autopilot, while broadcasts keep the relationship current and timely.</p></div><div class="highlight-box">Sequences run on autopilot; broadcasts keep you human and timely. You need both — one builds the relationship, the other keeps it alive.</div></div><div class="lesson-section"><div class="section-title">Two Tools, One List</div><div class="framework-grid"><div class="framework-card"><div class="ficon">🤖</div><div class="ftitle">Sequences</div><div class="fdesc">Automated, triggered by the subscriber's stage.</div></div><div class="framework-card"><div class="ficon">📡</div><div class="ftitle">Broadcasts</div><div class="fdesc">Live, sent to everyone in real time.</div></div><div class="framework-card"><div class="ficon">🎓</div><div class="ftitle">Graduation</div><div class="fdesc">Finish the sequence, move to the broadcast list.</div></div></div><div class="lesson-content" style="margin-top:16px"><p>Set your Soap Opera Sequence to onboard every new lead automatically, then graduate them to daily broadcasts. New subscribers get the proven sequence; everyone else gets your timely daily story — no one is ever left without contact.</p></div></div>`,ar:`<div class="lesson-section"><div class="section-title">البث مقابل التسلسل</div><div class="lesson-content"><p>إيميلات البث هي الرسائل الحية لمرة واحدة التي ترسلها لقائمتك كاملةً في الوقت الفعلي — قصة ساينفيلد اليوم، إعلان إطلاق، تخفيض سريع. تختلف عن التسلسلات الآلية التي تُطلَق حسب موقع الشخص في رحلته.</p><p>بمجرد أن يُنهي المشترك تسلسل الأوبرا، يتخرّج إلى قائمة البث ويتلقى ما ترسله ذلك اليوم. أصح استراتيجية بريد تجمع الاثنين: التسلسلات الآلية تتولى الترحيب والبيع تلقائياً، بينما يُبقي البث العلاقة حالية وفي وقتها.</p></div><div class="highlight-box">التسلسلات تعمل تلقائياً؛ البث يُبقيك إنسانياً وفي الوقت المناسب. تحتاج الاثنين — أحدهما يبني العلاقة والآخر يُبقيها حية.</div></div>`}},
'dc-copywriting':{en:'Funnel Copywriting',ar:'كتابة نصوص القمع',book:'DotCom Secrets',chapter:'Chapter 7',source:'dotcom',xp:75,content:{en:`<div class="lesson-section"><div class="section-title">Scripts Beat Blank Pages</div><div class="lesson-content"><p>Brunson's copywriting philosophy is to use proven scripts rather than write from scratch. Two foundational ones: the 'Who, What, Why, How' script for simple offers (squeeze pages, free items), and the 'Star, Story, Solution' script for mid-priced offers where you need to build more desire.</p><p>The 'Who, What, Why, How' script answers: who you are, what you're offering, why they need it, and how to get it — perfect for a quick opt-in video. 'Star, Story, Solution' introduces the star (usually you), tells a transformation story, then presents the solution, building emotional desire before the ask.</p></div><div class="highlight-box">Don't stare at a blank page. Match the right proven script to the price point, fill in your specifics, and refine from there.</div></div><div class="lesson-section"><div class="section-title">Two Core Scripts</div><div class="framework-grid"><div class="framework-card"><div class="ficon">⚡</div><div class="ftitle">Who What Why How</div><div class="fdesc">For simple, low-cost or free offers.</div></div><div class="framework-card"><div class="ficon">⭐</div><div class="ftitle">Star Story Solution</div><div class="fdesc">For mid-priced offers needing desire.</div></div><div class="framework-card"><div class="ficon">🧩</div><div class="ftitle">Match to Price</div><div class="fdesc">Higher price → more story and proof.</div></div></div><div class="lesson-content" style="margin-top:16px"><p>For a free lead magnet, write a 60-second 'Who, What, Why, How' video. For a $97-$497 offer, use 'Star, Story, Solution' so the story does the emotional heavy lifting before you reveal the price.</p></div></div>`,ar:`<div class="lesson-section"><div class="section-title">النصوص تتفوق على الصفحات الفارغة</div><div class="lesson-content"><p>فلسفة برانسون في كتابة الإعلانات هي استخدام نصوص مُجرَّبة بدل الكتابة من الصفر. أساسيان: نص 'من، ماذا، لماذا، كيف' للعروض البسيطة (صفحات الضغط، العناصر المجانية)، ونص 'النجم، القصة، الحل' للعروض متوسطة السعر حيث تحتاج بناء رغبة أكبر.</p><p>نص 'من، ماذا، لماذا، كيف' يجيب: من أنت، ماذا تعرض، لماذا يحتاجونه، وكيف يحصلون عليه — مثالي لفيديو اشتراك سريع. 'النجم، القصة، الحل' يقدّم النجم (غالباً أنت)، يروي قصة تحوّل، ثم يقدّم الحل، فيبني الرغبة العاطفية قبل الطلب.</p></div><div class="highlight-box">لا تحدّق في صفحة فارغة. طابِق النص المُجرَّب الصحيح مع مستوى السعر، املأ تفاصيلك، وحسّن من هناك.</div></div>`}},
