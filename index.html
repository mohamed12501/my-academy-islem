'tr-youtube':{en:'YouTube Traffic',ar:'زيارات يوتيوب',book:'Traffic Secrets',chapter:'Chapter 4',source:'traffic',xp:75,content:{en:`<div class="lesson-section"><div class="section-title">The Long-Form Trust Engine</div><div class="lesson-content"><p>YouTube is the most powerful platform for building trust at scale. A 30-minute video gives you the time to tell your story, teach your framework, and demonstrate your expertise in a way that a 30-second ad cannot. People who watch your YouTube videos are self-selecting into your warmest traffic.</p><p>Brunson recommends a YouTube funnel strategy: create three types of videos — authority videos (teaching your framework, building credibility), story videos (your Epiphany Bridge, personal transformation), and offer videos (directing viewers to your lead magnet or sale).</p></div><div class="highlight-box">YouTube is the new SEO. A video ranks for keywords, builds trust, and drives leads — all in one.</div></div><div class="lesson-section"><div class="section-title">YouTube Funnel</div><div class="framework-grid"><div class="framework-card"><div class="ficon">🎓</div><div class="ftitle">Authority Videos</div><div class="fdesc">Teach your framework to build credibility.</div></div><div class="framework-card"><div class="ficon">📖</div><div class="ftitle">Story Videos</div><div class="fdesc">Share your Epiphany Bridge and transformation.</div></div><div class="framework-card"><div class="ficon">🛒</div><div class="ftitle">Offer Videos</div><div class="fdesc">Direct viewers to your lead magnet or product.</div></div></div><div class="lesson-content" style="margin-top:16px"><p>Create one long-form YouTube video per week. Include a lead magnet link in the description and a mention in the video. Over 52 weeks, you've built an asset that generates leads forever.</p></div></div>`,ar:`<div class="lesson-section"><div class="section-title">محرك الثقة طويل المدى</div><div class="lesson-content"><p>يوتيوب هو المنصة الأكثر قوة لبناء الثقة على نطاق واسع. فيديو مدته 30 دقيقة يمنحك الوقت لسرد قصتك وتعليم إطارك وإظهار خبرتك بطريقة لا يستطيع إعلان مدته 30 ثانية فعلها. الأشخاص الذين يشاهدون فيديوهاتك على يوتيوب يختارون أنفسهم ليكونوا زياراتك الأكثر دفئاً.</p><p>يوصي برانسون باستراتيجية قمع يوتيوب: أنشئ ثلاثة أنواع من الفيديوهات — فيديوهات سلطة (تعليم إطارك، بناء المصداقية)، فيديوهات قصة (جسر الإلهام، تحولك الشخصي)، وفيديوهات عرض (توجيه المشاهدين إلى مغناطيس العملاء أو المنتج).</p></div><div class="highlight-box">يوتيوب هو السيو الجديد. الفيديو يتصدر الكلمات المفتاحية، ويبني الثقة، ويولّد العملاء — كل ذلك في واحد.</div></div>`}},
'tr-tiktok':{en:'TikTok Traffic',ar:'زيارات تيك توك',book:'Traffic Secrets',chapter:'Chapter 4',source:'traffic',xp:75,content:{en:`<div class="lesson-section"><div class="section-title">The Short-Form Attention Engine</div><div class="lesson-content"><p>TikTok is the fastest way to build an audience from zero. The algorithm is designed to surface great content regardless of follower count. Brunson teaches that TikTok is a top-of-funnel awareness machine — you don't sell on TikTok, you capture attention and move people to your lead magnet.</p><p>Your TikTok strategy: post 1-2 times daily, use hooks in the first 3 seconds, and always include a call to action to your bio link. The content should be entertaining and educational — the same content that works on Reels works on TikTok.</p></div><div class="highlight-box">TikTok is the shortcut to audience. Use it to get seen, then move people to your funnel.</div></div><div class="lesson-section"><div class="section-title">TikTok System</div><div class="framework-grid"><div class="framework-card"><div class="ficon">🎯</div><div class="ftitle">Hook First</div><div class="fdesc">Grab attention in the first 3 seconds or lose them.</div></div><div class="framework-card"><div class="ficon">📅</div><div class="ftitle">Post Daily</div><div class="fdesc">Consistency beats viral hits.</div></div><div class="framework-card"><div class="ficon">🧲</div><div class="ftitle">Lead Magnet</div><div class="fdesc">Every video drives to your bio link and lead magnet.</div></div></div><div class="lesson-content" style="margin-top:16px"><p>Post 1-2 TikToks daily for 30 days. Use hooks, teach one quick concept per video, and drive to your bio link. After 30 days, you'll have built a system that can scale.</p></div></div>`,ar:`<div class="lesson-section"><div class="section-title">محرك الانتباه القصير</div><div class="lesson-content"><p>تيك توك هو أسرع طريقة لبناء جمهور من الصفر. الخوارزمية مصممة لعرض المحتوى الرائع بغض النظر عن عدد المتابعين. يعلّم برانسون أن تيك توك هو آلة وعي في أعلى القمع — لا تبيع على تيك توك، بل تلتقط الانتباه وتنقل الناس إلى مغناطيس العملاء.</p><p>استراتيجيتك على تيك توك: انشر 1-2 مرة يومياً، استخدم خطافات في الثواني الثلاث الأولى، ودائماً تضمن دعوة للتصرف إلى رابط السيرة الذاتية. المحتوى يجب أن يكون ترفيهياً وتعليمياً — نفس المحتوى الذي ينجح على Reels ينجح على تيك توك.</p></div><div class="highlight-box">تيك توك هو اختصار للجمهور. استخدمه لتُرى، ثم انقل الناس إلى قمعك.</div></div>`}},
'tr-email-list':{en:'Email List Building',ar:'بناء قائمة البريد',book:'Traffic Secrets',chapter:'Chapter 4',source:'traffic',xp:75,content:{en:`<div class="lesson-section"><div class="section-title">The List Is Your Owned Asset</div><div class="lesson-content"><p>Brunson's most repeated traffic principle: <strong>you rent social platforms, you own your email list.</strong> If Instagram shuts down tomorrow, you lose your audience. But if your email list is built properly, you can reach them anytime. The list is the only traffic source you truly control.</p><p>Every traffic strategy — organic, paid, Dream 100, and everything in between — should have the same goal: grow your email list. The list is the asset that converts traffic into recurring revenue.</p></div><div class="highlight-box">If you only have one traffic strategy, make it list building. Everything else is support.</div></div><div class="lesson-section"><div class="section-title">List Building Channels</div><div class="framework-grid"><div class="framework-card"><div class="ficon">🧲</div><div class="ftitle">Lead Magnets</div><div class="fdesc">Offer something valuable in exchange for an email.</div></div><div class="framework-card"><div class="ficon">📊</div><div class="ftitle">Content Opt-Ins</div><div class="fdesc">Every piece of content offers a lead magnet.</div></div><div class="framework-card"><div class="ficon">📧</div><div class="ftitle">Email Sequences</div><div class="fdesc">Automated sequences nurture leads into buyers.</div></div></div><div class="lesson-content" style="margin-top:16px"><p>Audit your traffic sources. Is every source feeding your email list? If not, add a lead magnet to every traffic driver. The list is the only asset that pays you forever.</p></div></div>`,ar:`<div class="lesson-section"><div class="section-title">القائمة هي الأصل المملوك</div><div class="lesson-content"><p>مبدأ برانسون الأكثر تكراراً في الزيارات: <strong>تستأجر منصات التواصل، تملك قائمتك البريدية.</strong> إذا أغلق إنستغرام غداً، تفقد جمهورك. لكن إذا كانت قائمتك البريدية مبنية بشكل صحيح، يمكنك الوصول إليهم في أي وقت. القائمة هي المصدر الوحيد للزيارات الذي تتحكم به حقاً.</p><p>كل استراتيجية زيارة — عضوية، مدفوعة، قائمة الحلم، وكل ما بينهما — يجب أن يكون لها نفس الهدف: تنمية قائمتك البريدية. القائمة هي الأصل الذي يحوّل الزيارات إلى إيرادات متكررة.</p></div><div class="highlight-box">إذا كان لديك استراتيجية زيارة واحدة فقط، اجعلها بناء القائمة. كل شيء آخر هو دعم.</div></div>`}},
'tr-own-traffic':{en:'Owning Your Traffic',ar:'امتلاك زياراتك',book:'Traffic Secrets',chapter:'Chapter 5',source:'traffic',xp:75,content:{en:`<div class="lesson-section"><div class="section-title">The Ultimate Traffic Security</div><div class="lesson-content"><p>Owning your traffic means having multiple, diversified sources of traffic that you control. Brunson teaches that relying on a single traffic source is dangerous — algorithms change, platforms block accounts, ad costs rise. The goal is to build a traffic portfolio that protects your business from any single point of failure.</p><p>Owned traffic sources include your email list, your SMS list, your podcast audience, your YouTube subscribers, and your retargeting pools. These are audiences you can reach without paying a third party.</p></div><div class="highlight-box">Don't put all your traffic in one basket. Build multiple channels so your business survives any platform change.</div></div><div class="lesson-section"><div class="section-title">Traffic Portfolio</div><div class="framework-grid"><div class="framework-card"><div class="ficon">📧</div><div class="ftitle">Email List</div><div class="fdesc">The most valuable owned asset.</div></div><div class="framework-card"><div class="ficon">🎙️</div><div class="ftitle">Podcast</div><div class="fdesc">A trusted platform that builds relationships.</div></div><div class="framework-card"><div class="ficon">📹</div><div class="ftitle">YouTube</div><div class="fdesc">Long-form content that builds authority.</div></div></div><div class="lesson-content" style="margin-top:16px"><p>List your current traffic sources. Which are rented? Which are owned? Over the next 6 months, shift the balance toward owned traffic. Build your list, start a podcast, grow your YouTube channel.</p></div></div>`,ar:`<div class="lesson-section"><div class="section-title">الأمان النهائي للزيارات</div><div class="lesson-content"><p>امتلاك زياراتك يعني وجود مصادر متعددة ومتنوعة للزيارات تتحكم فيها. يعلّم برانسون أن الاعتماد على مصدر زيارة واحد خطر — الخوارزميات تتغير، المنصات تحظر الحسابات، تكاليف الإعلان ترتفع. الهدف هو بناء محفظة زيارات تحمي عملك من أي نقطة فشل واحدة.</p><p>مصادر الزيارات المملوكة تشمل قائمتك البريدية، قائمة SMS، جمهور البودكاست، مشتركي يوتيوب، ومجموعات إعادة الاستهداف. هذه جماهير يمكنك الوصول إليها دون دفع طرف ثالث.</p></div><div class="highlight-box">لا تضع كل زياراتك في سلة واحدة. ابنِ قنوات متعددة حتى ينجو عملك من أي تغيير في المنصة.</div></div>`}},
'tr-affiliate':{en:'Affiliate Traffic',ar:'الزيارات التابعة',book:'Traffic Secrets',chapter:'Chapter 5',source:'traffic',xp:75,content:{en:`<div class="lesson-section"><div class="section-title">The Power of Affiliates</div><div class="lesson-content"><p>Affiliate traffic is the ultimate leverage: you get other people to promote your offer to their audiences, and you pay them a commission for every sale they generate. This is Brunson's recommended way to scale traffic without increasing your own ad spend.</p><p>The key to a successful affiliate program is making it easy for affiliates to promote. Provide them with swipe copy, email templates, ad creatives, and a clear commission structure. The more you remove friction, the more affiliates will promote you.</p></div><div class="highlight-box">Affiliates are your sales force on steroids. They only get paid when you get paid.</div></div><div class="lesson-section"><div class="section-title">Affiliate Program Setup</div><div class="framework-grid"><div class="framework-card"><div class="ficon">📝</div><div class="ftitle">Swipe Copy</div><div class="fdesc">Make it easy for affiliates to promote.</div></div><div class="framework-card"><div class="ficon">💰</div><div class="ftitle">Commission Structure</div><div class="fdesc">Pay affiliates well for performance.</div></div><div class="framework-card"><div class="ficon">📊</div><div class="ftitle">Tracking</div><div class="fdesc">Track every affiliate sale accurately.</div></div></div><div class="lesson-content" style="margin-top:16px"><p>If you have a product that sells for $100+, create an affiliate program with a 20-50% commission. Recruit affiliates from your Dream 100 list and your existing customers. Your best affiliates are your best customers.</p></div></div>`,ar:`<div class="lesson-section"><div class="section-title">قوة التابعين</div><div class="lesson-content"><p>الزيارات التابعة هي الرافعة النهائية: تحصل على أشخاص آخرين يروجون لعرضك لجماهيرهم، وتدفع لهم عمولة عن كل بيعة يولّدونها. هذه هي الطريقة الموصى بها من برانسون لتوسيع الزيارات دون زيادة إنفاقك الإعلاني.</p><p>مفتاح برنامج تابع ناجح هو جعل الترويج سهلاً للتابعين. قدّم لهم نصوصاً جاهزة، قوالب إيميل، مواد إعلانية، وهيكل عمولة واضح. كلما أزلت الاحتكاك، زاد عدد التابعين الذين يروّجون لك.</p></div><div class="highlight-box">التابعون هم قوة مبيعاتك المعززة. يحصلون على أجر فقط عندما تحصل على أجر.</div></div>`}},
'tr-jv-partnerships':{en:'Joint Venture Partnerships',ar:'شراكات المشاريع المشتركة',book:'Traffic Secrets',chapter:'Chapter 5',source:'traffic',xp:100,content:{en:`<div class="lesson-section"><div class="section-title">The Highest-Leverage Traffic</div><div class="lesson-content"><p>Joint Venture (JV) partnerships are the highest-leverage traffic source. In a JV, you partner with another business owner to co-create an offer, co-promote to each other's lists, and split the revenue. This is Brunson's preferred way to scale because you access someone else's built audience without paying for ads.</p><p>A JV succeeds when both partners bring value and the offer is clearly beneficial to both audiences. The preparation phase is the same as the Dream 100: build the relationship first, then propose the JV.</p></div><div class="highlight-box">A JV partnership gives you access to audiences you couldn't afford to build yourself. It's the fastest path to scale.</div></div><div class="lesson-section"><div class="section-title">JV Structure</div><div class="framework-grid"><div class="framework-card"><div class="ficon">🤝</div><div class="ftitle">Relationship First</div><div class="fdesc">Build trust before proposing a JV.</div></div><div class="framework-card"><div class="ficon">🎁</div><div class="ftitle">Joint Offer</div><div class="fdesc">Create an offer that serves both audiences.</div></div><div class="framework-card"><div class="ficon">📊</div><div class="ftitle">Revenue Split</div><div class="fdesc">Split profits fairly to incentivize promotion.</div></div></div><div class="lesson-content" style="margin-top:16px"><p>Identify 3 potential JV partners from your Dream 100 list. Spend 2 months building relationships with them. Then propose a co-created offer that serves both of your audiences. That's the JV formula.</p></div></div>`,ar:`<div class="lesson-section"><div class="section-title">الزيارات الأعلى تأثيراً</div><div class="lesson-content"><p>شراكات المشاريع المشتركة (JV) هي مصدر الزيارات الأعلى تأثيراً. في JV، تتعاون مع صاحب عمل آخر لإنشاء عرض مشترك، والترويج المشترك لقوائم بعضكم البعض، وتقسيم الإيرادات. هذه هي الطريقة المفضلة لبرانسون للتوسع لأنك تصل إلى جمهور مبني لشخص آخر دون دفع إعلانات.</p><p>تنجح JV عندما يجلب كلا الشريكين قيمة ويكون العرض مفيداً بوضوح لكلا الجماهير. مرحلة التحضير هي نفسها قائمة الحلم: ابنِ العلاقة أولاً، ثم اقترح JV.</p></div><div class="highlight-box">شراكة JV تمنحك وصولاً إلى جماهير لم تكن تستطيع بناءها بنفسك. إنها أسرع طريق للتوسع.</div></div>`}},
'cap-value-ladder':{en:'Capstone Part 1 — Design Your Value Ladder',ar:'المشروع الختامي الجزء 1 — صمم سلم قيمتك',book:'All Books',chapter:'Final Project',source:'project',xp:200,content:{en:`<div class="capstone-hero"><div class="capstone-crown">🏆</div><div class="capstone-title">Capstone Project — Part 1</div><div class="capstone-desc">You are now building a real business asset. This project combines everything from DotCom Secrets, Expert Secrets, and Traffic Secrets into one complete system.</div></div><div class="lesson-section"><div class="section-title">Step 1: Design Your Complete Value Ladder</div><div class="worksheet"><div class="worksheet-title">📈 Value Ladder Builder</div><div class="worksheet-field"><div class="field-label">Your Niche / Market</div><input class="field-input" placeholder="e.g. SMMA for local restaurants"></div><div class="worksheet-field"><div class="field-label">Level 1 — Lead Magnet (FREE)</div><input class="field-input" placeholder="What free thing solves a quick problem? e.g. 'Restaurant Social Media Checklist'"></div><div class="worksheet-field"><div class="field-label">Level 2 — Frontend Offer ($7–$97)</div><input class="field-input" placeholder="e.g. '30-Day Social Media Calendar for Restaurants' - $27"></div><div class="worksheet-field"><div class="field-label">Level 3 — Core Offer ($197–$997)</div><input class="field-input" placeholder="e.g. 'Restaurant Growth Bootcamp' 6-week course - $497"></div><div class="worksheet-field"><div class="field-label">Level 4 — High Ticket ($2,000+)</div><input class="field-input" placeholder="e.g. Done-For-You Social Media Management - $2,000/mo"></div><div class="worksheet-field"><div class="field-label">Level 5 — Continuity (Recurring)</div><input class="field-input" placeholder="e.g. 'Restaurant Owners Inner Circle' monthly group - $99/mo"></div></div></div>`,ar:`<div class="capstone-hero"><div class="capstone-crown">🏆</div><div class="capstone-title">المشروع الختامي — الجزء 1</div><div class="capstone-desc">أنت الآن تبني أصلاً تجارياً حقيقياً. يجمع هذا المشروع كل شيء من الكتب الثلاثة في نظام واحد متكامل.</div></div>`}},
'cap-funnel-build':{en:'Build Your Funnel',ar:'ابنِ قمعك',book:'All Books',chapter:'Final Project',source:'project',xp:200,content:{en:`<div class="capstone-hero"><div class="capstone-crown">🏗️</div><div class="capstone-title">Capstone Project — Part 2</div><div class="capstone-desc">Now you'll map your complete funnel, from traffic entry to backend ascension.</div></div><div class="lesson-section"><div class="section-title">Step 2: Map Your Funnel Structure</div><div class="worksheet"><div class="worksheet-title">🗺️ Funnel Map</div><div class="worksheet-field"><div class="field-label">Lead Magnet Page</div><input class="field-input" placeholder="URL or description of your squeeze page"></div><div class="worksheet-field"><div class="field-label">Thank-You / SLO Page</div><input class="field-input" placeholder="Tripwire offer presented after opt-in"></div><div class="worksheet-field"><div class="field-label">Core Offer Page</div><input class="field-input" placeholder="Your main sales page with stack"></div><div class="worksheet-field"><div class="field-label">Upsell / Downsell Sequence</div><input class="field-input" placeholder="OTO offers after purchase"></div><div class="worksheet-field"><div class="field-label">Backend / Continuity</div><input class="field-input" placeholder="High-ticket offer or subscription"></div></div><div class="info-box"><strong>📌 Funnel Checklist:</strong><br>□ Squeeze page with lead magnet<br>□ Thank-you page with SLO/tripwire<br>□ Core sales page with offer stack<br>□ Upsell (one-click) after purchase<br>□ Downsell if upsell declined<br>□ Backend high-ticket offer<br>□ Email sequence (Soap Opera 5-7 emails)<br>□ Daily broadcast emails</div></div>`,ar:`<div class="capstone-hero"><div class="capstone-crown">🏗️</div><div class="capstone-title">المشروع الختامي — الجزء 2</div><div class="capstone-desc">الآن ستُخطّط قمعك الكامل، من دخول الزيارات إلى صعود الخلفي.</div></div>`}},
'cap-traffic-plan':{en:'Design Your Traffic Plan',ar:'صمّم خطة الزيارات',book:'All Books',chapter:'Final Project',source:'project',xp:200,content:{en:`<div class="capstone-hero"><div class="capstone-crown">🚦</div><div class="capstone-title">Capstone Project — Part 3</div><div class="capstone-desc">Design a traffic plan that feeds your funnel from multiple channels.</div></div><div class="lesson-section"><div class="section-title">Step 3: Build Your Traffic Plan</div><div class="worksheet"><div class="worksheet-title">📊 Traffic Strategy</div><div class="worksheet-field"><div class="field-label">Dream 100 — List 10 Top Targets</div><textarea class="field-textarea" rows="3" placeholder="Who are the top 10 influencers/podcasts/channels in your niche?"></textarea></div><div class="worksheet-field"><div class="field-label">Organic Plan — Content System</div><textarea class="field-textarea" rows="3" placeholder="What platform? How often? What lead magnet?"></textarea></div><div class="worksheet-field"><div class="field-label">Paid Plan — Initial Test Budget</div><input class="field-input" placeholder="e.g. $500 on Facebook — test 3 audiences with 1 hook"></div><div class="worksheet-field"><div class="field-label">Retargeting Plan</div><textarea class="field-textarea" rows="2" placeholder="How will you re-engage visitors who don't convert?"></textarea></div></div></div>`,ar:`<div class="capstone-hero"><div class="capstone-crown">🚦</div><div class="capstone-title">المشروع الختامي — الجزء 3</div><div class="capstone-desc">صمّم خطة زيارات تغذي قمعك من قنوات متعددة.</div></div>`}},
'cap-launch':{en:'Your Launch Campaign',ar:'حملة إطلاقك',book:'All Books',chapter:'Final Project',source:'project',xp:200,content:{en:`<div class="capstone-hero"><div class="capstone-crown">🚀</div><div class="capstone-title">Capstone Project — Part 4</div><div class="capstone-desc">Plan your 30-day launch campaign to open your funnel to the world.</div></div><div class="lesson-section"><div class="section-title">Step 4: Launch Plan</div><div class="worksheet"><div class="worksheet-title">📅 30-Day Launch Plan</div><div class="worksheet-field"><div class="field-label">Pre-Launch — Days 1-21</div><textarea class="field-textarea" rows="3" placeholder="What content/videos will you publish to build anticipation?"></textarea></div><div class="worksheet-field"><div class="field-label">Launch Week — Days 22-28</div><textarea class="field-textarea" rows="3" placeholder="What's the sequence? Emails, social posts, webinars?"></textarea></div><div class="worksheet-field"><div class="field-label">Close Week — Days 29-30</div><textarea class="field-textarea" rows="2" placeholder="How will you create urgency and close?"></textarea></div><div class="worksheet-field"><div class="field-label">Post-Launch — Days 31+</div><textarea class="field-textarea" rows="2" placeholder="How will you nurture new customers and ascend them?</textarea></div></div><div class="info-box"><strong>💡 Launch Checklist:</strong><br>□ Pre-launch content sequence (videos/emails)<br>□ Launch emails (1-2 per day during launch week)<br>□ Webinar (live or automated) for the offer<br>□ Stack close with urgency<br>□ Post-launch onboarding sequence<br>□ Customer upselling sequence</div></div>`,ar:`<div class="capstone-hero"><div class="capstone-crown">🚀</div><div class="capstone-title">المشروع الختامي — الجزء 4</div><div class="capstone-desc">خطّط لحملة إطلاقك لمدة 30 يوماً لفتح قمعك للعالم.</div></div>`}},

tificate</button></div>`,ar:`<div class="lesson-section"><div class="section-title">معايير الشهادة</div><table class="rubric-table"><tr><th>المكون</th><th>النقاط</th><th>المتطلبات</th></tr><tr><td>تصميم سلم القيمة</td><td>20</td><td>تحديد جميع المستويات الخمسة بالأسعار والأوصاف</td></tr><tr><td>بناء القمع</td><td>25</td><td>خريطة قمع كاملة مع جميع الصفحات والروابط</td></tr><tr><td>تسلسل البريد الإلكتروني</td><td>20</td><td>كتابة 5 رسائل بريد إلكتروني جاهزة</td></tr><tr><td>خطة الزيارات</td><td>20</td><td>قائمة الحلم المئة + استراتيجية عضوية ومدفوعة</td></tr><tr><td>حملة الإطلاق</td><td>15</td><td>خطة إطلاق 30 يوماً</td></tr></table></div>`}}
};

const QUIZZES={
'dc-what-is-funnel':{questions:[{q:'What is the primary purpose of a sales funnel compared to a regular website?',options:['To show all products at once','To guide one person toward one specific action','To display more information','To improve SEO rankings'],correct:1,explanation:'A funnel guides a specific person toward one specific goal — unlike a website that offers many options and lets visitors decide.',q_ar:'ما هو الغرض الأساسي من قمع المبيعات مقارنة بالموقع العادي؟',opts_ar:['عرض كل المنتجات دفعة واحدة','توجيه شخص واحد نحو إجراء محدد','عرض معلومات أكثر','تحسين ترتيب السيو'],expl_ar:'القمع يوجه شخصاً محدداً نحو هدف محدد — بخلاف الموقع الذي يقدم خيارات كثيرة ويترك للزوار القرار.'},{q:'According to DotCom Secrets, what is the internet primarily?',options:['A store','A search engine','A place to find customers','An advertising platform'],correct:2,explanation:'Russell Brunson\'s core insight: "The internet is not a business — it\'s a place to find your customers."',q_ar:'وفقاً لـ DotCom Secrets، ما هو الإنترنت أساساً؟',opts_ar:['متجر','محرك بحث','مكان لإيجاد العملاء','منصة إعلانية'],expl_ar:'الفكرة الأساسية لراسل برانسون: "الإنترنت ليس عملاً — إنه مكان لإيجاد عملائك."'},{q:'What is the typical conversion advantage of a funnel over a website?',options:['1-2% vs 10-40%','10% vs 20%','50% vs 75%','They are approximately equal'],correct:0,explanation:'Traditional websites convert at 1-2%. Sales funnels with proper sequencing achieve 10-40% conversion rates on the same traffic.',q_ar:'ما ميزة التحويل النموذجية للقمع على الموقع؟',opts_ar:['1-2% مقابل 10-40%','10% مقابل 20%','50% مقابل 75%','متساويان تقريباً'],expl_ar:'المواقع التقليدية تحوّل بنسبة 1-2%. القمع مع التسلسل المناسب يحقق 10-40% على نفس الزيارات.'}]},
'dc-value-ladder-intro':{questions:[{q:'What is the core purpose of the Value Ladder?',options:['To confuse customers with many prices','To ascend customers through increasing value and price points','To lower prices to be competitive','To create more products'],correct:1,explanation:'The Value Ladder ascends customers through progressively more valuable offers at higher prices, building trust and delivering value at each level.',q_ar:'ما الغرض الأساسي من سلم القيمة؟',opts_ar:['إرباك العملاء بأسعار كثيرة','ترقية العملاء عبر عروض متصاعدة القيمة والسعر','خفض الأسعار لتكون تنافسية','إنشاء منتجات أكثر'],expl_ar:'سلم القيمة يرقي العملاء عبر عروض متصاعدة القيمة والسعر، ويبني الثقة ويقدم قيمة في كل مستوى.'}]},
'dc-ac-elements':{questions:[{q:'What are the four types of Attractive Characters?',options:['Hero, villain, mentor, guide','Leader, adventurer, reporter, reluctant hero','Founder, teacher, coach, student','Bold, humble, funny, serious'],correct:1,explanation:'Brunson identifies Leader, Adventurer, Reporter, and Reluctant Hero as the four AC types.',q_ar:'ما أنواع الشخصيات الجذابة الأربعة؟',opts_ar:['بطل، شرير، مرشد، دليل','القائد، المغامر، المراسل، البطل المتردد','مؤسس، معلم، مدرب، طالب','جريء، متواضع، مضحك، جدي'],expl_ar:'يحدد برانسون القائد والمغامر والمراسل والبطل المتردد كأنواع الشخصية الجذابة الأربعة.'},{q:'What is "polarity" in the Attractive Character?',options:['Being neutral','Having strong opinions that attract right people and repel wrong ones','Being very positive','Being silent'],correct:1,explanation:'Polarity means having strong, clear opinions — this creates raving fans and repels those who aren\'t a fit.',q_ar:'ما هي "الاستقطاب" في الشخصية الجذابة؟',opts_ar:['أن تكون محايداً','امتلاك آراء قوية تجذب المناسبين وتنفّر غير المناسبين','أن تكون إيجابياً للغاية','أن تكون صامتاً'],expl_ar:'الاستقطاب يعني امتلاك آراء واضحة وقوية — هذا يخلق معجبين متحمسين وينفّر من لا يناسبون.'},{q:'Why do Attractive Characters share character flaws?',options:['To be funny','Nobody trusts perfection; flaws create relatability and trust','To lower expectations','For legal reasons'],correct:1,explanation:'Vulnerability and imperfection make the AC human and relatable — perfection is untrustworthy.',q_ar:'لماذا تشارك الشخصيات الجذابة عيوب الشخصية؟',opts_ar:['لتكون مضحكة','لا أحد يثق بالكمال؛ العيوب تخلق التقارب والثقة','لتخفيض التوقعات','لأسباب قانونية'],expl_ar:'الضعف وعدم الكمال يجعل الشخصية إنسانية ومتقاربة — الكمال لا يُوثق به.'}]},
'dc-hook':{questions:[{q:'What is the primary job of a hook?',options:['Close the sale','Stop the scroll and grab attention in a crowded feed','Explain the product','Show the price'],correct:1,explanation:'A hook\'s only job is to interrupt the pattern and capture attention so the story can begin.',q_ar:'ما المهمة الأساسية للخطاف؟',opts_ar:['إغلاق البيعة','إيقاف التمرير والتقاط الانتباه في خلاصة مزدحمة','شرح المنتج','إظهار السعر'],expl_ar:'المهمة الوحيدة للخطاف هي مقاطعة النمط والتقاط الانتباه حتى تبدأ القصة.'},{q:'Which element makes a hook irresistible?',options:['Long explanation','Curiosity gap or bold promise that feels personally relevant','Corporate language','Multiple points'],correct:1,explanation:'A hook works when it opens a curiosity gap or makes a promise so relevant the viewer must keep watching.',q_ar:'أي عنصر يجعل الخطاف لا يُقاوم؟',opts_ar:['شرح طويل','فجوة الفضول أو وعد جريء يبدو ذا صلة شخصية','لغة مؤسسية','نقاط متعددة'],expl_ar:'يعمل الخطاف عندما يفتح فجوة فضول أو يقدم وعداً ذا صلة لدرجة أن المشاهد يجب أن يواصل المشاهدة.'},{q:'In the Hook-Story-Offer framework, what comes after the hook?',options:['The price','The story that builds desire','The guarantee','The call to action'],correct:1,explanation:'After the hook grabs attention, the story builds the emotional case that makes the offer compelling.',q_ar:'في إطار الخطاف-القصة-العرض، ما الذي يأتي بعد الخطاف؟',opts_ar:['السعر','القصة التي تبني الرغبة','الضمان','الدعوة للتصرف'],expl_ar:'بعد أن يلتقط الخطاف الانتباه، تبني القصة الحجة العاطفية التي تجعل العرض جذاباً.'}]},
'dc-soap-opera':{questions:[{q:'Why is a new email sequence called a "Soap Opera Sequence"?',options:['Because it\'s dramatic','Each email ends on a hook that makes readers want the next episode','Because it\'s weekly','Because it uses actors'],correct:1,explanation:'Like a soap opera that ends each episode on a cliffhanger, each email must compel the reader to open the next.',q_ar:'لماذا تُسمى تسلسل البريد الجديد "تسلسل المسلسل"؟',opts_ar:['لأنه درامي','كل إيميل ينتهي بخطاف يجعل القراء يريدون الحلقة التالية','لأنه أسبوعي','لأنه يستخدم ممثلين'],expl_ar:'كالمسلسل الذي ينتهي كل حلقة بلحظة توتر، كل إيميل يجب أن يجبر القارئ على فتح التالي.'},{q:'What is the purpose of the first Soap Opera email?',options:['Sell immediately','Set the stage and hook with your backstory or a compelling promise','Ask for referrals','Send a discount'],correct:1,explanation:'The first email sets the stage and hooks the reader with backstory or a promise to keep them reading.',q_ar:'ما هدف أول إيميل في تسلسل المسلسل؟',opts_ar:['البيع فوراً','تمهيد المشهد والتشويق بقصتك أو وعد جذاب','طلب إحالات','إرسال خصم'],expl_ar:'أول إيميل يمهّد المشهد ويُشوّق القارئ بالخلفية أو وعد لإبقائهم يقرؤون.'},{q:'What does the Soap Opera Sequence ultimately build toward?',options:['A refund policy','Your core offer, revealed after trust and desire are established','A subscription cancellation','A free gift'],correct:1,explanation:'The sequence builds trust, story, and desire over several emails, culminating in the offer reveal.',q_ar:'ما الذي يبني إليه تسلسل المسلسل في نهاية المطاف؟',opts_ar:['سياسة استرداد','عرضك الأساسي، يُكشف بعد بناء الثقة والرغبة','إلغاء اشتراك','هدية مجانية'],expl_ar:'التسلسل يبني الثقة والقصة والرغبة عبر عدة إيميلات، وصولاً لكشف العرض.'}]},
'ex-epiphany-bridge':{questions:[{q:'What does the Epiphany Bridge story replace in a sales presentation?',options:['The offer','Logical arguments that feel like selling','The price','The guarantee'],correct:1,explanation:'The Epiphany Bridge delivers belief change through story, replacing pushy logical arguments.',q_ar:'ما الذي تستبدله قصة جسر الإلهام في عرض المبيعات؟',opts_ar:['العرض','الحجج المنطقية التي تبدو كبيع','السعر','الضمان'],expl_ar:'جسر الإلهام يُوصّل تغيير المعتقد عبر القصة، مستبدلاً الحجج المنطقية الملحّة.'},{q:'What is the key difference between a lecture and an Epiphany Bridge story?',options:['Length','A story creates felt discovery; a lecture creates resistance','Price','Format'],correct:1,explanation:'Lectures trigger resistance; stories let the prospect feel they discovered the belief themselves.',q_ar:'ما الفرق الرئيسي بين المحاضرة وقصة جسر الإلهام؟',opts_ar:['الطول','القصة تخلق اكتشافاً محسوساً؛ المحاضرة تخلق مقاومة','السعر','الشكل'],expl_ar:'المحاضرات تُثير المقاومة؛ القصص تجعل العميل يشعر أنه اكتشف المعتقد بنفسه.'},{q:'An Epiphany Bridge moves prospects from what to what?',options:['Cheap to expensive','Old false belief to new empowering belief','Unknown to famous','Cold to warm'],correct:1,explanation:'The bridge carries prospects from their current false belief to the new belief that makes buying natural.',q_ar:'جسر الإلهام ينقل العملاء المحتملين من ماذا إلى ماذا؟',opts_ar:['رخيص إلى غالٍ','معتقد خاطئ قديم إلى معتقد جديد مُمكِّن','مجهول إلى مشهور','بارد إلى دافئ'],expl_ar:'الجسر يحمل العملاء من معتقدهم الخاطئ الحالي إلى المعتقد الجديد الذي يجعل الشراء طبيعياً.'}]},
'ex-webinar-structure':{questions:[{q:'What is the "Perfect Webinar" formula according to Brunson?',options:['Intro, demo, Q&A','Hook, story, content (breaking beliefs), stack close','Slides, video, chat','Welcome, teach, goodbye'],correct:1,explanation:'The Perfect Webinar hooks attention, tells the origin story, breaks false beliefs through content, then closes with the stack.',q_ar:'ما هي صيغة "الندوة المثالية" وفق برانسون؟',opts_ar:['مقدمة، عرض توضيحي، أسئلة','خطاف، قصة، محتوى (كسر المعتقدات)، إغلاق بالتكديس','شرائح، فيديو، محادثة','ترحيب، تعليم، وداع'],expl_ar:'الندوة المثالية تلتقط الانتباه وتروي قصة النشأة وتكسر المعتقدات الخاطئة بالمحتوى ثم تغلق بالتكديس.'},{q:'How long is the teaching portion of the Perfect Webinar?',options:['5 minutes','About 60 minutes focused on breaking beliefs','The whole webinar','10 minutes'],correct:1,explanation:'The teaching section (about an hour) focuses on breaking the three false belief categories through stories and content.',q_ar:'كم مدة قسم التعليم في الندوة المثالية؟',opts_ar:['5 دقائق','حوالي 60 دقيقة مركّزة على كسر المعتقدات','الندوة بأكملها','10 دقائق'],expl_ar:'قسم التعليم (حوالي ساعة) يركّز على كسر الفئات الثلاثة للمعتقدات الخاطئة عبر القصص والمحتوى.'},{q:'What closes the Perfect Webinar?',options:['A Q&A','The stack: core offer + bonuses presented one by one with values','A thank-you message','A survey'],correct:1,explanation:'The close uses the stack — revealing offer components one by one to build perceived value before naming the price.',q_ar:'ما الذي يُغلق الندوة المثالية؟',opts_ar:['جلسة أسئلة','التكديس: العرض الأساسي + مكافآت تُقدَّم واحدة تلو الأخرى بقيمها','رسالة شكر','استبيان'],expl_ar:'الإغلاق يستخدم التكديس — يكشف مكونات العرض واحدة تلو الأخرى لبناء القيمة المتصورة قبل الإعلان عن السعر.'}]},
'ex-movement-framework':{questions:[{q:'What three things does every mass movement need?',options:['Product, price, promotion','Charismatic leader, future-based cause, new vehicle','Content, traffic, conversions','Email, webinar, upsell'],correct:1,explanation:'Movements require a charismatic leader, a future-based cause people can rally around, and a new vehicle/method.',q_ar:'ما الأشياء الثلاثة التي يحتاجها كل حركة جماهيرية؟',opts_ar:['منتج، سعر، ترويج','قائد ذو كاريزما، قضية مستقبلية، وسيلة جديدة','محتوى، زيارات، تحويلات','إيميل، ندوة، عرض إضافي'],expl_ar:'الحركات تحتاج قائداً ذا كاريزما وقضية مستقبلية يتجمع الناس حولها ووسيلة/طريقة جديدة.'},{q:'What role does "the enemy" play in a mass movement?',options:['A product competitor','The old belief system that the movement exists to replace','A difficult customer','A bad ad'],correct:1,explanation:'The enemy is the old way of doing things — having a common enemy unites followers and strengthens the movement.',q_ar:'ما دور "العدو" في الحركة الجماهيرية؟',opts_ar:['منافس منتج','نظام المعتقدات القديم الذي وُجدت الحركة لتستبدله','عميل صعب','إعلان سيئ'],expl_ar:'العدو هو الطريقة القديمة للأشياء — وجود عدو مشترك يوحّد المتابعين ويقوي الحركة.'},{q:'Why do movement brands command premium prices?',options:['They have better products','People pay for belonging to an identity and cause, not just a product','They spend more on ads','They have more features'],correct:1,explanation:'Movement brands sell identity, belonging, and shared belief — which transcends price comparison.',q_ar:'لماذا تفرض العلامات التجارية الحركية أسعاراً مميزة؟',opts_ar:['لديها منتجات أفضل','الناس يدفعون للانتماء لهوية وقضية لا لمنتج فقط','تنفق أكثر على الإعلانات','لديها مزايا أكثر'],expl_ar:'العلامات الحركية تبيع الهوية والانتماء والمعتقد المشترك — مما يتجاوز مقارنة الأسعار.'}]},
'tr-dream100-intro':{questions:[{q:'What is the core insight behind the Dream 100 strategy?',options:['You need 100 employees','Your dream customers are already congregated somewhere else','You need to create 100 products','You should run 100 ads'],correct:1,explanation:'Your dream customers already follow others. The Dream 100 strategy helps you access those existing audiences instead of building from scratch.',q_ar:'ما هي الفكرة الأساسية وراء استراتيجية قائمة الحلم المئة؟',opts_ar:['تحتاج 100 موظف','عملاؤك المحلومون يتجمعون بالفعل في مكان آخر','تحتاج إنشاء 100 منتج','يجب تشغيل 100 إعلان'],expl_ar:'عملاؤك المحلومون يتابعون آخرين بالفعل. استراتيجية قائمة الحلم المئة تساعدك على الوصول لتلك الجماهير الموجودة بدلاً من البناء من الصفر.'},{q:'What should you do BEFORE pitching to your Dream 100 partners?',options:['Send a sales email immediately','Buy their products and engage authentically for months','Offer them a commission','Create a joint venture agreement'],correct:1,explanation:'You must "dig your well before you\'re thirsty" — engage genuinely, buy their products, and build real relationships before making any request.',q_ar:'ماذا يجب أن تفعل قبل التواصل مع شركاء الحلم المئة؟',opts_ar:['إرسال إيميل مبيعات فوراً','شراء منتجاتهم والتفاعل بشكل حقيقي لشهور','عرض عمولة عليهم','إنشاء اتفاقية مشروع مشترك'],expl_ar:'يجب "حفر البئر قبل العطش" — التفاعل بصدق، شراء منتجاتهم، وبناء علاقات حقيقية قبل أي طلب.'}]},
'tr-content-strategy':{questions:[{q:'What is Brunson\'s core content strategy in Traffic Secrets?',options:['Post as much as possible','Create "Dream 100-worthy" content that attracts and converts dream customers','Focus only on paid ads','Write only blog posts'],correct:1,explanation:'Content should be designed to attract dream customers by mirroring what the Dream 100 already publishes.',q_ar:'ما استراتيجية المحتوى الأساسية لبرانسون في Traffic Secrets؟',opts_ar:['انشر بأكثر ما يمكن','أنشئ محتوى "يستحق الحلم المئة" يجذب ويحوّل العملاء المحلومين','ركّز على الإعلانات المدفوعة فقط','اكتب مدونات فقط'],expl_ar:'يجب تصميم المحتوى لجذب العملاء المحلومين بمحاكاة ما ينشره الحلم المئة بالفعل.'},{q:'How does content strategy connect to the Dream 100?',options:['It doesn\'t','Study what your Dream 100 creates; mirror and improve it for your audience','Copy their content exactly','Avoid their topics'],correct:1,explanation:'Your Dream 100\'s best content shows you what your shared audience wants — model and improve on it.',q_ar:'كيف ترتبط استراتيجية المحتوى بالحلم المئة؟',opts_ar:['لا ترتبط','ادرس ما يُنشئه الحلم المئة؛ حاكِه وحسّنه لجمهورك','انسخ محتواهم بالضبط','تجنّب مواضيعهم'],expl_ar:'أفضل محتوى الحلم المئة يُظهر لك ما يريده جمهورهم المشترك — نمذجه وحسّنه.'},{q:'What is the goal of every content piece in a funnel builder\'s system?',options:['Entertain only','Lead the reader/viewer toward an opt-in or purchase','Get likes','Rank #1'],correct:1,explanation:'Every content piece serves the funnel — entertainment is a vehicle to trust, and trust converts.',q_ar:'ما هدف كل قطعة محتوى في نظام بناة القمع؟',opts_ar:['الترفيه فقط','قيادة القارئ/المشاهد نحو الاشتراك أو الشراء','الحصول على إعجابات','التصدر الأول'],expl_ar:'كل قطعة محتوى تخدم القمع — الترفيه وسيلة للثقة، والثقة تحوّل.'}]},
'tr-fb-ads':{questions:[{q:'What is the foundation of successful Facebook ads according to Traffic Secrets?',options:['Budget size','Targeting the right audience and testing hooks','Ad design','Ad placement'],correct:1,explanation:'Targeting and hook testing are the core levers — the right audience sees the right message.',q_ar:'ما أساس نجاح إعلانات فيسبوك وفق Traffic Secrets؟',opts_ar:['حجم الميزانية','استهداف الجمهور المناسب واختبار الخطافات','تصميم الإعلان','موضع الإعلان'],expl_ar:'الاستهداف واختبار الخطافات هما الروافع الأساسية — الجمهور المناسب يرى الرسالة المناسبة.'},{q:'How does Facebook advertising connect to the Dream 100 strategy?',options:['It doesn\'t','You can buy ads targeting followers of your Dream 100 influencers','You must partner first','Facebook bans this'],correct:1,explanation:'Facebook\'s targeting lets you reach audiences of specific influencers — a paid shortcut to Dream 100 audiences.',q_ar:'كيف يرتبط إعلان فيسبوك باستراتيجية الحلم المئة؟',opts_ar:['لا يرتبط','يمكنك شراء إعلانات تستهدف متابعي مؤثري الحلم المئة','يجب الشراكة أولاً','فيسبوك يحظر هذا'],expl_ar:'استهداف فيسبوك يتيح لك الوصول لجماهير مؤثرين محددين — اختصار مدفوع لجماهير الحلم المئة.'},{q:'What should you test first in a Facebook ad campaign?',options:['The landing page design','The hook/headline — it has the highest leverage on click-through','The offer price','The ad placement'],correct:1,explanation:'The hook determines whether anyone clicks — it has the highest leverage of any element in the ad.',q_ar:'ما الذي يجب اختباره أولاً في حملة إعلانات فيسبوك؟',opts_ar:['تصميم صفحة الهبوط','الخطاف/العنوان — له أعلى تأثير على نسبة النقر','سعر العرض','موضع الإعلان'],expl_ar:'الخطاف يحدد ما إذا كان أي شخص سينقر — له أعلى تأثير من أي عنصر في الإعلان.'}]}
};

n)}</div><div class="divider"></div><div style="text-align:center"><button class="complete-btn" onclick="completeLesson('${id}')" ${isCompleted?'disabled':''}>${isCompleted?'✅ '+(isAr?'مكتمل بالفعل':'Already Completed'):'🎯 '+(isAr?'وضع علامة مكتمل':'Mark as Complete')} (+${lesson.xp} XP)</button></div><div class="lesson-nav"><button class="nav-lesson-btn" onclick="navigate(-1)">← ${isAr?'الدرس السابق':'Previous Lesson'}</button><button class="nav-lesson-btn primary" onclick="navigate(1)">${isAr?'الدرس التالي':'Next Lesson'} →</button></div>`;document.getElementById('main').scrollTo(0,0);if(window.innerWidth<900)document.getElementById('sidebar').classList.remove('mobile-open');}

function renderQuiz(lid){const quiz=QUIZZES[lid];if(!quiz)return `<div class="quiz-area" style="padding:20px;text-align:center;color:var(--text-muted)" data-en="No quiz available for this lesson yet." data-ar="لا يوجد اختبار لهذا الدرس بعد.">${STATE.lang==='ar'?'لا يوجد اختبار لهذا الدرس بعد.':'No quiz available for this lesson yet.'}</div>`;const saved=STATE.quizScores[lid]||{};const isAr=STATE.lang==='ar';return `<div class="quiz-container"><div class="quiz-header"><div class="quiz-title">${isAr?'اختبار المعرفة':'Knowledge Check'}</div>${saved.score!==undefined?`<div class="quiz-score-badge">${saved.score}/${quiz.questions.length} ${isAr?'صحيح':'correct'}</div>`:''}</div>${quiz.questions.map((q,qi)=>{const qText=isAr&&q.q_ar?q.q_ar:q.q;const opts=isAr&&q.opts_ar?q.opts_ar:q.options;const expl=isAr&&q.expl_ar?q.expl_ar:q.explanation;return`<div class="question-block"><div class="question-text">${qi+1}. ${qText}</div><ul class="options-list">${opts.map((opt,oi)=>`<li class="option-item ${saved.answers&&saved.answers[qi]===oi?(oi===q.correct?'correct':'wrong'):(oi===q.correct&&saved.answers?'correct':'')}" onclick="selectOption(${qi},${oi},'${lid}')" ${saved.answers?'disabled':''}>${String.fromCharCode(65+oi)}. ${opt}</li>`).join('')}</ul><div class="quiz-feedback ${saved.answers&&saved.answers[qi]===q.correct?'feedback-correct':'feedback-wrong'}" style="display:${saved.answers?'block':'none'}">${saved.answers&&saved.answers[qi]===q.correct?'✅ '+(isAr?'صحيح!':'Correct!'):'❌ '+(isAr?'خطأ.':'Incorrect.')} ${expl}</div></div>`;}).join('')}<button class="quiz-btn" onclick="submitQuiz('${lid}')" ${saved.answers?'disabled':''}>${saved.answers?(isAr?'تم الإرسال':'Submitted'):(isAr?'إرسال الإجابات':'Submit Answers')}</button></div>`;}

let selectedAnswers={};function selectOption(qi,oi,lid){const parent=event.target.closest('.question-block');const items=parent.querySelectorAll('.option-item');items.forEach(i=>i.classList.remove('selected'));event.target.classList.add('selected');if(!selectedAnswers[lid])selectedAnswers[lid]={};selectedAnswers[lid][qi]=oi;}

function submitQuiz(lid){const quiz=QUIZZES[lid];const answers=selectedAnswers[lid]||{};let score=0;quiz.questions.forEach((q,qi)=>{if(answers[qi]===q.correct)score++;});STATE.quizScores[lid]={score,answers};localStorage.setItem('fma_quiz',JSON.stringify(STATE.quizScores));loadLesson(lid);setTimeout(()=>{document.querySelectorAll('.tab-btn').forEach(b=>{if(b.textContent.includes('Quiz')||b.textContent.includes('اختبار'))b.click();});},100);showToast('📊',`Quiz complete! Score: ${score}/${quiz.questions.length}`);addXP(score*25);}

function buildSystemPrompt(){const lang=STATE.lang==='ar'?'ar':'en';let prompt=`You are an expert marketing coach and tutor inside "Funnel Mastery Academy," a self-paced course built on Russell Brunson's books: DotCom Secrets, Expert Secrets, and Traffic Secrets. Use the course material below as your primary source of truth, in your own words — be concise, practical, and speak like a direct mentor focused on actionable advice. Always reply in the same language the student's most recent message is written in — English, Arabic, or French — even if the course content below is in a different language. Keep replies under 200 words unless asked for more detail.\n\n`;const current=STATE.currentLesson&&LESSONS[STATE.currentLesson];if(current){const text=stripHtml(current.content?.[lang]||current.content?.en||'').slice(0,3000);prompt+=`STUDENT IS CURRENTLY VIEWING — "${current[lang]||current.en}" (${current.book}, ${current.chapter}):\n${text}\n\n`;}const summaries=Object.entries(LESSONS).filter(([id])=>id!==STATE.currentLesson).map(([id,l])=>{const text=stripHtml(l.content?.[lang]||l.content?.en||'').slice(0,220);return`• ${l[lang]||l.en} (${l.book}): ${text}`;});if(summaries.length){prompt+=`OTHER WRITTEN LESSONS IN THIS COURSE:\n${summaries.join('\n')}\n\n`;}prompt+=`Most of the curriculum is still being written. If asked about a lesson not summarized above, answer from your own general knowledge of Brunson's frameworks and say it's general guidance rather than this course's exact lesson content.`;return prompt;}

  const thinking = document.createElement('div');
  thinking.className = 'ai-msg bot';
  thinking.textContent = STATE.lang === 'ar' ? '⏳ جاري التفكير... (قد يستغرق 30-60 ثانية على أول طلب)' : '⏳ Thinking... (may take 30-60 seconds on first request)';
  document.getElementById('aiMessages').appendChild(thinking);
  scrollAI();
  
  try {
    const res = await fetch(PROXY_API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: [{ role: 'user', content: msg }]
      })
    });
    
    const data = await res.json();
    
    if (res.status === 502) {
      thinking.textContent = STATE.lang === 'ar' 
        ? '⏳ الخادم يسخن... حاول مجدداً بعد 30 ثانية'
        : '⏳ Server is warming up... Please try again in 30 seconds';
      return;
    }
    
    const reply = data.choices?.[0]?.message?.content?.trim() || 
                  (STATE.lang === 'ar' ? 'لم أتمكن من الحصول على رد.' : 'Sorry, I could not get a response.');
    thinking.textContent = reply;
    
    // Save to history
    const history = loadAIHistory();
    history.push({ role: 'assistant', content: reply });
    saveAIHistory(history.slice(-MAX_HISTORY_MESSAGES));
    
  } catch (e) {
    thinking.textContent = STATE.lang === 'ar' 
      ? '⚠️ خطأ في الاتصال. حاول مجدداً.'
      : '⚠️ Connection error. Please try again.';
  }
  scrollAI();
}

function aiAsk(q){const input=document.getElementById('aiInput');if(input){input.value=q;sendAIMessage();}}

function addAIMessage(text,type){const msgs=document.getElementById('aiMessages');if(!msgs)return;const div=document.createElement('div');div.className=`ai-msg ${type}`;div.textContent=text;msgs.appendChild(div);scrollAI();}

function scrollAI(){const msgs=document.getElementById('aiMessages');if(msgs)msgs.scrollTop=msgs.scrollHeight;}

document.getElementById('aiInput')?.addEventListener('keypress',e=>{if(e.key==='Enter')sendAIMessage();});

function showToast(icon,msg){const toast=document.getElementById('toast');document.getElementById('toast-icon').textContent=icon;document.getElementById('toast-msg').textContent=msg;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),3500);}

function toggleAccordion(header){header.parentElement.classList.toggle('open');}

function copyTemplate(btn){const card=btn.parentElement;const text=card.innerText.replace('Copy All\n','').replace('Copy\n','');navigator.clipboard.writeText(text).then(()=>{btn.textContent='✓ Copied!';setTimeout(()=>btn.textContent='Copy',2000);});}

function toggleSidebar(){document.getElementById('sidebar').classList.toggle('mobile-open');}

function printCert(){window.print();}

document.addEventListener('keydown',e=>{if(e.key==='Escape'){document.getElementById('notesPanel').classList.remove('open');document.getElementById('aiPanel').classList.remove('open');document.getElementById('sidebar').classList.remove('mobile-open');}if(e.altKey&&e.key==='ArrowRight')navigate(1);if(e.altKey&&e.key==='ArrowLeft')navigate(-1);});

document.getElementById('main').addEventListener('click',()=>{if(window.innerWidth<900)document.getElementById('sidebar').classList.remove('mobile-open');});

setTimeout(()=>{toggleBook('dotcom');},100);

window.renderQuiz=renderQuiz;
window.selectOption=selectOption;
window.submitQuiz=submitQuiz;
window.switchTab=switchTab;
window.loadLesson=loadLesson;
window.completeLesson=completeLesson;
window.navigate=navigate;
window.toggleBook=toggleBook;
window.toggleTheme=toggleTheme;
window.toggleLang=toggleLang;
window.toggleNotes=toggleNotes;
window.toggleAI=toggleAI;
window.sendAIMessage=sendAIMessage;
window.aiAsk=aiAsk;
window.resetAIChat=resetAIChat;
window.saveNote=saveNote;
window.deleteNote=deleteNote;
window.searchLessons=searchLessons;
window.toggleSidebar=toggleSidebar;
window.printCert=printCert;
window.copyTemplate=copyTemplate;
window.toggleAccordion=toggleAccordion;
</script>
